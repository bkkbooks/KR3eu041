body:
  text: 卷第一上古天真論篇第一此篇太素僅存天癸一段成而登天以上六句疑王氏所補非古經之文何以言之此篇全氏訓解在第九卷倘使其本果有此六句則是帝始未退在末卷萬無此理蓋王氏移天真論置之於八十篇之上並添改其起語也其文取之於史記大戴禮及孔子家語改聰明作登天冠以昔在二字蓋摹仿堯典序而承以乃問於天師曰一句組織之痕自不可掩矣顧全氏之舊猶是不過黃帝問曰四字而已林億等專奉王氏如此七句既信為古經之真故置而不校也小島春沂曰千金方作黃帝問於岐伯曰七字遐年要抄引太素經亦同此足以為確徵矣太素問字下每有於岐伯三字年半百古鈔本年下有至字千金方遐年要抄引太素並同古鈔本系於四五百年前人所字澀江全善對校不妄作勞書盤庚惰農自安不昏作勞傳不強作勞于田畝疏不強於作勞海保元備曰文選西京賦何必昏於作勞薛綜注言何必當勉力作勤勞之事乎蓋先儒古義皆以作為力作據此此作勞亦力作勤勞之義又韓詩外傳論人有六情曰其身體四肢欲安而不作三國志魏武帝紀君勸分務本穡人昏作注引盤庚等亦是同義如全本太素其義自異不知持滿淮南子泛論訓周公可謂能持滿矣高誘注滿滿而不溢也故曰能持滿以耗散其真先兄曰耗敖通曲禮亦敖欲對言曰敖不可長欲不可從正義云敖者矜慢在心之名又云心所貪欲為欲則飲食男女人之大欲存焉是也人皆有欲不得從之也逆於生樂王以養生之樂解之恐非呂覽知士篇此劑貌辨之所以外生樂趨患難故也注外棄其生命之樂解人之患往見宣王不闢難之故也蓋此亦謂生命長久之樂也夫上古聖人之教下也皆謂之先兄曰潘之恆黃海云謂之者語之也即下八字是也按語之者似指下六句蓋聖人之教下也語之以避邪風而守精神則可以不病故民之順化者志間心安勞而不倦云云是也是以以下六句謂民之所仿行也故美其食以下六句謂上古之俗淳朴也是以嗜欲以下六句謂不為外物所撓故和於術數也所以以下三句謂非時世之異人自失之也是皆承聖人教下六句之意而演也虛邪先兄曰馬雲以下馬雲即元臺也虛邪俱指風言王注非此説為佳宜參八正神明論及歲露篇九宮八風篇不肖禮雜記桀之子不肖注肖似也不似言不如人解精微論王注不肖謂擁造不法天數然也先兄曰呂覽仲秋紀凡舉事無逆天數注天數天道也馬雲天數凡人所稟於天之數也齒更髮長先兄曰六節藏象論云腎者主蟄封藏之本精之處也其華在發其充在骨五藏生成篇云腎之合骨也其榮發也天癸楊曰天癸精氣也堅按此説非是韓詩外傳曰十六精通而後能施化陰陽相反大戴禮説苑此四字作陽窮反陰陰窮反陽二句此下有故字陰以陽變陽以陰變故男八月生齒八歲齠齒十六而精化小通女七月生齒七歲齔齒十四而精化小通原識引文有脫仍更揭出史記正義曰男八月生齒八歲毀齒二八十六陽道通八八六十四陽道絶女七月生齒七歲毀齒二七十四陰道通七七四十九陰道絶孔子世家注太衝脈太素作伏衝脈堅按此與新校正引合以下其相合者不敢具載真牙生而長極楊曰長極身長也先兄曰馬雲真牙由是而生且長極矣汪云人身之長至此而具馬説為長五七陽明脈衰馬曰女子大體有餘於陰不足於陽故其衰也自足陽明始張同志曰夫氣為陽血脈為陰故女子先衰於脈而男子先衰於氣也堅按下文女子必言脈男子必言氣志説似優面始焦先兄曰説文醮面焦枯小也丈夫先兄曰説文周制八寸為尺十尺為丈人長八尺故曰丈夫五八腎氣衰馬曰男子大體有餘於陽不足於陰故其衰也自足少陰始張同志曰腎為生氣之原男子衰於氣故根氣先衰而發墮齒稿也堅按志説宜從七八推上下文天癸竭云云四句似宜移於八八下恐是錯出然前注無敢言及者不能無疑不過盡八八唐書李叔明傳曰傳云女子十四有為人母之道四十九絶生育之道男子十六有為人父之道六十四絶陽化之理提挈天地把握陰陽先兄曰張云能斡旋造化燮理陰陽是即提挈把握之謂此其道生琦曰四字衍適嗜欲先兄曰呂覽重己篇云凡生之長也順之也使生不順者欲也故聖人必先適欲注適猶節也逆從陰陽先兄曰按逆從是唯從義耳猶言急劇為緩急死斯為死生之期謂順從於陰陽之理也見法則象似辨列分別等字而可觀諸注欠妥且內經中用逆從二字者或唯稱從或單稱逆不可一例而讀之四氣調神大論篇第二此篇太素全存發陳爾雅釋天春為發生夏為長嬴秋為收成冬為安寧注此亦四時之別號蓋文異而旨近又荀子天論篇曰繁啓蕃長於春夏畜積收藏於秋冬早起唐書裴度傳曰夫頤養之道當順適時候則六氣平和萬壽可保道家法春夏蚤起取雞鳴時秋冬晏起取日出時蓋在陽勝之以陰在陰勝之以陽以使志生志曰張志聰志者五藏之志也志意者所以御精神收魂魄適寒溫和喜怒者也是以四時皆當順其志焉夏三月太平御覽舉此一段並有注語或疑是全氏所解仍具載於下曰夏三月天地陰陽之氣交合萬物華實故言夏生長於萬物成實者也夜臥早起是貪於夏氣不厭於日者也是晚臥早起明於陽氣之盛者也人志氣毋怒陽氣成結秀實以成其氣得泄陽者也萬物成結於夏受之因此夏陽氣之所應也能從其氣則是養生之道也逆之則傷損於心心者夏王也故言傷心心傷則秋必病痎瘧故言夏傷於暑秋病痎瘧者不從其氣則大為逆也是故傷逆深皆損於陽氣故冬至陰盛必重病容平楊曰夏氣盛長至秋也不盛不長以結其實故曰容平也堅按此説與王意同考嚴傑經義叢鈔有金鶚釋庸一篇有云庸又通鏞書益稷笙鏞以簡鄭氏鏞作庸注云西方之樂謂之庸庸功也西方物孰有成功庸又通頌大射義西階之西頌磬東面注云言成功曰頌西為陰中萬物之所成是以西方頌磬謂之頌古文頌為庸頌古容字與庸同聲故通用繇是推之則容平之容恐亦與庸相通而容平即萬物成熟平定之謂也飧泄太素作餐泄楊曰餐音孫謂食不消下泄如水和飯也無擾乎陽先兄曰按王以為君子周密之義然照上文高注高士栻所謂地氣固藏不騰於天者是也使氣亟奪太素亟奪作不極楊曰閇古閉字諸腠理使氣不泄極也堅按此不必是清淨太素作清靜藏德不止太素止作上堅按此與新校正引別本同天明太素作上下名木古人謂大為名王念孫有説見經義述聞禮記其名者成條名木蓋大水之謂王注恐謬雲霧不精則上應白露不下太素霧作露白作甘下白露同心氣內洞宋本外臺與本文同肺氣焦滿太素作燋漏楊曰燋熱也漏泄也堅按此與新校正引不同獨沉太素作濁沉春夏養陽秋冬養陰高注本於滑氏滑伯仁苛疾太素作奇疾愚者佩之方氏家藏集要方保壽天蘇陀酒主治曰夫養生者人之急務也春夏則養陽秋冬則養陰聖人行之愚者背之堅按此以佩為背既在古今黈之前內格先兄曰滑云格者扞格也謂身內所為與陰陽相扞格也高雲陰不交陽陽不交陰上下表里不通是謂內格鑄兵太素亦作鑄兵生氣通天論篇第三太素全存九州九竅先兄曰孔頴達禹貢正義曰周公職録云黃帝命風后受圖割地布九州堅按楚辭九辨敘故天有九星以正機衡地有九州以成萬邦人有九竅以通精明十二節楊曰十二節者謂人四支各有三大節也其生五其氣三太素五作在楊曰謂天地間九州等物其生皆在陰陽及和三氣堅按作在非是三氣與弘決外典鈔引文異當考先兄曰莊公三年穀梁傳獨陽不生獨陰不生獨天不生三合然後生注徐邈曰古人稱萬物負陰而抱陽沖氣以為和然則傳所謂天蓋名其沖和之功而神理所繇也據此則三氣之説非諸家所説者蓋可證也華氏華他中藏經以內外左右上下之氣為解殊覺支離堅按春秋繁露曰寒暑與和三而成物日月與星三而成光天地與人三而成德由此觀之三而一成天之大經也皆通於天氣淮南子天文訓蚑行喙息莫貴於人孔竅肢體皆通於天蒼天之氣清淨太素淨作靜楊曰蒼天色也氣謂四氣和氣者也天之和氣清而不濁靜而不亂能令人志意皆清靜也傳精神服天氣太素作搏精神或服天氣楊曰搏附也或有也聖人令精神相附不失有服清靜之氣堅按太素經注並難從又尤怡醫學讀書記曰按傳當作專言精神專一則清淨弗擾猶蒼天之氣也老子所謂專氣致柔太史公所謂精神專一動合無形贍足萬物班氏所謂專精神以輔天年者是也若作傳與義難通王注精神可傳惟聖人得道者乃能爾豫未知精神如何而傳也先兄曰服服膺之服服天氣清淨之理也志曰服餐服也非是欲如運樞太素運作連堅按與全元起本合體若燔炭汗出而散朱震亨曰夫寒邪初客於肌表邪鬱而為熱有似燔炭得汗則解此仲景麻黃湯之類是也因於濕太素此七句作因於濕首如裹攘大筋濡短小筋弛張弛張者為拘二十字堅按太素蓋屬訛脫緛短為拘集韻拘俱遇切拘拿不展拏牽也腫説文曰腫癰也周官瘍醫注曰腫瘍癰而上生創者先兄曰古單稱腫者皆謂癰腫也若謂胕腫水腫浮腫者水病也煩勞則張先兄曰後漢班超傳遂雄張南道注雄張猶熾盛也蓋此張字義相近煎厥太素作前厥楊曰前厥即前僕也堅按太素經注並誤樓英曰煎厥仲景所云春夏劇秋冬瘥之病俗人名曰注夏者也亦非宣明論於素問諸證擬有一方然多難供用仍不具録汩汩手不可止太素作滑滑不止薄厥太素作前厥先兄曰孫奕示兒編曰薄者三聲音泊者厚薄之薄音朴者疾驅聲音博者迫也但韻書中並不收云云汗出偏沮太素作而出汗偏阻楊曰阻壞也慈呂反堅按太素經注並誤痤痱太素痱作疽非楊曰痤癰之類然小也俗謂之癤子高粱太素作膏粱足生大丁先兄曰唐椿原病集云此足字今人常如此用者如中庸邦有道其言足以興邦無道其默足以容足字義一也勞汗當風衛生寶鑑八白散治勞汗當風寒薄為皶郁乃痤及皯點之類白丁香白芨白殭蠶白牽牛杜蒺藜新升麻內白者佳各三兩三奈子白蘞白芷各二兩白附子白茯苓各半兩上為末至夜津唾塗面明旦以瑩肌如玉散洗之王注瘛於玄府中先兄曰瘛當與鍥通荀子勸學篇鍥而不捨鍥注刻也又宋本瘛作瘦可疑大僂醫壘元戎載經文有大僂方用羌活防風細辛附子當歸甘草川芎續斷白芍藥白朮桂麻黃黃耆熟地黃曰此藥當與魯山骨碎補丸相表裡瘻楊注骨空論鼠瘻曰瘻昔漏也三因方曰經云陷脈為瘻留連肉腠脈得寒即下陷凝滯肌肉故曰留連肉腠肉冷亦能為膿血故為冷漏須用溫藥附有陷脈散桂附丸二方按陷脈散即千金癭瘤門陷腫散桂附丸即養生必用方溫經丸見外科精義引俞氣化薄至驚駭太素俞作輸下皆然及作乃琦曰按文義不次蓋他經脫文岐伯曰琦曰衍文起亟也太素作極起者也楊曰五藏藏精陰極而陽起也六府衛外陽極而陰固也故陰陽相得不可偏勝也之按之字是語助楊注中多見之脈流薄疾先兄曰馬雲薄為依薄疾為急數腸澼楊曰澼音僻泄膿血也堅按集韻澼匹闢切脈間水凡陰陽之要先兄曰以下王注釋為房中補益之義恐誤故陽強先兄曰張云強亢也孤陽獨用不能固密因於露風乃生寒熱寒熱即虛勞寒熱之謂説見原識脈要精微論中裸露冒風恐不遽為此病蓋露疲憊之義風猶風乎舞雩之風言勞役疲憊之人有喜乘風涼則邪氣侵客留連不解遂成風勞也昭公元年左傳於是乎節宣其氣勿使有壅閉湫底以露其體杜注曰湫集也底滯也露羸也一之則血氣壅滯而體羸露王念孫謂露為疲憊之義露羸一聲之轉舉數徵以確之見經義述問皇侃論語疏風風涼也春必溫病太素作春乃病熱秋傷於濕水熱穴論曰秋者金始治肺將收殺金將勝火陽氣在合陰氣初勝濕氣及體王注以漸於雨濕霧露故云濕氣及體管子幼官篇秋下曰君服白色味辛味聽商聲治濕氣注秋多霖雨水故治濕春治燥氣夏治陽氣冬治陰氣又度地篇曰當秋三月山川百泉踴降雨下山水出海路距雨露屬天地湊汐云云濡濕日生土弱難成脾氣乃絶太素脾作肺楊曰肺氣克肝令肝氣津泄則肺無所克故肺氣無用也堅按太素經注俱似未妥然此段不及肺姑從之短肌先兄曰蓋是陰陽別論所謂索澤山海經所謂體臘也心氣抑太素無心字楊曰咸以資骨今咸過傷骨則脾無所克故肌肉短小脾氣壅抑也堅按太素經注並難從然下有心氣喘滿此心字無者為是味過於甘太素甘作苦衡作衛楊曰苦以資心今苦過傷心堅按作苦為是蓋言味過於苦心氣過實以為喘滿火亢血燥故色黑水火不濟故腎氣不衡也味過於苦太素苦作甘無不字楊曰甘以資脾氣今甘過傷脾氣濡令心悶胃氣厚盛也注曰厚者敦厚也壅滿也經云土太過曰敦阜是也堅按作甘為是據過酸例不字當作以字亦言味過於甘則脾氣過實胃氣敦阜也尤怡醫學讀書記曰脾氣不濡胃氣乃厚者由脾不能為胃行其津液而胃亦不能輸其精氣於脾也胃不輸脾不行則津液獨滯於胃而胃乃厚厚猶滯也寧強厚之足言哉此説未必然沮弛太素沮作涅下乃央作乃英楊曰心神克肺氣涅泄神氣英盛浮散無用也之堅按太素經注俱欠晰醫學讀書記曰沮消沮也弛懈弛也由辛散太過而血氣消沮筋脈懈弛精氣衰及其半也豈潤澤長久之謂哉氣骨以精楊曰調五味各得其所者則咸能資骨故骨正也酸能資筋故筋柔也辛能資氣原脫資字今誼補故氣流也苦能資血故血流也甘能資肉故腠理密也堅按呂覽簡選欲其精也注精猶鋭利金匱真言論篇第四此篇太素全存八風發邪以為經風觸五藏太素作八風發邪氣按太素邪字一用耶字經風觸五藏楊曰八風八正耶氣也正月朔日有此八風發為耶氣傷人者也經風八虛風也謂五時八風從虛鄉來觸於五藏舍之為病也俞在頸項琦曰下言春病在頭頸項即頭之變文病在藏楊曰藏謂心腹琦曰即謂胸脅對肢節而言堅按下文南方曰病在五藏則兩説並難從病在肩背先兄曰志云秋氣降收不能主持於皮膚肌腠之間故邪入俞也堅按此節脫長夏病所在故冬不按蹻太素作按矢右坰楊曰矢右坰幾小反強勇貌也堅按楊注可疑先兄曰張云冬元氣伏藏在陰當伏藏之時而擾動筋骨則精氣泄越以致春夏秋冬各致其病鼽衄先兄曰呂覽盡數篇菀處鼻則為鼽為窒注鼽齆鼻論衡禮義篇鼻鼽不通故藏於精者此蓋言冬月慎房者似不與按蹻相干平旦先兄曰白虎通云夏以十三月為正色尚黑以平旦為朔殷以十二月為正色尚白以雞鳴為朔周以十一月為正色尚赤以夜半為朔藏府先兄曰五行大義云藏者以其藏於形體之故故稱為藏亦能藏受五氣故名為藏府者以其傳液受納故謂之曰府三焦巢源舉靈營氣篇及三十一難文曰謂此三氣焦乾水穀分別清濁故名三焦陰陽表裡內外雌雄太素作陰陽表裡外內左右雌雄上下楊曰五藏六府即表裡陰陽也皮膚筋骨即內外陰陽也肝肺所主即左右陰陽也牝藏牡藏即雌雄陰陽也腰上腰下即上下陰陽也此五陰陽氣相輸會故曰合於天也其畜雞先兄曰周禮獸醫疏在野曰獸在家曰畜釋文畜計又切又淮南子作羊其氣臊惠士奇禮説庖人下曰月令五臭無臊故春臭羶內經五臭無羶故春臭臊則類於羶也繁露夏祭先享商祭先臊則又腥臊同類矣先兄曰淮南子作羶故病在五藏楊曰心為五藏主不得受於外耶受外耶則五藏皆病也其畜羊先兄曰淮南子作雞其谷黍説文黍禾屬而黏者也以大暑而種故謂之黍孔子曰黍可為酒禾入水也程瑤田九穀考就説文有詳説曰黍淡黃色又有赤黍雜黑黍中者韓非子吳起欲秦小亭置一石赤黍東門外又曰赤黍白黍宋之蘇頌以冒虋𦬊是不知虋𦬊之為赤白苗也其谷稷白虎通稷五穀之長故立稷而祭之也稷者得陰陽中和之氣而用尤多故為長也説文稷齋也五穀之長風俗通孝經説稷者五穀之長程瑤田曰稷齋大名也黏者為秫北方謂之高粱通謂之秫秫又謂之蜀黍高大似蘆其數五先兄曰鄭玄雲土生數五成數十但言五者土以生為本其畜馬先兄曰淮南子作狗其谷稻詳見於湯液醪醴論開竅於二陰楊曰二陰謂前後陰也其臭腐惠士奇禮説曰月令冬臭朽內經冬臭腐説文朽作㱙腐也腐之言無也氣若有若無為㱙或從木獨秋臭腥故秋膏腥月令內經與周官皆合藏之心意先兄曰按意非志意之意意臆古通心意猶言胸臆漢書賈誼鵩鳥賦請對以意文選意作臆陰陽應象大論篇第五篇首至風勝則動及上古聖人論理人形一節太素並缺積陽為天積陰為地此二句亦出京房易傳清氣在下則生飧泄先兄曰儒門事親可汗式中有飧泄不止用桂枝麻黃湯案當參清陽為天濁陰為地列子天瑞篇清輕者上為天濁重者下為地易緯乾鑿度同淮南子天文訓清陽者薄靡而為天注薄靡者若塵埃飛揚之類濁陰者凝滯而為地氣傷於味國語周語五味實氣味厚則泄薄則通先兄曰泄謂大便通謂小便厚則發熱千金方作厚則祕塞壯火之氣衰少火之氣壯海保元備曰之字古有則義馬氏之意或為然詩黍離彼黍離離彼稷之苗箋我以黍離離時至稷則尚苗是鄭氏釋之為則也氣味辛甘發散為陽酸苦湧泄為陰先兄曰王意蓋謂味之辛甘者其氣發散故為陽味之酸苦者其氣湧泄故為陰諸注亦然特馬氏不同堅按王注至真要大論曰湧吐也泄利也風勝則動熱勝則腫燥勝則乾太素無則動熱勝四字楊曰耶風客於皮膚則為䐜腫也耶熱燥於皮膚則皮乾無汗堅按腫言癰腫楊説誤先兄曰王注六元正紀大論云動不寧也又云熱勝氣則為丹熛勝血則為癰腫勝骨肉則為胕腫按之不起又云干於外則皮膚皴揭干於內則精血枯涸干於氣及津液則肉乾而更著於骨寒勝則浮太素浮作胕楊曰檢義當腐寒勝肉熱肉當腐堅按楊説非是王注六元正紀云浮言浮起按之起見也濕勝則濡寫太素無寫字楊曰陰濕氣盛則多汗也堅按太素經注並非六元正紀寫作泄王云濡泄水利也五行春秋繁露曰行者行也其行不同故謂之五行詳源識藏氣法時論下暴怒傷陰暴喜傷陽先兄曰靈行針篇多陽者多喜多陰者多怒淮南子原道訓云人大怒破陰大喜墜陽高誘注云怒者陰氣也陰為堅冰積陰相薄故破陰喜者陽氣也陽氣升於上積陽相薄故曰墜陽也秋必痎瘧太素作秋生痎瘧楊曰痎音皆在變動為握管子入國篇偏枯握遞注遞著也謂兩手相拱著而不申者謂之握遞樂恬憺之能先兄曰張云能者如關尹子所謂惟有道之士能為之亦能能之而不為之之義故俱感於邪王注至真要大論曰外有其氣而內惡之中外不喜因而遂病是謂感也先君子曰此解能盡感字之義地有五里月令孟春之月曰毋變天之道毋絶地之理毋亂人之紀天氣通於肺聖濟經曰天氣通肺清者浮也先兄曰肺主鼻是自鼻通於肺者也地氣通於嗌太素嗌作咽楊曰咽中入食以生五藏六府故地氣通咽也聖濟經曰地氣通嗌濁者入也先兄曰地氣指地土之氣而言非飲食之氣也不然與穀氣通於脾相矛盾雷氣通於心楊曰心能覺動四支百體故雷氣通心也聖濟經曰雷氣通心神者運也穀氣通於脾太素谷作榖楊曰五榖滋味入脾故榖氣通脾也堅按此宜與甲乙等互證九竅為水注之氣太素水注二字復楊曰聲色芳味如水從外流於上之七竅注入經水溲後糟粕之水從內出下二竅也有本為外注理亦相似陽之氣以天地之疾風名之先兄曰淮南精神訓耳目者日月也血氣者風雨也琦曰疾字衍暴氣象雷楊曰人身中氣上下有聲故象雷也逆氣象陽楊曰無陰之陽即為災故氣逆不和者象於陽也堅按象字難解次注逆氣降上降字宋本作陵宜改治肌膚先兄曰説文肌肉也臚皮也籀文作膚釋名膚布也布在表也肌懻也膚幕堅懻也玉篇北方名堅曰懻禮運膚革充盈疏云膚革外薄皮革膚內厚皮説文獸皮治去其毛曰革要之肌膚多連言則肌皮中脆肉膚肌外薄皮明矣水穀之寒熱太素熱作溫以右治左以左治右楊曰謂以繆刺刺諸絡脈謂以巨刺刺諸經脈也以我知彼楊曰謂醫不病能知病人見微得過過與五藏生成篇過在及脈要精微論有過之脈同義倉公傳有絡脈有過文王引之經義述聞釋易中過字曰過者差也兩爻相失也蓋此過字其意相同善診者説文診視也從言鬒聲段玉裁注曰倉公傳診脈視脈也從言者醫家先問而後切也可刺而已楊曰以其善診病之始生即以小針消息去之不用毒藥者此則其微易散者也其盛可待衰而已楊曰病盛不可療者如堂堂之陳不可即擊待其衰時然後療者易得去之如瘧病等也故因其輕而揚之先兄曰呂覽盡數云精氣之來也因輕而揚之因其衰而彰之此衰字與上衰字義自異此三句楊氏吳氏馬氏高氏則屬之針徐氏張琦則屬之藥王氏張氏志聰並不乍言其何然王張意似言藥志聰則似言針且馬曰本節雖言用針而用藥之理亦不外是也今審考之謂為藥治者庶為得理形不足者至補之以味楊曰謂寒瘦少氣之徒補其陽氣也之又曰五藏精液少者以藥以食五種滋味而補養之先兄曰吳云藥之為性氣為陽投之以養陽之品則形肉溫而皮膚充無不足之形矣味為陰投之以益陰之物則精液足而真元復無不足之精矣堅按格致餘論曰精不足者補之以味何不言氣補曰味陰也氣陽也補精以陰求其本也故補之以味若甘草白朮地黃澤瀉五味子天門冬之類皆味之厚者也經曰虛者補之正此意也上文謂形不足者溫之以氣夫為勞倦所傷氣之虛故不足溫者養也溫存以養使氣自充氣完則形完矣故言溫不言補經曰勞者溫之正此意也此説欠當醫學入門曰形不足者溫之以氣溫存以養使氣自充非溫藥峻補之謂也精不足者補之以味非膏粱之謂也亦未是儒門事親曰經云勞者溫之溫謂溫存而養之今之醫者以溫為溫之藥差之久矣此二書所本中滿者寫之於內蘭室祕藏曰中滿者寫之於內謂脾胃有病當令上下分消其氣下焦如瀆氣血自然分化不待泄滓穢定其血氣各守其鄉吳曰定安也諸經皆有血氣宜安定之使之各守其位不得出位乘侮也氣虛宜觢引之太素觢作掣陰陽離合論篇第六太素全存吳曰此篇當與皮部論參看今三陰三陽不應陰陽先兄曰吳云言天地止是一陰一陽今人有三陰三陽何其不相應也前曰廣明先兄曰馬雲心位南方火位主之陽氣盛明故曰廣明前者上也上南方也人之形體以心胸為前為南以腎腰為後為北吳云曰廣明者兼額面胸部而言結於命門楊曰結聚也根起於厲兌太素此下有結於顙上四字楊曰陽明脾府之脈在太陰表前從足指厲兌上行聚於顙上額顱顙額也蘇蕩反根起於竅陰太素此下有結於窗籠句太陽為開陽明為闔少陽為樞太素開作閞按即關字楊曰三陽離合為閞闔樞以營於身也夫為門者其有三義一者門閞主禁者也膀胱足太陽脈主禁津液及於毛孔故為閞也二者門闔謂是門扉主開閉也胃足陽明脈令真氣止息復無留滯故名為闔也三者門樞主轉動者也膽足少陽脈主筋綱維諸骨令其轉動故為樞也堅按太素與新校正引九墟相合如今甲乙猶與根結篇不異皮部論陽明之陽名曰害蜚即闔扉少陰之陽名曰樞持太陽之陽名曰關樞乃與太素同義開字闔字義具於皮部論又太素載根結論開字亦並作閞命曰一陽先兄曰張云雖三陽各有其體然陽脈多浮若純於浮則為病矣故但欲搏手有力得其陽和之象而勿至過浮是為三陽合一之道故命曰一陽根起於隱白太素此下有結於太倉句根起於湧泉太素此下有結於廉泉句根起於大敦太素此下有結於玉英句太陰為開厥陰為闔少陰為樞太素開作閞楊曰三陽為外門三陰為內門內門亦有三義一者門閞主禁者也脾藏足太陰脈主禁水穀之氣輸納於中不失故為閞也二者門闔主開閉者也肝藏足厥陰脈主守神氣出入通塞悲樂故為闔也三者門樞主動轉也腎藏足少陰脈主行津液通諸經脈故為樞者也堅按太素與九墟合皮部論少陰之陰名曰樞儒心主之陰名曰害肩即闔扉太陰之陰名曰關蟄亦是同義又先兄曰吳云三陰行前行後之不同謂之離太少厥同出於陰謂之合此三陰自為離合也太陰居中敷布陰氣謂之開厥陰謂之盡陰受納絶陰之氣謂之闔少陰為腎精氣充滿則脾職其開肝職其闔腎氣不充則開闔失常是三陰為樞軸也名曰一陰先兄曰張云三經皆陰不得相失也若過於沉則為病矣故但宜沉搏有神各得其陰脈中和之體是為三陰合一之道故名曰一陰𩅞𩅞太素作鍾鍾楊曰鍾鍾行不止住貌堅按鍾通作鍾白虎通鍾之為言動也又廣雅憧憧往來也王念孫疏證曰衝或作沖説文憧意不定也咸九四憧憧往來朋從爾思釋文云憧憧馬雲行貌王肅云往來不絶貌易林咸之坤云心惡來怪衝衝何懼並字異而義同據念孫此説衝衝鍾鍾𩅞𩅞亦皆音通楊以為行不止住王以為氣之往來其義一也陰陽別論篇第七太素全存四經十二從太素從作順太素中從字皆用順字豈有所避乎楊曰四經謂四時經脈也十二順謂六陰爻六陽爻相順者也又曰肝心肺腎四脈應四時之氣十二爻應十二月堅按十二爻亦至人有二字而窮矣別於陽者知病處太素作知病之處楊曰陽胃氣也足陽明脈通於胃是以妙別陽明胃氣則諸脈受病所在並知之別於陰者知死生之期楊曰妙別五藏之脈即知死生有期凡持真脈之藏脈者太素作凡持真臟之脈者懸絶急太素無急字楊曰脈至即絶久而不來故曰懸絶琦以篇首至懸絶四日死為他經脫文發心脾太素脾作痺有不得隱曲楊曰隱曲大小便先兄曰外臺引刪繁骨蒸方云腎實熱則色炲隱曲膀胱不通大便壅塞風消楊曰風消謂風熱病消骨肉也先兄曰儒門事親云風消者為風所鼓消渴腸胃其狀口乾雖飲水而不咽此風熱拒於賁門也息賁楊曰息賁賁膈也為膈息也先兄曰邪氣藏府病形篇肺脈滑甚為息賁上氣徐靈胎難經經釋云息賁氣息賁迫也此説為得堅按五十六難楊玄操注曰息長也賁鬲也漸長而逼於鬲上善説與玄操相似而更覺含混腨悁太素作喘悁楊曰悁季綿反憂患也背痛先兄曰經筋篇手陽明之筋繞肩胛挾脊直者從肩髃上頸足陽明之筋上循脅屬脊據此張説為是善噫先兄曰宣明五氣篇心為噫陰陽相過曰溜太素溜作彈楊曰陰陽之脈至寸口相擊曰彈也起則熏肺使人喘鳴太素熏作動鳴作喝淖則剛柔不和楊曰淖亂也音濁言陽散陰消故剛柔不和則十二經氣絶也堅按淖訓亂未知所出當考宜考八正神明論闢陰楊曰闢重疊至陰太陰重也堅按此解似是陰陽結斜太素作陰陽結者針琦曰斜義不詳或衍字也澀江善曰斜恐糾字之訛宋本作斜又後世俗訛斜作糾説文糾繩三合也從系丩後漢書注糾纏結也結糾即結聚纏合之謂文義始妥説文又曰丩相糾繚也一曰瓜瓠結丩起結糾與結丩同二陽結太素作三陽結三陽結謂之隔太素三作二楊曰便溲不通也陰搏陽別先兄曰以下至篇末高注並不以脈候而解堅按脈經曰脈平而虛者乳子法也經云陰搏陽別謂之有子此是血氣和調陽絶陰化也陽加於陰許叔微傷寒百證歌曰素問云陽加於陰謂之有汗俗謂過關之脈也三陰俱搏至十日死琦曰陰搏則陰盛陽搏則邪實故皆主死陰陽離合論搏而勿浮名曰一陽搏而勿沉名曰一陰是陰陽和平此言搏為死候則陽搏而浮陰搏而沉可知發盡句疑有誤靈蘭祕典論篇第八太素所缺先兄曰篇中言靈蘭之室則明非靈臺蘭室二處心者君主之官也管子心術曰心之在體君之位也九竅之有職官之分也心處其道九竅循理荀子天論篇曰心居中虛以治五官夫是之謂天君注心居於中空虛之地以制耳目鼻口形之五官是天使為形體之君也肺者相傅之官先兄曰吳云相去聲位高非君猶之宰保相傅也主行營衛猶之燮陰陽而贊化育故曰治節出焉至道在微海保元備曰此句與上文其宗大危不相承接高援大禹謨人心惟危道心惟微為解非是閔閔之當海保元備曰閔閔通老子二十章俗人昭昭我獨昏昏俗人察察我獨悶悶五十八章其政悶悶悶悶古本皆作閔閔閔閔悶悶皆以謂道之玄妙王以為深遠義或本此其形乃制先兄曰按萬理本只在自家心上故一念之萌推之大之其形之為殃為壽者為彼所制而已猶度量之數本萌於恍惚中也六節臟象論篇第九太素缺三百六十五節先兄曰春秋繁露人有三百六十節偶天之數也淮南子天有十二月以制三百六十日人有十二肢以使三百六十節堅按九針十二原曰節之交三百六十五會又曰所言節者神氣之所遊行出入也非皮肉筋骨也蓋十二原所言即系穴俞氣穴論文足以互證本篇所言亦此義也草生五色張曰此以草言者木亦在其中矣青黃赤白黑五色之正也然色有淺深間雜之異故五色之變不可勝視酸辛苦甘鹹五味之正也然味有厚薄優劣之殊故五味之美不可勝極先兄曰孫子兵勢篇聲不過五五聲之變不可勝聽也色不過五五色之變不可勝觀也味不過五五味之變不可勝嘗也又見女子及淮南子厚道訓天食人以五氣胡渭洪範正論曰素問六節臟象論云天食人以五氣地食人以五味五氣入鼻藏於心肺五味入口藏於腸胃夫氣云入鼻則五氣當即是五臭故王冰注素問曰五氣者云云以氣為臭僅見於此此説為是陰陽應象大論氣味辛甘發散為陽本草經藥有寒熱溫涼四氣所謂氣者俱是性亦非氣臭之氣也聖濟經藥理篇審劑篇並論氣臭文繁不録五色修明太素修字皆作循與修相似又莊子大宗師以德為循釋文循本作修神之變也先兄云吳云變謂宰其變也其華在面其充在血脈先兄曰汪云華英華也充溢也肝者罷極之本或曰罷極當作四極四極見湯液醪醴論即言四支肝其充在筋故云四極之本也魂之居也先兄曰左傳昭二十五年樂祁曰心之精爽是謂魂魄禮郊特牲魂氣歸於天形魄歸於地又祭義氣也者神之盛也魄也者鬼之盛也注氣謂噓吸出入者也耳目之聰明為魄脾胃至通於土氣先兄曰滑云此處疑有錯誤當云脾者倉廩之本營之居也其華在唇四白其充在肌此至陰之類通乎土氣胃大腸小腸三焦膀胱名曰器能化糟粕轉味而入出者也高本據以僭改又潘揖醫燈續焰亦有三焦膀胱名雖二而實一之説宜參堅按琦所改訂亦與滑同曰對五神藏言故曰器若脾藏不得名為器也此説不必故人迎一盛張曰一盛二盛猶言一倍二倍謂以人迎寸口相較或此大於彼或彼大於此而有三倍四倍之殊也關格之脈羸宋本羸作贏然新校正既云贏當作盈則古本作贏明矣但其於經義作羸似是辨校正文宋本有訛讀者當自知琦曰蓋關格雖有內外之不同而總為陰盛而病陽外格則陽浮內關則陽陷非陽盛而關陰於外之説也繹越人仲景甲乙經之義則得之矣五藏生成篇第十太素缺篇首一段其主腎也先兄曰高雲外合外榮者藏之成主者藏之生五行之理制而後生主者生之謂也火受水制則水有餘而木氣旺木旺則生火制之乃所以生之翠羽先兄曰説文翠青羽雀也出鬱林從羽卒聲縞楊曰縞工道反白練堅按任氏大椿釋繒曰孰帛曰練生帛曰縞段氏説文注引繒説文帛也裹朱先兄曰説文絑純赤也堅按段氏曰凡經傳言朱皆當作絑朱其段借字也朱者赤心木也色味當五藏先兄曰張云當合也志云當承也值也諸脈者皆屬於目先兄曰吳云以經脈考之膀胱之脈起於目內眥胃之脈交頞中膽脈起於目鋭眥大腸之脈貫頰小腸之脈上頰至目鋭眥其支者至目內眥三焦之脈至目鋭眥又心脈系目系是諸脈皆屬於目也諸血者皆屬於心先兄曰陰陽應象大論心主血痿論心主身之血脈諸氣者皆屬於肺先兄曰靈五味篇大氣之搏而不行者積於胸中命曰氣海出肺循喉咽此四支八溪之朝夕也楊曰諸脈髓筋血氣等五屬血氣皆於四支八溪朝夕往來先兄曰子華子云一人之身為骨凡三百有六十精液之所朝夕也足受血而能步先兄曰吳云人之所以能步能握能攝者雖繫於筋若無血以養筋則痿弱無力故為痹厥吳曰言痹厥而不言泣痹可以兼泣也人有大谷十二分至少十二俞太素俞作關楊曰小曰溪大曰谷溪谷皆流水處也故十二經脈名為大谷三百六十五胳名曰小溪據前後體例無五十四手足十二大節名十二關堅按楊溪谷解非是春秋繁露曰天以終歲之數成人之身故小節三百六十六副日數也大節十二分副月數也蓋小節大節即小溪大谷也針石緣而去之先兄曰張注本於吳氏診病之始五決為紀始紀押韻管子等古書多見之如老子十四章能知古始是謂道紀亦是下虛上實本事方曰下虛者腎虛也故腎厥則頭痛又曰治腎氣不足氣逆上行頭痛不可忍謂之腎厥其脈舉之則弦按之石堅宜玉真圓硫黃二兩石膏半夏各一兩硝石一分上細末薑汁糊丸梧子大每服三十丸薑湯或米飲下更灸關元穴百壯良方中硫黃丸亦佳用硫黃硝石二味徇蒙招尤太素徇作殉楊曰殉蒙謂眩冒也招尤謂目招搖頭動戰尤也尤音宥先兄曰本事方云徇蒙者如以物蒙其首招搖不定目眩耳聾皆暈之狀也故肝厥頭暈腎厥巔痛不同如此沈承之據於此莊子怵然有恂目之志釋文李頤又作眴眩也蓋徇蒙即眩冒又檀弓詠斯猶注吐猶當作搖聲之誤也搖謂身搖動也秦人猶搖聲相近堅按楊説為是而先兄意相符但楊以招尤屬之頭目似謬考説文柖樹搖貌段曰榣各本作搖今正搖樹動也段氏注曰柖之為言招也樹高大則如能招風者然漢志郊祀歌體招搖若永望注招搖申動之貌按此招搖與柖榣同又頁部曰𩑣顫也段注曰按玄應書兩引説文皆作𩑣云謂掉動不定也蓋演説文語通俗文云四支寒動謂之顫𩑣今按玄應書又曰載𩑣字體作顫又作𢥇同之見反蓋上虛下實故眩暈昏冒身體振掉不能自持此恆見之證也説文顫頭不定也又有版字曰顫也玉篇𤴨尤咒切頭搖也與𩑣同據此楊注似宜從然尤既與搖同且招尤連言不必系頭目頭動故從頁實非招尤本義也如顫字則本是頭動假以為身搖本事方曰上虛者肝虛也故肝虛則頭暈又曰頭暈清頭目治肝厥鉤藤散鉤藤陳皮半夏麥門冬茯苓茯神人參甘菊花防風各半兩甘草一分石膏一兩上粗末每服四錢水一盞半生薑七片煎服甚則入肝先兄曰張云此下三節不言甚則入藏蓋文之缺而義則同也䐜脹先兄曰説文䐜起也支鬲胠脅先兄曰按鬲與膈同支拄隔塞也下厥上冒先兄曰冒又作瞀莊子豫適有瞀病李頤曰瞀風眩貌司馬彪云瞀讀為𥈆五色微診先兄曰張云微診沴有精微也外疾先兄曰吳云外疾用心於外而致疾也張云外疾外邪也堅按琦曰二字疑衍上堅而大琦曰上字疑衍王氏以寸口釋之非也堅而大沉實之診陰凝之象也故積氣在小腹與陰五藏別論篇第十一太素全存或以腦髓為藏太素此下有或以為府一句先兄曰海論腦為髓之海六府者至滿而不實也楊曰腸胃更滿故為實也更虛故不滿也飽食未消腸中未有糟粕即胃實腸虛也食消以下於腸胃中未有食入即腸實胃虛也以其胃虛故氣得上也以其腸虛故氣得下也氣得上下神氣宣通長生久視氣口先兄曰經脈別論四時氣篇作氣口五色篇終始篇作脈口六節藏象論禁服篇作寸口六府之大源也先兄曰海論胃者水穀之海其輸上在氣街下至三里皆出於胃變見於氣口楊曰胃為水穀之海六府之長出五味以養藏府血氣衛氣行手太陰脈至於氣口五藏六府善惡皆是胃氣所將而來會手太陰見於氣口故曰變見也故五氣入鼻至不利也琦曰此與上文義不屬有遺脫也凡治病至與其病也楊曰療病之要必須上察人迎下診寸口適於脈候又觀志意有無有志意者不可為巫及説療疾復觀其人病態能可療以不堅按適猶調也宜參離合真邪論即平人氣象論平息以調之為法之義楊志意注非是蓋不過言病者之苦喜厭欲耳異法方宜論篇第十二太素全存鹽勝血先兄曰五藏生成篇多食鹹則脈凝泣而變色宣明五氣篇咸走血血病無多食鹹砭石太素作𥐦石楊曰瘍養良反瘡也𥐦針破癰已成冷石尉其初起此言東方疾異療堅按𥐦是砭訛玉篇𥐦甫廉切刺也以石刺病也砭同上可以證焉已乏同用猶祀之與示乏犯之與犯楊分砭石為二誤且冷石未審其解陵居先兄曰後漢西羌傳注引作山居褐薦太素作疊篇楊曰不衣者不以綿為衣而以疊篇其身堅按疊篇俟考華食太素作笮食楊曰笮詐白反食物皆壓笮磨碎不以完粒食之毒藥鶡冠子環流篇曰味之害人者謂之毒又曰積毒為藥工以為醫月令孟夏之月曰是月也聚百藥注蕃廡之時毒氣盛灸焫先兄曰志云北方陰寒獨盛陽氣閉藏用艾焫灸之能通按元陽於至陰之下南方者柅原性合萬安方曰岐伯曰南方其地下水土弱霧露之所聚也故瘴氣獨盛於廣南食胕楊曰胕扶付反義當腐扶原作快今改痿厥寒熱楊曰人之食雜則寒溫非理故多得寒熱之病不勞則血氣不通故多得痿瘚之病故導引按嬌則寒熱咸和血氣流通導引按蹻太素作按嬌楊曰嬌巨紹反又曰嬌又九紹反舉平也先兄曰志云宜導引其四支以引氣血之流通也堅按楊注平字當作手説文嬌寒手也又文選長楊賦注引服虔云蹻舉足也據此王注舉手足亦有所本然其云蹻捷者義遂不通得病之情王以性懷釋之恐非志曰得病之情者知病之司於天時或因於地氣或因於人之嗜欲得病之因情也此解亦未允蓋病之寒熱虛實皆得謂之情乃是言得所以為癰瘍為病生於內為滿病為攣痹為痿厥寒熱之情也如余聞虛實以決死生願聞其情玉機真藏論診病之道觀人勇怯骨肉皮膚能知其情以為診法也經脈別論形之疾病莫知其情寶命全形論莫知其情而見邪形也八正神明論索之於經慧然在前按之不得不知其情故曰形同上良工所失不知其情疏五過論愚醫治之不知補瀉不知病情同上正邪之中人也微先見於色不知於身若有若無若亡若存有形無形莫知其情邪氣藏府病形篇可以互證焉千金方曰風者善行而數變在人肌膚中內不得泄外不得散因人動靜乃變其性所謂性者文異而意同但次篇系之病者數問其情者即性懷已方盛衰論追陰陽之變章五中之情其義又異移精變氣論篇第十三太素全存祝由楊曰上古之時有疾但以祝為去病所由其病即已又注次節曰是以有病以祝為由移精變氣去之無假於針藥也堅按上説即王所據方以智通雅曰由內經有祝由説又袖祝榴也即祝段玉裁説文法曰惠氏士奇曰素問黃帝曰古之治病可祝由而已祝由即祝袖也已止也玉裁按玉篇曰古文作袖按惠言出禮説又古鈔真本玉篇言部曰咒大又反説文咒祝也或為袖字在爾部今本説文與此不同而真本玉篇示部繫於缺佚此説似是然據賊風篇則舊注為當又格致餘論虛病痰病有似邪祟論曰或曰外臺祕要有禁咒一科庸可廢乎豫曰移精變氣乃小術耳可治小病若內有虛邪外有實邪當用正大之法自有成式昭然可考按外臺祕要無禁咒科千金翼方聖濟總録等有之蓋古祝由之法不傳故朱氏有斯言僦貸季太素無僦字楊曰貸季上古真者也草蘇草荄之枝本末為助太素蘇作荄助作眇堅按太素非是莊子天運篇蘇者取而爨之釋文李云蘇草也方言江淮南楚之間謂之蘇方言蘇芥草也原識草夕又草字錯草荄之枝猶言草荄與枝之字古有與義詳見王引之經傳釋詞一者因得之宋陳言以三因極一命其書實本於此段而且以此因字為病因之義蓋張注之謬所自來也湯液醪醴論篇第十四太素全存五穀五音五味篇麥大豆稷黍麻與月令同程瑤田九穀考曰素問金匱真言論五方之谷曰麥黍稷稻豆鄭氏注職方氏之五種曰黍稷菽麥稻漢書地理志引職方氏師古注之全同後鄭管子書多周秦間人所傅益其地員篇載五土所宜之種曰黍秫菽麥稻淮南子正谷注菽麥黍稷稻漢書音義韋昭曰五穀黍稷菽麥稻也自金匱真言以下説並不異而五常政大論則又進麻為木谷至火谷則麥黍互用程氏更舉數説茲不繁引湯液及醪醴楊曰醪汁澤酒按澤當滓醴宿酒也堅按扁鵲傳曰其在腸胃酒醪之所及也考周禮酒正辨五齊之名一曰泛齊二曰醴齊注泛者成而滓浮泛泛然如今宜成醪矣醴猶體也成而汁滓相將如今恬酒矣醴有清有糟宜考周禮及內則注疏惠士奇禮説曰酒正四飲漿人六飲皆有醫醫者古之湯液今之酒漿也故漿人掌之酒正辨焉説文醫治病上殹者惡姿也得酒而使一曰殹病聲酒所以治病周禮有醫酒效祀志順風作液湯如淳曰藝文志有液湯經其義未詳愚按內經黃帝問曰上古聖人作為湯液醪醴然則古之治病未有毒藥針石先有湯液酒醪故謂之醫此説稍精然熟考注疏所謂醫者與醴無大異而經文下一及字則湯液與醪醴其品蓋殊竊以為稱云湯液則恐是煮米取汁者而醪醴者是醞釀所成也要之邈古之物無由確知耳元人施圓端效方制有湯液方姑存於下湯液方治諸虛百損氣血勞傷因病久深變生膈氣腹脅刺痛噎痞心胸食結不消噦逆嘔水翻胃吐食大便硬祕形瘦體枯以致難救者越信之黃米糯米各三升同醋煮粥曲細末三斤量寒溫和器內停發過沉澄之時又入餳稀六斤等候再糟粕訖日自然上清下澄以成湯液晝夜十二時辰停分三度度一服氣藥膈氣丁沉藥後停待一時溫服湯液一盞液後又候一時更吃白餳數塊日夜長短品二服飲液食餳均九度飲食湯液造作煎烹食藥相應頤生養氣而以樂天知命實腹虛心百日獲安知故者衆稻米程瑤田九穀考曰説文稻稌也稌稻也周禮曰牛宜稌糯沛國謂稻曰糯案稻稌大名也糯糯也其黏者也字林糯黏稻也粳之為言硬也不黏者也字林粳稻不黏者南方謂之秈廣雅秈粳也玉篇秈粳稻也七月之時十月穫稻月令季秋嘗稻注云稻始熟也為此春酒以介眉壽月令仲冬乃命大酋秫稻必齊內則雜記並有稻醴左傳進稻醴粱糗內經黃帝問為五穀湯液及醪醴岐伯對曰必以稻米炊之稻薪皆言釀稻為酒醴是以稻為黏者之名黏者以釀也𪐎黏句黍稷黏句秫皆可以釀者也內則糝配餰同用稻米籩人職之餌糍注亦以為用稻米皆取其黏耳先兄曰高雲湯液醪醴五穀皆可為之而秋成之稻穀尤佳志云稻得春生夏長秋收冬藏之氣具天地陰陽之和者也稻薪謂禾稗也以供炊爨甚佳神不使也張曰凡治病之道攻邪在乎針藥行藥在乎神氣故治施於外則神應於中使之升則升使之降則降是其神之可使也若以藥劑治其內而藏氣不應針艾治其外而經氣不應此其神氣已去而無可使矣雖竭力治之終成虛廢已爾是即所謂不使也榮泣太素泣作澀其有不從毫毛生而宋本生而易位津液充郭太素充作虛郭作廓楊曰腎傷竭也廓空也堅按根結篇滿而補之則陰陽四溢腸胃充廓五癃津液別論消穀則蟲上下作腸胃充廓上膈篇蟲寒則精聚守於下管則腸胃充郭原識引文有訛爾雅廓大也方言張小使大謂之廓蓋靈樞充廓似張大之謂如本篇未必是存考又脹論夫脹者皆在於藏府之外排藏府而郭胸脅脹皮膚楊曰氣在其中郭而排之亦張大之謂下文曰胸腹藏府之廓也其義蓋殊平治於權衡先兄曰吳云平治之法當如權衡陰陽各得其平勿令有輕重低昂也堅按雞峰普濟方引初和甫曰去遠陳莝謂滌腸胃中腐敗也脈浮如稱衡之在上即發汗鬼門汗空也脈沉如稱槌之在下即利小便淨府小腸也此淨府解謬開鬼門潔淨府先兄曰玉機徵義云鬼門者猶幽玄之謂有毛竅而不見其開闔淨府者謂膀胱內無入孔而外有出竅為清淨津液之府按此鬼門解誤淨府解乃張注所本精以時服琦曰當作復堅按張介賓注有所本不須改玉版論要篇第十五太素全存奇恆者言奇病也太素言奇病也作言奇恆病堅按五藏別論奇恆之府亦奇於恆常之謂道之至數楊曰數理也堅按管子注數理也老子注數謂理數也更宜考經籍纂詁神轉不回沉作詰寓簡曰卦終於未濟何也天下之事無終窮也而道亦無盡也若以既濟而終則萬法斷滅天人之道泯矣黃帝書所謂神轉不回回則不轉浮屠所謂不住無為不斷有為者是也容色太素作客色堅按此與全元起合王以他氣注之恐原本亦作客色也又論衡曰妖氣見於天容色見於面面有容色雖善操行不能減死徵已見也據此古或有容色語當考色夭面脫不治太素作其色赤面兌不為治楊曰宛按當兌字尖小謂面瘦無肉也堅按太素經注並難從病溫虛甚死張曰病溫邪有餘虛甚正不足正不勝邪故死志曰正氣虛甚邪惟內侵邪盛正虛必死之候也堅按據王注傷寒真死下虛人者即是搏脈痹躄先兄曰張云上文言奇恆之色此下言奇恆之脈診要經終論篇第十六太素佚人氣在心先兄曰吳云地氣始閉陽氣在中人以心為中故人氣在心也人氣在腎琦曰按本文言人氣所在與金匱真言四時刺逆從諸義不同三月四月之在痹九月十月之在心尤難曲解始依王義説之以俟知者又曰此下與四時刺逆從論語相出入然彼文為得蓋所傳異辭不無錯入也散俞先兄曰按散俞對本輸而言譬若太陰肺經除少商魚際太淵經渠尺澤之外共為間散之穴謂之散俞寒熱病篇春取絡脈夏取分腠秋取氣口冬取經輸四時氣篇春取經血脈分肉之間甚者深刺之間者淺刺之夏取盛經孫絡取分間絶皮膚秋取經俞邪在府取之合冬取井滎必深取之水熱穴論春者木始治肝氣始生肝氣急其風疾經脈常深其氣少不能深入故取絡脈分肉間終始篇春氣在毛夏氣在皮膚秋氣在分肉冬氣在筋骨云云蓋春氣始生之際邪氣入淺故其刺亦不欲深故刺間散之穴也直下先兄曰吳云直下言直刺而下不必按而散其衛氣也解墮呂覽季秋紀曰行春令則暖風來至民氣解墮月令作解惰釋文解古買反惰徒臥反釋名曰懈解也骨節解緩也益嗜臥又且善夢先兄曰吳云刺夏分而傷心則神疲而嗜臥心虛神不安故又善夢布憿先兄曰吳云以布憿著之者以胸腹近於五藏遮風寒也馬雲從布上刺者不欲深入也志定著之解繫於誤讀王注形定目睘韓非子外儲説肦然環其眼注環轉其眼以作怒也吳蓋本於此張子和十形三療曰清州王之一子年十餘歲目赤多淚衆工無效戴人見之曰此兒病目睘當得之母腹中被驚云云此與少陽經終其證自殊善驚妄言琦曰陽明病聞木音則惕然驚罵詈不避親疏一由土虛畏木一則熱盛鑠心非陽明之絶症王氏據以説此誤也堅按此説不必不仁楊注痹論曰仁者親也覺也營衛及經絡之氣疏澀不營皮膚中故皮膚不覺痛癢名曰不仁堅按成無己注平脈法曰仁者柔也不仁者言不柔和也為寒熱痛癢俱不覺知者也又曰不仁為強直而無覺也趙大中風科集驗名方曰中風不仁者蓋仁為衆善之長主溫和慈順今則四肢強直不能舒捲筋攣緊急是由榮衛不通故為不仁也二氏以強直為解欠核
