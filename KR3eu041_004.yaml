body:
  text: 卷第四病能論篇第四十六太素存但病風腰痛一節缺風論及其病能王注曰能謂內作病形一切經音義恣態下曰古文作能當候胃脈楊曰得胃脈者寸口脈也又曰平人手之寸口之中胃脈合浮與大也今於寸口之中診得沉細之脈即知胃有傷寒逆氣堅按楊說不穩醫學讀書記曰云當候胃脈者謂趺陽也趺陽脈不必沉且細而今沈且細者氣逆於上而下乃虛下虛則沉細也人迎甚盛者氣逆於上則上盛上盛故人迎甚盛夫氣聚於上而熱不行胃脘壅遏得不畜積為癰耶琦亦以為趺陽曰蓋胃癰之候寸口之脈未有不洪數者然診趺陽創於仲景內經所未見則此說亦難從精有所之寄則安云曰太素作精有之倚則不安按與新校正引小異懸上有往字堅按古鈔本無之字琦曰懸某病未詳疑有誤似是王注處字古鈔本無偃臥廣雅偃仰也脈大先兄曰滑云脈謂脈隧也癰氣之息楊曰息增長也堅按此說謬蓋癰氣之息是膿未成者氣盛血聚是膿已成者怒狂太素作喜怒下善怒亦作喜怒生鐵洛太素洛作落楊曰生鐵落鐵漿之也堅按楊亦誤下氣疾也桓談新論云子云亦言成帝詔作甘泉賦卒暴遂倦臥夢五藏出地以手收內之及覺氣病一年意林引蓋氣病即氣疾也身熱解墜太素熱作體澤瀉術各十分麋銜五分仲景方於丸散特用分字亦是裁分之謂非六銖之分即與本經同義張氏醫通曰石頑治牙行陶震球子傷勞咳嗽失血勢如泉湧服生地黃墨汁不止余及門周子用熱童便二升而止邀石頑診之診得弦大而虛自汗喘之至夜則煩擾不寧與當歸補血湯四貼而熱除時覺左脅刺痛按之漉漉有聲此少年喜酒負氣嘗與人鬥狠所致與澤術麋銜湯加生藕汁調服大便即下纍纍紫黑血塊數日乃盡後與四烏鰂骨一藘茹為末分四服入黃牝雞腹中煮啖留藥蜜丸盡劑而血不復來矣為後飯琦曰證雖在表而欲其下滲故先藥後飯奇病論篇第四十七太素全存無治也張子和治病百法舉此段曰雖有此論可煎玉燭散二兩水一碗同煎至七分去滓放冷入蜜少許時時呷之則心火下降而肺金自清故能作聲也按玉燭散繫於四物湯承氣湯朴消各等分水煎出三法六門刺法曰至疹成也甲乙無刺字蓋作溢下文蓋字猶作益知溢是訛文疹作辜故曰疹成也作故曰成辜琦曰此節蓋他經脫文息積吳以為肺積張以為喘促息難俱襲王注之謬三因方舉本證擬有磨積丸胡椒木香全蠍化氣湯縮砂仁桂心木香甘草茴香丁香皮青皮陳皮乾生薑蓬朮胡椒沉香及導引法文繁不録尺脈數甚太素無脈字楊曰尺按當膚字數按當筋字急見出者此為疹筋筋急腹急此必金水垂按當作乘肝故色白黑即甚也有本為尺瘦也堅按太素為是一作尺瘦者尤是蓋血液虛少故尺肉削減即為腹筋豎急之診此脈字芟去而素靈中遂無尺部診脈之說矣難經經釋於十三難下曰今去經文大小字而易數字數者一息六七至之謂若皮膚則如何能數按所言經文者邪熱氣藏府病形篇也厥逆白附子散出雞峰普劑方據續易簡方本王子亨方琦曰按王氏引全注僅見此條五氣楊曰五氣五穀之氣也琦曰五當作痹堅按二說非是肥者令人內熱琦曰食肥則陽氣滯而不達故內熱食甘則中氣緩而善留故中滿中滿而熱脾氣上溢故口甘也膽募俞楊曰可取膽募日月穴也有癃者楊曰癃淋也堅按六書故曰人病小便淋瀝不通者今謂之淋古作癃云云淋犁針切又良中切癃良中切史記孝景本紀索隱曰隆慮音林閭避殤帝諱改之又宣明五氣篇不宜參琦曰癃而數溲熱鬱而氣不化也頸膺如格上焦閉拒也人迎躁甚胃熱也喘息氣逆肺邪實也太陰寸口之脈微細如髮肺藏虛也此肺之治節不行故水道不利而肺之受熱由陽明積熱上壅肺受熱淫格逆於上故也五有餘二不足凡病虛實相錯者藥有所顧忌下手最難此即是也仲景稱云難治者亦皆虛實相錯之證也巔疾太素作癲疾病名為胎病楊曰人之生也四月為胎母按當為字人物亦驚神氣並上驚胎故生已發為癲疾也堅按說文胎婦孕三月也段校曰玄應兩引皆作二月巢源千金並曰妊娠三月始胎仍知楊注四字蓋是三訛然此胎字要不過在孕之謂不必限某月痝然太素作龐然楊曰龐然者麵皮起之貌切其脈大緊緊弦不同今大且緊故三以如弓弦釋之歟大奇論篇第四十八太素全存肺之雜喘而兩胠滿太素雍作癕下同胠作脅楊曰肺以主氣故肺生癰有喘也肺脈上膈近脅故肺癰脅滿也又注肝雍曰兩胠謂在側葙兩肋下空處堅按楊以雍為癕讀訛不得小便楊曰有本作小和字誤脛有大小髀䯒大先兄曰張云足脛或腫或消是謂大小自髀至胻或為大跛易楊曰左右二腳更病故為易也堅按楊注非是心脈滿大癇瘛筋攣楊曰心脈滿實仍大是則多氣熱盛故發小兒癇病以其少血陰氣不足故寒而筋攣也肝脈驚暴太素騖作驚非是琦曰騖暴迅急鼓動之意陽氣不安故為驚駭得之脈不至若喑本事方氣中下曰經云無故而喑脈不至不治自已謂氣暴逆也氣復則已石水楊曰石水謂盛冬凝水堅硬如石名曰石水言此水病之甚也堅按此說難從並小弦欲驚太素欲作亦先兄曰吳云欲者萌而未然也琦曰句疑有誤心脈搏滑急太素搏作揣下並同楊曰揣動也滑陽氣盛而微熱急為多寒心氣寒寒盛而微熱寒勝故為心疝也為瘕楊曰瘕謂女子宮中病男子亦有瘕而為病又曰男子為瘕女子為石瘕之病堅按楊說非二陰急為癇厥楊曰二陰少陰也候得少陰脈急是為陰與陰急陽勝發為小兒癇病手足逆冷也腸澼太素澼並作闢血溫身熱者死醫學讀書記曰按溫當作溢夫血寒則凝而不流熱則沸而不寧溫則血之常也身雖熱何遽至死惟血既流溢復見身熱則陽過亢而陰受逼有不盡不已之勢故死今人失血之後轉增身熱咳嗽者往往致死概可見矣琦曰下血家脈靜身涼者愈身熱則陰陽離絶故死溫字疑誤堅按血溫二字難解二說並覺有理竊疑下文有血衄身熱者死此一句或誤文復出也其脈小沉澀為腸澼太素此八字無其身熱者死楊曰身熱以胃氣散去遠至七日死琦曰陰下陷而陽外𮂡也男子發左女子發右醫學讀書記曰按玉版論要云男左為逆右為從女子右為逆左為從本文蓋謂男子發左女子發右於法為逆然不喑舌轉則受邪輕故證雖逆而猶可治若男子發右女子發左於法為從然喑則受邪重證雖從必三歲必起也設逆而邪重者必死不治從而邪微者奚行三歲而後起哉琦曰男以陽為主女以陰為主左右者陰陽之道路也陽自左升陰從右降男子發右陰病而陽未病女子發左陽病而陰未病若男子發左女子發右則為生者病矣懸鉤浮為常脈常脈脈經作熱太素作脈皼按即鼓字楊曰夏秋二脈並至以為脈皼堅按脈經太素經注並非琦曰懸者如物之懸鉤者中微曲懸鉤即芤脈為失血之常脈以去血故中空也此與原識意合暴厥脈經太素並作氣厥堅按氣厥似是蓋是許學士所謂氣中與氣厥論之氣厥不同證治要訣曰氣厥即中氣盧氏丹溪纂要曰氣中即俗謂之氣厥是然惜不引脈經文如火薪然脈經太素薪作新楊曰心脈如勾今如新燃是心脈急疾精𨾮木故至草乾水時被克而死堅按作新似是王注新然之火焰云云此似王本經文原作新字然宋本並作薪如散葉太素葉作採楊曰肝脈如弦今散加五彩變見不定是為肝木氣之虛損至木草𣐂落金時被克而死有本為藂草木木散草𣐂也堅按叢棘散葉其義自異琦曰叢棘弦硬雜亂之象為是如省客省客者脈塞而鼓太素客並作容塞作寒懸去棗華楊曰至棗華土時被克而死也如丸泥脈經丸泥錯楊曰胃脈耎弱今反如丸泥干堅之丸即是胃土兼氣之有損故至榆莢木時而死也禾熟楊曰至禾熟秋金時被克而死也胞精楊以胞為心胞謬如交漆太素漆作英可疑三十日死脈經三作四如湧泉云云太素湧字無肌作胞英作華楊曰足太陽腎之府脈今如泉之浮皼而動即膀胱胞氣水之不足故至韭英按英字衍華土時被克而死一曰韭英也琦曰少氣味三字衍如頽土之狀脈經太素並作委土琦曰頽敗之土五色先見黑白壘發死太素無見字壘作纍脈經曰壘下注云一作藟堅按齊民要術引詩義疏曰櫐巨荒也似燕薁連蔓生葉似艾此二字據詩釋文補白色子赤可食酢而不美幽州謂之椎櫐如懸雍太素亦作懸離水凝而死脈經水作冰太素死下有亟字菀熟太素菀作宛大腸氣太素作膽氣如華云云脈經華作舂楊曰脈之浮散故如華也心府小腸虛小按小空似剩故多恐坐臥不安心虛耳中如有聲故恆聽脈解篇第四十九太素全存先兄曰吳云脈解者所以解古脈論也故每條皆有所謂字者字在首太陽所謂腫腰脽痛楊曰脽尻也音誰也十一月一陽生十二月二陽生正月三陽生三陽生寅之時其陽已大故曰太陽也堅按經脈篇膀胱足太陽有腰痛正月太陽寅先兄曰馬雲膀胱諸證豈盡在正月哉特論與時相應之義有如此耳蓋虛實在人隨時為病不必盡在正月也堅按弟子掘川濟曰此篇以足三陽三陰配之六月太陽為正月厥陰為三月陽明為五月少陰為七月少陽為九月太陰為十一月三陽三陰每互其位而必隔一月今本經七月誤作十月殊為不倫須從太素是正此說極確陽氣東解太素作陽凍解楊曰正月已有三陽故凍解陽氣出於地也先有三陰故猶有冬寒陽氣不足也人身亦爾半身不足故偏虛跛謂左腳偏跛也堅按楊偏虛解宜從強上引背太素無引背二字萬物盛上琦曰萬物二字衍狂巔疾太素巔作癲楊曰脫衣登上馳走妄言即謂之狂僵仆而倒遂謂之顛也喑楊曰喑不能言也堅按楊本於說文喑義具於原識宣明五氣篇下喑俳太素俳作痱楊曰陽氣外衰故為喑也左按疑若字腎氣內虛𨾮木而厥者則為喑痱按此下宜更補痱字音肥風病不能言也謂四支不用喑不能言心無所知甚者死輕者生可療也堅按爾雅痱病也郝懿行爾雅義疏曰通作腓詩百卉具腓傳腓病也釋文引韓詩云變也變病義近聲又相轉文選戲馬臺詩注引毛詩作痱今作腓玉篇引詩正作百卉具痱可知腓古本作痱矣說文俳戲也張以為無所取義者是心脅痛經脈篇膽足少陽有心脅痛不可轉側轉訛作盛也言少陽盛也盛者太素盛並作成楊曰成為九月九月陽少故曰少陽也小島尚質曰成蓋戌誤故為躍楊曰躍勇動也琦曰此有誤衍不可讀灑灑振寒經脈篇胃足陽明有灑灑振寒邪客於藏府間先兄曰吳云藏肺藏也府胃府也脾土不能制濕故上於肺而為水喘甚則厥云云經脈篇痛至則惡人與火聞木聲則惕然而驚心欲動獨閉戶塞牖而處甚則欲上高而歌棄衣而走陽盡而陰盛盡者猶傷寒論血弱氣盡之盡即陽氣不振之義非竭絶之義琦以為陽明極虛缺當客孫脈太素脈作胳楊曰太陰經脈至於舌下太陰孫胳胳於頭鼻故陽明並於太陰孫胳致鼽腹脾也堅按經脈篇唯有鼽衄上者則其孫絡太陰也琦曰上者句有脫誤病脹楊曰十一月陰氣內聚雖有一陽始生氣微未能外通故內癰為脹也堅按經脈篇脾足太陰有腹脹善噫得後與氣則快然如衰上走心為噫新校正駁王注蓋本於楊氏食則嘔楊曰胃中食滿陽氣銷之今十一月一陽力弱未能熱消故胃滿而溢謂之嘔此嘔吐也堅按經脈篇有食則嘔得後與氣快然如衰太素如並作而十月太素作七月楊曰七月秋氣始至故曰少陰嘔咳上氣喘經脈篇有咳唾則有血喝喝而喘又有上氣色色不能久立久起云云太素色色作邑邑久坐之久無䀮䀮並作𥇀𥇀楊曰七月陰陽氣均未有定主秋氣始至陽氣初奪故邑然悵望不能久立又陰陽內各不足故從坐起目𥇀無所見也有本作露但白露即露之微色按疑當作霜文微也十月已降甚霜即知有本作十月者非也堅按太素經注並是說見上經脈篇有坐而欲起目䀮䀮如無所見恐如人將捕之經脈篇氣不足則善恐心惕惕如人將捕之所謂惡聞食臭云云楊曰七月陽衰胃無多氣故惡聞食氣也琦曰此疑陽明節脫文誤次也陽氣未盛於上而滿琦曰未字衍太素脈作腹並難從㿗疝太素㿗作頽楊曰頽謂丈夫少腹寒氣成積陰器之中而痛也疝謂寒積氣上入小腹而痛也病在少腹痛不得大小便病名曰疝也㿗癃疝膚脹太素㿗作釘楊以為釘腫蓋非經脈篇肝足厥陰有遺溺閉癃琦曰此節按言厥陰一節文多訛缺按此篇以十二辰分配經脈義殊無當而論病理本於藏府陰陽衰盛甚確故以意解之琦說稍肆今不敢從刺要論篇第五十太素佚不去矣王所引針經是海論文眩冒下更有目不能見懈怠安臥二句安臥與不去其義相發刺齊論篇第五十一太素佚刺禁論篇第五十二太素刺中心以下缺要害賈誼過秦論要害之郡又要害之處心部於表琦曰部統屬之詞按新校正引太素故曰治今本作故曰里也是刺客主人內陷中脈中馬高為去聲讀是為內漏巢源曰邪隨血氣至再熱氣聚則生膿汁故謂之聤耳王蓋指此刺臂太陰脈馬曰靈寒熱病篇亦有臂太陰以其脈行於臂故可曰手又可曰臂也重虛出血張曰腎既虛而復刺出血是重虛也刺膺中陷中肺陷上疑脫內字琦曰肺脈之訛為漏上文有內漏著至教論上為巔疾下為漏病王注漏血膿出此唯注目漏其意亦恐謂膿漏出巢源有目淚出不止候又有目膿漏候曰風熱客於瞼眥之間熱搏於血液令眥內結聚津液乘之不止故成膿汁不盡謂之膿漏刺志論篇第五十三太素佚氣實形實氣虛形虛氣之虛實不啻驗之於脈亦必驗之於息故張注氣多為喘滿也更宜與玉機真藏論相參得之傷寒得之傷暑此二句對舉以示寒暑二邪初受之略蓋至其傳化則非一言所蔽馬注此段以虛實直訛非是此之謂琦曰三字衍夫實者氣入也虛者氣出也琦曰氣內守則實氣外泄則虛申虛實之義非謂邪氣也針解篇第五十四太素全存氣實乃熱也氣虛乃寒也太素無此二句堅按疑是注文所錯滿而泄之十二原篇作滿則泄之為虛與實者先兄曰高本與作為十二原篇同針窮其所當補瀉也太素窮作官所下有之字所謂三里者張曰按此下言取穴之法非本篇上下之義意必他篇之文脫誤於此者蹺足胻太素作搖𠳮足胻楊曰𠳮高也謂此外踝上高舉處也搖而取之人齒面目應星先兄曰志云靈樞經云天有列星人有牙齒高曰人面目光明齒牙排列一如星之明朗排列人心意應八風此以下至應之九琦曰句不可解亦爛文也堅按此與原識合長刺節論篇第五十五太素全存頭疾痛至傍四處太素頭疾錯無上字陰作陽楊曰藏針之法刺在骨部不得傷於骨肉皮部皮者乃是取其刺骨肉之道不得傷余處也刺頭痛者頭為陽也甚寒入腦以為頭疾痛病故陽刺之法正內一傍內四療氣博大者也本作陰刺者字誤耳也先兄曰吳云傷非言傷損既是刺至骨何得無骨肉及皮乎蓋言無得妄為提按動搖而傷骨分肉分皮分之真氣也治寒熱楊注大藏為肺藏為刺肺寒熱非是與刺之要與蓋施與之與金匱玉函經有云與汗之與下之語例相同治腐腫者刺腐上太素腐並作癕堅按此腐字與熱論榮氣熱胕之胕同義然作癰為是刺大者多血小者深之太素無大字小者二字楊曰刺癕之法當癕上刺之大者深之小者淺之堅按不如甲乙之為穩為故止故常法也詳見離合真邪論先兄曰吳云止者無他求之意皮𩩻太素作腹齊楊注義不了不録琦曰按經云刺皮𩩻以下至少腹而止不得指齊下五寸並不得云齊下橫骨之端也當以全氏義為得矣堅按琦駁王林則當其從全氏者誤䯏骨端也本見說文䯏玉篇光末切廣韻古活切皮字未晰張解以橫皮可疑髂髎楊曰髂客罵反脊骨兩旁也髂源作轄今意改客罵字亦可疑廣韻枯駕切寒氣至高曰寒氣至骨其道太素作至其刺之虛脈先兄曰張云謂寫其盛者便之虛也必視針下諸分盡熱則氣至邪退其病已而止針也病初發琦曰下應脫不治二字堅按琦說謬病風且寒且熱楊曰風成為寒熱一日數度寒熱並汗刺諸分腠胳脈復且寒且熱三日一刺分劑也汗出且寒且熱琦曰六字衍皮部論篇第五十六太素全存皮有分部先兄曰志云分部分屬之部署也脈有經紀經經常紀別理月令毋失經紀以初為常筋有結絡楊曰十二經筋各有結聚各有草它胳以經脈為紀楊曰欲知皮之部別十二經為綱紀也以滲於內諸經皆然楊曰滲山蔭反下入也琦曰故在陽者以下有訛誤不可解關樞陰陽離合論太陽為開太素開作閞而楊注以為關者主禁闔者門扉主開閉此足以徵原識之確矣又樞杼關樞是三陽中有二樞仍疑關樞之樞蓋字之誤也樞儒太素儒作擩楊曰而泉反堅按擩蓋檽訛楊音謬其入經也至內注於骨太素出下有經字無內字琦曰義未詳亦有訛誤心主之陰琦曰心主當作厥陰關蟄太素蟄作樞訛陰陽離合論太陰為開太素開作閞是故百病始生也此段論邪之所入分為三等然其所主在入絡客經而又言其留而不去者或廩於腸胃或留於筋骨之間也必先於皮毛太素於上有客字感虛乃陷下太素感作減楊曰咸氣為虛乃血少脈陷也不與楊曰在淺不療遂生大病也與療也堅按楊說難從經絡論篇第五十七太素存無黃帝問曰四字直與前篇連接氣穴論篇第五十八太素全存氣穴楊曰三百六十五穴十二經脈之氣發會之處故曰氣穴也溢意楊曰溢意縱志也捧手楊曰捧手端拱也逡巡太素作遵循楊曰遵循音逡巡及上紀太素此下有下紀二字是楊曰任脈上於脊裡為經胳海其浮而外者循腹裡當齊上胸至咽喉胳唇口故背胸相控痛者任脈之痛也此等諸穴是任脈所貫所以取也之上紀者胃脘也先兄曰高雲胃脘有上脘中脘下脘以臍之上下為紀則此胃脘乃下脘也臍上至下脘臍下至關元分寸相等故曰上紀下紀以臍為中紀其上也故上紀者臍上下脘之胃脘也由臍紀下則下紀者臍下小腹之關元也背胸邪系太素無背胸二字系作擊前後痛澀胸脅痛琦曰任督脈繞篡間故前後二便痛滿任脈氣上壅故有胸脅痛等證交十椎下太素此下有藏字楊曰量此脈行處生病皆是督脈所為下藏者下胳腎藏也完骨先兄曰靈骨度篇云耳後當完骨者廣九寸類經云完骨耳後高骨也肩解先兄曰靈經脈篇手太陽之脈出肩解繞肩胛竇傑針經指南云肩解背後縫蓋髃骨之後與胛相對而陷解處故謂之肩解竇說為妥瘄門一穴太素作肩髃二穴胸俞十二穴太素作肓輸二穴膺俞十二穴太素無十字踝上橫二穴太素橫下有骨實張據王注曰左右共四穴凡三百六十五穴針之所曰行也太素此二句在陰陽蹻四穴下楊曰以上九十五穴通療諸病也堅按太素九十九穴並藏俞府俞熱俞水俞俱三百三十七穴為數最不足孫絡三百六十五穴會先兄曰張云孫絡之云穴會以絡與穴為會也穴深在內絡淺在外內外為會故曰穴會非謂氣穴之外別有三百六十五絡穴也以溢奇邪太素溢作洫楊曰洫謂溝洫水行處也孫胳行於奇耶營衛之氣故曰洫火逼反堅按太素非是邪溢氣壅楊曰以下言氣壅成熱以為壅疽大膕太素作大䐃積寒留舍楊曰以下言寒氣留積溪谷溝洫為痹不仁也肋肘不得伸太素肋肘作時堅按太素似是十四胳脈楊曰十二別走胳脈並任督二脈為十四胳也脾之大胳從脾而出不從脈起故不入數堅按此王注所本內解瀉於中楊曰解別也其諸胳脈別者內寫十脈也十脈謂五藏脈兩葙合論故有十也堅按此亦王所本琦曰按岐伯曰孫絡以下可節此言恐是氣府論篇第五十九太素全存七十八穴太素八作三琦曰今所傳經穴圖足太陽凡百三十穴與此不同且各經穴錯出悉多訛缺難以核計又止言手足三陽與督衝任而不及手足三陰亦遺脫也入發至項三寸半太素作入發項二寸間半寸堅按義難解傍五相去三寸太素三作二楊曰明堂傍相去一寸半有此不同也按楊所舉俞穴與王注同者省而不録且太素經文間有脫句今亦不具載風府兩傍各一楊曰天牖二穴堅按此說非是天牖穴見前篇注俠背以下至尻尾太素背作脊無尾字五藏之俞各五六府之俞客六琦曰五藏六府之俞左右共二十八穴甲乙經有四十一穴大杼風門已見上注不數尚有鬲俞在七椎下中膂俞二十椎下白環俞二十一椎下並去中行二寸上上髎脊兩旁第一空陷中次髎第二空中髎第三空下髎第三空會陽陰尾尻骨兩旁蓋是經惟說藏府之俞故不備也近世又有厥陰俞在第四椎下按厥陰俞既見千金外臺鋭發人鏡經曰耳前髮腳為兌發客主人楊曰一名上關堅按甲乙上關一名客主人耳下牙車之後楊曰大迎一名髓空堅按後足陽明手少陽並有大迎骨空仍如王注為是甲乙頰車足陽明脈氣所發大迎足太陽脈氣所發並與本經不同外臺引甲乙大迎足陽明缺盆楊曰缺盆一名天蓋堅按楊注本於甲乙掖下三寸楊曰掖下左右一寸泉掖按即淵掖避諱作泉字輒筋天池三穴脅下至胠章門維道日月正經氣發也腸哀按腸當作腹大橫此二穴正經雖不言發近此三正經氣也帶脈五樞此二穴少陽彆氣至也上𢨺穴按當居𢨺少陽脈胳別至也左右草二世六穴也是則掖下三寸為脅脅下間之外為胠則胠脅之言可別矣堅按此注非是髀樞中傍各一楊曰環銚居髎左右穴琦曰中傍二字衍足陽明脈氣所發者六十八穴太素八作二額顱髮際傍各三楊曰頭維本神麯差左右也面鼽骨空各一楊曰鼽渠留反鼻表也有鼻塞病非也顴𢨺也堅按甲乙四白在目下一寸向頄骨顴空據此王注為優顴𢨺見於太陽脈注先兄曰易夬九三壯於頄釋文頄求龜反顴也翟玄雲頄面也頄頰間骨也膺中骨間各一楊曰膺中膺窗也左右二穴堅按楊注誤俠胃脘各五楊注無太一有乳根關門作開明蓋字訛俠臍廣三寸各三楊注無外陵有太一下臍二寸俠之各三太素三作六楊曰外陵大巨水道歸來府舍衝門左右十二穴太陰脈穴更無別數所以亦入陽明也分之所在穴空太素之作上曲掖上骨空各一楊曰曲垣左右二穴堅按甲乙曲垣左肩中央曲甲陷者中按之動脈應手據此楊注蓋誤上天窗四寸各一太素窗作容楊曰足太陽遂天容手太陽脈未至天容謂天容字錯未詳所左右八穴肩解下三寸各一楊曰天宗臑輸貞左右六穴鼻空外廉項上各二楊曰迎香天窗左右四穴天窗去手陽明胳近故得其氣也堅按王注為勝柱骨之會各一楊曰柱骨左右二穴堅按楊不斥言何穴角上各一楊曰頷厭左右二穴琦曰即足少陽頷厭二穴重出下完骨後各一楊曰天容左右二穴項中足太陽之前各一楊曰大椎大杼左右及中三穴堅按大杼是足太陽經穴不宜言之前楊說難從琦曰即足少陽風池二穴重出俠扶突各一太素無依字楊曰扶突左右二穴扶突近手少陽經也琦曰即手太陽天窗二穴重出督脈氣所發者二十八穴項中央二太素八作六二作三楊曰項中央者項內也非唯當中也故項內下行喑門一天柱二為三也上行風府一風池二為三總有六穴也督脈上入風池即為信也堅按楊注牽強不可從大椎以下至脊椎法也太素作大椎以下至尻草節間各一至胝下凡二十一節脊椎法楊曰胝竹尸反此經音枑尾窮骨從骨為正大椎至胝草一節有草間間有一穴則草六穴也按每節間不必有穴二十六穴字有訛明堂從兌端上項下至喑門有十三穴大椎以下至胝骨長強草一節有十一穴凡草四穴督脈氣所發與此不同未詳也至橫骨六寸半一太素六寸半一作八寸一一楊曰鳩尾以下至橫骨一尺六寸寸有一穴有十六穴並已前有一十八穴也明堂中央任脈氣所穴合有十六此經從璇機以下至庭中穴合穴此經從璇機以下至橫骨雖放下分寸復與明堂不同亦未詳也琦曰一上脫各字俠臍下傍各五分琦曰中注四滿一名髓府氣穴一名胞門大赫一名陰關橫骨一名下極堅按並出甲乙經足少陰舌下太素此上有五藏之輸各凡五十穴十字骨空論篇第六十太素全存惡寒太素作惡風寒譩嘻楊曰上譩一之反下嘻火之反謂病聲也按病疑痛訛肩上橫骨間楊曰失枕為病可取肩上橫骨間謂柱骨間䏚絡季脅馬曰䏚絡者䏚間之絡堅按䏚絡季脅義未晰八髎太素作九𢨺堅按此王氏所非還刺寒府琦曰還疑衍字膝外附骨解間當足陽明之陽關穴謂之寒府者義未詳或有誤字寒府在附膝外解營太素無附字楊曰寒熱府在膝外解之營穴也名曰骸閞也取膝上外者楊曰凡取膝上外解使拜者屈膝伏也取湧泉者屈膝至地不伏為跪也任脈先考曰任為衽之義其脈行腹中行猶衣衽之在於腹前也先兄曰說文䘳交衽也衽衣䘳也衝脈先兄曰說文沖通道也春秋傳云及沖以戈擊之沖四通道也至胸中而散琦曰散者布散之意衝脈為十二經之海灌滲溪谷故曰散也帶下先兄曰一切經音義引蒼頡篇云帶下婦人病也又曰帶音當賴反人作䐭同字林女人赤白帶二病也關中多音帶三蒼下漏病也督脈者起於少腹以下骨中央楊曰八十一難云起於下極橫骨一名下極即是少腹之下也骨之中央髖骨中央也又八十一難云起下極之輸並脊上行至於風府按難經有入屬於腦四字為陽脈之𣒫按此一句是呂廣注義亦同也廷孔太素作庭孔篡間太素篡作簊下並同堅按玉篇簊居其切無所取義顧繫於篡字之壞長刺節論新校正別本篡一作基不孕癃痔太素孕作字楊曰有本無痔字治在骨上甚者在齊下營楊曰骨上量是骶骨督脈標也齊下營者脈本也營亦穴處也喉中央楊曰廉泉也堅按今云在缺盆中則王注為是立而暑解醫學讀書記曰暑解當是骨解言骨散隨如解也骨與暑相似傳寫之誤也琦改暑作引曰解懈同起而引懈痿弱不任地之謂堅按二說俱不確骸關太素作厭關楊曰厭開骸閞也膝骨相屬屈伸之處也堅按作厭非是拇指太素拇作母楊曰母指小母指也足少陰足太陽皆行膕中至足小指故療其膕也堅按先兄曰易咸初六咸其拇虞翻曰拇足大指也又解九四解而拇馬融曰足大指莊子駢拇枝指出乎性哉駢於足者連無用之肉也關楊曰膕上髀樞為閞也背內楊曰背內謂足太陽背輸內也琦曰背上俞穴主內者取之王注謂大杼非也陽明中俞髎楊曰足陽明中輸謂是巨虛上廉也𢨺輸穴也若別治巨陽蔭榮太素少陰榮作少陽榮楊曰若胻痛若別可足太陽足少陽二脈營穴也按可字下恐有脫堅按足少陽經出膝外廉下外輔骨之前直下抵絶骨之端則太素似是淫濼脛酸云云太素脛酸字無外下有踝字五作四楊曰濼羅各反淫濼膝胻痹痛無力也外踝上五寸足少陽光明穴也少陽維者在四寸中也輔骨上橫骨下為楗楊曰膝輔骨上橫骨下為楗俠髖為機太素髖作䯘楊曰髖孔昆反又音完堅按䯘髖同用先兄曰機髀骨之入樞者在臀上兩傍其所俠為髖髖則臀上側骨與骼本是一大骨腰旁俠脊平立陷者中按之有骨機關處動者是也骸下為輔銅人經注曰輔骨謂輔佐胻之骨在䯒之外頭橫骨為枕太素頭作項楊曰項橫骨項上頭後玉枕也堅按據藏經音義作項為是說文頄玉枕也玉枕各本作項枕今據段氏所改録髓空在腦後五分太素無在字五作三在顱際鋭骨之下氣府論足陽明脈氣所發有額顱髮際傍各三靈骨度篇曰發所覆者顱至項尺二寸據此顱字似專指前髮際然說文頊頊顱首骨也顱頊顱也並據段注本録阮孝緒文字集略云顱腦蓋也和名鈔引然則項後亦得稱之顱也沈彤釋骨曰頭橫骨中央之下端曰顱際鋭骨是項後下復骨下太素無後字堅按釋骨曰柱骨隱筋肉中者曰復骨先兄曰沈說亦妥數髓空琦曰數字疑有誤或骨空琦曰或字疑有誤先兄曰沈彤雲通回匝口頰下之骨曰或骨按說文或即域本字云或骨者以其骨在口頰下象邦域之回匝也當兩肩楊曰兩肩有本為唇也髆中之陽說文髆肩甲也原識髆誤寫作髃兩骨空之間太素無空字出上膝四寸琦曰出衍字在毛中動下太素動下作動脈琦曰動下當作動脈下扁骨有滲理湊無髓孔太素扁作遍無湊字孔作空楊曰言骨上有空五穀津液入此骨空資腦髓也此骨空種數所在難分有者不可知者故置而不數也堅按扁作遍非易髓無空琦曰四字衍文先灸項大椎太素灸作取楊曰大椎穴三陽督脈之會故灸寒熱氣取明堂大椎有療傷寒病不療寒熱之撅骨太素作厥骨楊曰此脈中血寒而少故取背輸陷也厥骨尾骨互骨也有本厥與骨通為一字巨月反堅按厥盡也椎骨之所盡故稱厥骨乎其厥與骨為一字者蓋指𩪗字也肩上陷者楊曰肩負等穴也足小指次指之間楊曰臨泣等穴也腨下陷脈楊曰承山等動如筋者太素動作痛掌束骨下太素作骭骨下楊曰肝音干𩩲骭穴也按肝當骭幹當於堅按釋骨曰束掌者曰掌束骨足陽明太素此下有灸之二字堅按此與甲乙全氏合巔上一太素作直上動脈即以大傷病法灸之太素作即以大傷痛壯數灸也二十九處太素九作七傷食灸之楊曰傷食為病灸之不得愈者可刺之刺法可刺大經所過之胳出血及飲藥調之陽胳脈也堅按巢源宿食不消候曰令腹脹氣急噫氣醋臭時復增寒壯熱是也或頭痛如瘧之狀水熱穴論篇第六十一太素全存肺者太陰也太素作腎者少陰難從關門不利太素門作閉蓋非上下溢於皮膚先兄曰按有文上下指人身上下之部而言非肺腎之謂地氣上者張曰牝陰也地氣上者陰氣升也以陰從蔭而生水液故曰至陰玄府太素作六府上文藏府作其藏而三字下文所謂玄府者汗空也九字所無並非是水俞五十七處者徐靈胎醫學源流論有水病針法論當參此腎俞太素作此皆腎輸也楊曰尻上五行合草五輸者有非腎俞所發皆腎輸以其近腎並在腎部之內腎氣所及故皆稱腎輸也肺為逆不得臥評熱病論真氣上逆故口苦舌乾臥不得正偃正偃則咳出清水也諸水病者故不得臥分為相輸楊曰腎以主水肺以主氣故曰分之先兄曰按水氣同類肺腎俱為標本故其感病也互相輸而俱受分為胕腫喘呼之證也本是二藏屬陰而水氣之所留也諸家以相輸為二藏之氣以俱受為病氣恐非是也皆藏之陰絡太素作皆藏陰之絡也楊曰是等諸穴皆腎之陰藏所終之輸水客之舍也堅按太素義不了琦曰陰氣所行故曰陰絡內督脈及足陽明穴亦曰陰絡其義未聞帝曰春取絡脈分肉此節太素別為類題云變輸是以知其為錯文琦曰此疑四時刺逆從論中脫文誤次者知四時之治變庶切脈用藥無太過矣其氣少不能深入先兄曰馬雲斯時肝氣雖急天之風亦疾然人之經脈常深而風木之氣常少不能深入於經脈之內僅在絡脈分肉之間志曰風木之氣常達於絡脈分肉之間其經脈之氣隨冬令伏藏久深而始出其在經之氣尚少故不能深入而取之經夏取盛經分腠楊曰三陰盛經也夏日其經熱盛故取其盛經部內分腠陽氣留溢太素留作流堅按此與新校正引別本合陽氣堅盛太素堅作緊楊曰緊盛也陽脈乃去去蓋藏之義宜參脈要精微論蟄蟲將去條以越諸陽之熱逆也楊曰人頭為陽故頭上草五輸以起諸陽熱者也按起當作越而傳為熱王注濕氣內結蓋言無汗證然語意缺妥其釋傳字以轉字換之極是夫寒盛則生熱也楊曰夫陽極則降陰極即升是以寒極生熱熱極生寒斯乃物利之常也故熱病號曰傷寒就本為名耳也調經論篇第六十二太素全存十六部王注蓋本於楊氏肝藏血脾藏肉琦曰五神藏當云肝藏魂脾藏意而此以血肉言者以本篇主血氣身形立說故也蓋互文見意耳而此成形琦曰四字衍守經隧焉楊曰營衛不和百病還生血氣之中故守經隧以調血氣者也之神不足有餘云云先兄曰馬雲此節當分為四段初段言有餘不足皆能為病也是乃本體之病第二段言始時皆能感邪其病必微是乃外感之病第三段言刺其有餘不足之法非刺其邪也第四段方與第二相應乃所以刺其邪也若第三段為二第二段為三則文理自明勿之深斥楊曰斥齒亦反推也勿深推也堅按廣雅曰斥推也王念孫疏證曰跟經音義卷十四引三倉曰斥推也云云又說文推排也是推有開拓之義按而致之太素按作切血有餘則怒不足則恐楊曰肝血有餘於肝所以瞋怒肝血不足於目所以多悲也視其虛經太素視作補楊曰寫其盛經出血所以不怒正補其虛令不泄血所以不悲有本視其虛經也形有餘楊曰形者非唯身之外狀名形舉體皆名微風劉河間保命集曰中風俱有先兆之證凡人如覺大拇指及次指麻木不仁或手足不用或肌肉蠕動者三年內必有大風之至經曰肌肉蠕動名曰微風乃能立虛琦曰按以上論五藏有餘不足形證即未盡其理讀者取其大意可也堅按古書言約而理邃學者宜思索會悟引申隅反如琦之言殆後人之見已血逆於經太素逆作留楊曰十二經血留於營經也或曰血流也按營經之經似羡乃為炅中琦曰血並於陰則裡氣虛氣並於陰則內陽盛故為熱此皆指其盛者言之所謂一實一虛也如以血言則血並於陽為陰出之陽當為外寒也心煩惋太素惋作悗楊曰悗則悶同也善忘琦曰此二條即前二條之輕者氣之所併為血虛云云吳曰邪之所湊必其虛也故為虛焉琦曰氣併為氣實而血虛血併為血實而氣虛然氣血本不相離偏勝則相失故皆為虛則為實焉琦曰惟氣血並於經絡者為實以藏府未動也若邪入內相併皆為虛矣則為大厥琦曰此並之異常也陰陽勻平太素勻作旬堅按勻旬古通紃亦恐同義其生於陽者云云楊曰陰五藏也陽六府也風雨寒暑外邪從外先至六府故曰生於陽也飲食起處男女喜怒內邪生於五藏故曰生於陰也張曰風雨寒暑生於外也是為外感故曰陽飲食居處陰陽喜怒生於內也是為內傷故曰陰堅按生於陽生於陰之陰陽即言表裡楊注非是陰陽喜怒之陰陽蓋指房室楊釋以男女其意為然解精微論曰若先言悲哀喜怒燥濕寒暑陰陽婦女亦是同義琦曰陰陽喜怒者言人之本氣有偏陰偏陽之不同而七情亦隨之偏勝此雖理之所有而其於經者則相畔矣又疏五過論凡欲診病者必問飲食居處寒濕之傷人云云太素無緊字楊曰雨氣上侵濕氣下入有斯異也略不言暑耳寒濕中人致虛有四皮膚收者言皮膚急而聚也肌肉堅者肌肉堅而不迎也按迎字疑營血泣者邪氣至脈中故營血泣也衛氣去者邪氣至於脈外衛氣不行故曰去也衛去之處即為虛也先兄曰按下文陽盛生外熱注有寒外盛則皮膚收之語則王氏原本亦似無不字堅按暑邪其表疏泄必不收堅楊以為略不言暑者坐於不知上文寒暑之為寒溫也琦亦謂寒濕是寒暑之誤不可從聶闢氣不足太素聶作攝按與新校正引異楊曰攝紙輒反分肉間無衛氣謂氣不足也堅按攝字義不了喜怒不節琦曰喜怒不節字衍文或陽逆於上或陽湊於下皆肝家實邪鬱結七情惟怒為肝實故獨言之喜則氣下楊曰喜則氣和志達營衛之行通利故緩而下也堅按此說是琦曰下應作緩拘又曰舉喜悲以統憂思恐驚脈虛空太素無空字熏滿太素作熏藏陽受氣於上焦以溫皮膚分肉之間此二句為下文上焦不通而發以見陰陽虛盛俱使上焦不通而生內外之寒熱矣陰虛生內熱先兄曰王履醫經溯洄集云帝曰陰虛生內熱嗟夫此內傷之說之原乎按此指東垣蓋勞動之過則陽和之氣皆亢極而為火矣況水穀之味又少入是故陽愈盛而陰愈衰也此陰虛之陰蓋指身中之陰氣與水穀之味耳或以下焦陰分為言或以腎水真陰為言皆非也夫有所勞役者過動屬火也形氣衰少者壯火食氣也穀氣不盛者勞傷元氣則少食而氣衰也上焦不行者清陽不升也下脘不通者濁陰不降也夫胃受水穀故清陽升而濁陰降以傳化出入滋榮一身也今胃不能納而穀氣衰少則清無升而濁無降矣故曰上焦不行下脘不通然非謂絶不行不通也但比之平常無病時則謂之不行不通耳上不行下不通則鬱矣鬱則少火皆成壯火而胃居上焦下脘兩者之間故胃氣熱熱則上炎故熏胸中而為內熱也凝則脈不通太素作血涘泣則脈不通堅按涘即凝字陰與陽並太素作陰之與陽氣盛乃內針云云張曰氣張乃內針者因病人之吸氣而入針也針與氣俱出者候病人之呼氣而出針也熱不得還太素還作環楊曰夫虛者多寒得熱為補環轉也疾出於針使針下熱氣不得轉也琦曰熱不得還句誤衍動氣候時太素作動無後時之堅按此與甲乙同之助語辭絡二百六十五節楊曰節即氣穴也堅按宜參六節藏象論然下有經絡支節文則志說似是其病所居太素上有視字焠針太素作卒針楊曰卒窮也痛痹在骨窮針深之至骨出針兩蹻為上楊曰上者勝也繆刺論篇第六十三太素全存楊曰痛病在於左右大胳異於經脈故名繆繆異也堅按此與馬張同義極於五藏之次也先兄曰志云極至也處也巨刺楊曰以刺左右大經故曰巨刺巨大之也堅按吳氏暗得楊意無積者楊曰聚陽病也積陰病也其所發之病未積之時刺然骨前出血也不已左取右太素無不已二字堅按此與甲乙合取五日已太素無取字堅按此與甲乙合臂外廉痛太素外作內楊曰手少陽外關之胳從外關上繞臂內廉上注胸堅按經脈篇手少陽之別名曰外關去腕二寸外繞臂胸中太素經注可疑且以下三節楊並據經脈篇所謂別者為解文繁不録刺手中指次指太素中作小堅按此與新校正意合此新病數日已太素作數日者三字女子有頃已楊曰疝痛者陰之病也女子陰氣不勝於陽故有頃已邪客於手陽明之絡楊曰手陽明偏歷之胳其支者上臂乘肩髃上典頰按典字疑不言至於胸胠而言胸胠痛者手陽明之正膺乳別上入柱骨下走大腸屬於肺故胸滿喘息支胠胸熱也以此推之正別脈者皆為胳邪客於臂掌之間楊曰腕前為掌腕後為臂手外踝後是手陽明脈所行之處有脈見者是手陽明胳臂掌不得屈者取此胳之也堅按手陽明經絡並不循掌中楊說非是利藥楊曰可飲破血之湯利而出之若不愈者可刺云云善悲驚楊曰厥陰之脈入眼故傷厥陰虛而善驚及不樂也志主驚懼故傷少陰之脈令人驚懼俱用前方刺三處之也耳中生風者楊曰人覺耳中有風出者是邪客手陽明胳故用方同之凡痹往來楊曰有痹往來手陽明胳分肉間為痛痹也堅按此說非是邪客於足陽明之經太素經作胳堅按此與全氏甲乙合上齒寒太素上作下楊曰手陽明經入下齒中足陽明經入上齒中不入下齒今言按此脫下字齒寒者足陽明胳入下齒也又尋胳之所生病處不是大胳行處者乃是大胳支分小胳發病者也足中指次指太素無次指二字堅按此與甲乙合氣上奔賁上楊曰賁膈也堅按此與楊玄操合義是腰俞太素無此三字堅按與全氏合引脅而痛太素此下有內引心而痛五字堅按此與全氏甲乙合應手如痛太素如作而堅按此與甲乙合不病則繆刺之太素病作痛楊曰刺十二經所過之處不痛者病在於胳故繆刺也堅按此說為是琦曰此統言繆刺之義應前文脫簡也其意相同齒齲刺手陽明楊曰刺手陽明輸三間等穴不已刺手陽明兌端之穴繆傳引上齒太素引作刺楊曰足陽明胳左病右痛右病左痛可刺上齒足陽明胳堅按太素經注蓋非琦以為此一節當在齒齲條刺其脈入齒中立已下實據高注上絡左角楊曰左角陽也五絡俱竭王氏解竭為閉結甚是猶絶有阻絶之絶身脈皆動吳曰凡人之經脈所以行血氣絡脈所以布精神故絡脈竭而經脈無過令人身脈皆動而形無知也尸厥仲景曰曰尸蹶脈動而無氣氣閉不通故靜而死也後刺足中指琦曰當作大指次指陽明厲兌穴後刺手心主太素無手心主三字琦曰心主二字衍吹其兩耳說苑扁鵲治虢太子尸蹶子明吹耳先視其經脈太素此上有必字此繆刺之數也楊曰數法之也四時刺逆從論篇第六十四太素佚厥陰有餘此段言三陰三陽之有餘不足俱病痹其脈滑病疝其脈澀病積而其理則高說為的當但是故春氣在經脈以下本是別章不宜牽合而為說矣春刺絡脈先兄曰高雲刺絡脈經脈肌肉筋骨必由皮膚而入故不言皮膚但舉四時故不言長夏也琦曰氣未至而奪之氣已衰而泄之皆為逆也亦為虛虛者言之耳令人目不明琦曰診要經終論云冬刺春分痛不已令人欲臥不得瞑眠而有見以腎病刺傷肝分血氣脫泄陽不得入於陰故目不瞑魂不得歸於肝故眠而有見與此證異而理同也大痹生氣通天論大僂大字同語例標本病傳論篇第六十五太素佚先病而後逆者治其本上文治反為逆者即病宜治標而反治本宜治本而反治標之謂此乃言其病本重者後有治逆猶宜治其本病其病本輕倘被醫誤而加重者逆治為本宜救療之仲景所謂知犯何逆及本發汗而復下之此為逆也之類皆可以相發焉病發而有餘先兄曰張云此以氣強弱而言標本也如病發之氣有餘則必侮及他藏氣而因本以傳標故必先治其本病發之氣不足則必受他藏他氣之侮而因標以傳本故必先治其標諸病以次五十三難曰經言七傳者死間藏者生何謂也然七傳者傳其所勝也間藏者傳其子者也呂廣注曰七當作次字之誤蓋難經本據本篇而立言者也著至教論篇第七十五太素佚明而未能彰先兄曰按彰下文以彰經術之義疑於二皇先兄曰疑擬古同用漢書公孫弘傳管仲相齊有三歸侈擬於君注擬疑也言相似也又王嘉傳贊董賢之愛疑於親戚師古曰疑讀曰擬擬比也而道上知天文琦曰而字誤且以知天下琦曰有誤腎且絶朱永年曰腎且絶三字當節斷示從容論篇第七十六太素佚體重煩冤先兄曰吳云肝主筋筋緩則不能收持腎主骨骨痿則艱於舉動脾主四肢四肢衰弱則倦怠無力故皆令人體重煩冤此皆工之所時亂也琦曰脈各有定位定體脈體之變乃病使然何由以別藏惑亂其疑似耶注家望文生義非也於此有人頭痛筋攣先兄曰張云此下言腎病之疑似也夫年長則求之於府云云高雲長猶老也少幼也堅按廣雅長老也孟子公孫丑注長者老者也漢書吳王濞傳注少幼也國語晉語注少稚也曲禮三十曰壯又論語季氏皇侃義疏少謂三十以前也壯謂三十以上也老謂年五十以上也蓋論語之少壯老即本經之少壯長但本經之少是幼稚之稱而所言長者實五十以上之謂也爾雅艾長也曲禮五十曰艾注艾老也俱可以互證夫浮而弦者琦曰此經以脈浮而弦為腎之不足可知凡見弦脈不當用伐肝疏風也沉而石者據上文切之石堅沉即沈按之謂脈浮大虛者先兄曰張云夫脾屬陰為胃之裡胃屬陽為脾之表今脈來浮大而虛則外有餘內不足是脾氣之外絶於胃也脾已去胃故氣歸陽明而脈見如此按血氣形志篇曰陽明常多氣多血刺陽明出血氣故雷公問粗工下砭石而愈者正所以泄陽明之邪實也是脾氣之外絶去胃琦曰外絶去三字有誤或衍也夫二火不勝三水琦曰二火三水不解前所列症亦無脈亂無常之文誤衍也是水氣琦曰水字有誤陽明氣逆上衝故喘咳譬如天之無形吳曰言傷肺傷脾形證縣絶若不明辨譬如天之無象可求地之無方可理張曰天有象地有位若不知之則天若無形地若無理此言三藏之傷形證懸別不能明辨亦猶是也疏五過論篇第七十七太素佚循經守數按循醫事先兄曰張云循經之循因也按循之循察也四德琦曰四德後無說蓋缺文或曰德失之訛也即下篇徵四失矣凡未診病者醫心方無未字按此似引太素者堅按未字無者為優雖不中邪病從內生名曰脫營醫心方邪上有外字營作榮不在藏府不變軀形先兄曰高雲在察也變通也謬必以比類奇恆先兄曰閔士先云比類者言誤五藏脈氣之順逆以比類奇恆之脈或順或逆也斬筋絶脈馬曰筋若斬而脈若絶令澤不息吳曰美澤不能如前滋息矣徵四失論篇第七十八太素佚謬言為道更名自功先兄曰按謬當作嘐說文嘐誇言也孟子何以謂之狂也曰其志嘐嘐然俱可以證又更名恐更各訛坐之厚薄琦曰坐字誤疑當作生堅按此說非是或傷於毒吳曰毒謂草木金石禽蟲諸毒也志曰或偏傷於五氣五味之毒琦曰毒謂食物不時氣味畏忌均能病人無人事琦曰人事上所云貧富勇怯之類也先兄曰疏五過論云受術不通人事不明又云從容人事以明經道治數之道從容之葆琦曰治數即陰陽逆從及藏府經脈之度也從容即比類揆度奇恆也堅按推他語例宜參精微論下從容之葆此之字是指事之詞言治數之道從容安緩而能得之故以為其實也琦從容解誤又張以治數之道接無人事讀亦誤陰陽類論篇第七十九太素佚吳曰篇內論陰陽自為一類故曰類論馬曰首節有陰陽之類故名篇三陽為經二陽為維先兄曰張云經大經也周身之脈惟足太陽為巨通巔下背獨統陽分故曰經維維絡也陽明經上布面下循胸腹獨居三陰之中維絡於前故曰維此知五藏終始琦曰句應在正其理句下至絶作朔晦琦曰至絶作十二字訛誤不可讀古經殘缺淆亂此篇為甚注家穿鑿附會反致貽誤今悉闕之三陰者六經之所主也琦曰王氏以三陰為手太陰則與交於太陰不合諸家以為脾則六經之所主又難強通矣堅按此太陰在三陰之中亦猶十二官十一藏之例上空志心王引之經傳述聞儀禮志趨條曰志者微也玉藻曰卷豚行不舉足不舉足則步趨微小故曰志趨樂記曰志微噍殺之音作志微噍殺四字平列則志與微同義素問陰陽類論曰太陰伏鼓不浮上空志心王冰注曰云云是古人謂微小為志也二陰至肺琦曰二陰不言脈缺文可知繆通五藏吳曰謂六脈同行於身左右交繆貫通五藏也不知雌雄先兄曰張云雌雄如下文云二陰為雌又順氣一日分為四時曰肝為牡藏脾為牝藏皆雌雄之義也溓水說文溓薄缺也或曰中絶小水又曰淹也段玉裁曰楊上善注素問云濂水靜也於此義相近從水兼聲溓或從廉玉篇濂里兼里忝二切薄也濂同上三陽俱起琦曰詳王注義三陽疑三陰之訛堅按此說誤方盛衰論篇第八十太素佚夢築垣蓋屋琦曰按五藏虛實發夢不同義其脈要精微論中此列五藏之虛夢得其時氣應虛實然惟心脾二藏為合其肺腎肝得時之夢仍同虛例恐有訛誤菌香王逸離騷注菌薰也葉曰蕙根曰薰度人琦曰二字衍診有十度先兄曰王注度合有其二所謂二者陰陽之謂也脈脫不具仲景曰脈脫入臟即死先兄曰脫或然之辭此足以與吳泄相發反論自章先兄曰按所反之論自彰於後世也或曰以所反之論自誤為明也守學不堪先兄曰楚辭招魂湛湛江水兮注深貌知坐知起琦曰坐起行止謂病人之起居所以參驗脈證也脈氣有餘張曰如三部九候論曰形肉已脫九候雖調猶死蓋脫與不足本自不同而形肉既脫脾元絶矣故脈氣雖調亦所不治當與此節互求其義不失人情吳曰人情病人之情堅按此說是張以為人情有三曰病人之情曰傍人之情曰同道人之情似失經旨解精微論篇第八十一太素佚臣授業太素授作受湯藥所滋太素作湯液藥滋所堅按太素義不了但湯藥據示從容論即湯液毒藥之謂所從群下先兄曰高雲所從群下卑賤人也通使臨事富貴人也按高說不知何指此雷公對帝而言者故所從群下即謂百官百姓也即通言上文卑賤富貴之人也言使群下能適道術以養正也有毚愚僕漏之問太素作其有俯遇僕偏之問堅按太素有訛然漏作偏或是欲問其狀太素欲作敢若出而少涕楊曰泣從目下涕從鼻出間為一液也故人哭之時涕泣交連然有哭而無泣縱有泣涕少何也涕洟也若問此者至道之所生也楊曰若汝也琦曰十八字衍則氣和於目太素和作知堅按上華色者其榮也句及此三句並是客詞水宗者積水也太素無積水也三字下文積作精楊曰宗本也水之本是腎之精至陰者也先兄曰按水宗之水泣也謂目之水所宗者腎之積水也志與心精共湊於目也太素志與心精作心與精先兄曰按志與心精言未悲之時也則神氣至志獨悲琦曰十六字衍文泣涕者腦也琦曰泣衍字其志以早悲太素早作搖泣安能獨來此段無出而少涕之答辭蓋此亦神不慈者可推而知也神不守精精神去目此亦言神精共湊而不能持夫一水不勝五火故目皆盲太素五作兩楊曰以其目是陽已是一火下陽並上則是二火志精在目則是一水一水不勝於二火故熱盛爭而盲也堅按楊注僻謬琦曰按此與泣不出義相左此說亦誤蓋此別是一義非相反也新校上甲乙經無盲字盲當作眥
