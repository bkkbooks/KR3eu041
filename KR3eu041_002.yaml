body:
  text: 卷第二脈要精微論篇第十七此篇太素首段至關格及心疝病成而變二節並缺余皆在診法先兄曰張云凡切脈望色審問病因皆可言診而此一節以診脈為言堅按此説本於馬氏診要經終論注陰氣未動陽氣未散尤怡曰按營衛生會篇云平旦陰盡而陽受氣矣夫陰方盡何云未動陽氣方受何云未散疑是陽氣未動陰氣未散動謂盛之著散謂衰之極也堅按此説未必是志本於滑氏曰陰靜而陽動有所動作則靜者動而動者散亂矣參伍先兄曰參伍二字朱子文集詳釋之渾渾先兄曰山海經東望泑澤河水所潛也其源渾渾泡泡注水濆湧之聲也蒼璧先兄曰周禮大宗伯聽以蒼璧禮天中盛藏滿氣勝傷恐者先兄曰吳云藏滿藏氣壅塞而滿也堅按琦曰氣勝五字衍文濕傷脾土故中滿盛而聲微不清膝者筋之府張云筋雖主於肝而維絡關節以立此身者惟膝膕之筋為最故膝為筋之府筋憊若是則諸經之失強也岐伯曰反四時者云云琦曰此他經脫文不可強解堅按此與原識意相協萬物之外六合之內先兄曰物在天中天包物外蓋萬物之外六合之內猶言天地間也彼秋之忿太素忿作急楊曰秋之三月陰氣之始風高氣徑故名為急堅按此與王注合脈與之上下楊曰春夏之脈人迎大於寸口故為上也寸口小於人迎故為下也秋冬之時寸口大於人迎故為上也人迎小於寸口故為下也此乃盛衰為上下也堅按就規矩權衡考之猶以馬注為優從陰陽始先兄曰志云從陰陽始即冬至陽氣夏至陰氣微上微下陰陽上下自有經常之理紀始押韻既見五藏生成篇四時為宜宜字當從太素作數蓋此段分之有期以下二十四句每二句押以同韻度與宜其韻不通度與數其部則一廣韻宜在上平五支度在去聲十二暮數在上聲九麌段玉裁六書音均表暮麌並在古音第五部仍知太素為是蓋四時為數者言從五行衰王而為準度者必就四時為計數補寫勿失太素作循數勿失堅按太素為是蓋此段隔句每取句末一字以為次句起語上云為數故承以循數言人之有脈循四時之數不敢違失猶與天地云為其理如一也且本節論診法不及針藥補寫二字殊無著落益知舊文為訛得一之精以知死生太素精作誠堅按始之以下三十三字疑不必羡文莊子刻意純素之道唯神是守守而勿失與神為一一之精通合於天倫句法相似短蟲長蟲先兄曰説文蟯腹中短蟲也蛔腹中長蟲也楊曰凡夢有三種人有吉凶先見於夢此為徵夢也思想情深因之而夢此為想夢也因其所病見之於夢此為病夢也此十一種夢皆病夢也堅按周禮六夢三曰思夢即楊所謂想夢也又楊以夢診為答病乍在內之問不可從持脈有道虛靜為保先兄曰李云虛者心空而無雜思也靜者身靜而不喧動也堅按素靈中道寶押韻不一而足如治病之道氣內為實疏五過論治數之道從容之葆徵四失論持針之道堅者為實九針十二原論營氣之道內谷為寶營氣篇灸刺之道何者為實四時氣篇寶原作定今從甲乙審知其道是謂身寶五亂篇是也又諸子間亦見之如管子成功之道羸縮為寶六鞱凡謀之道周密為寶武韜必出之道器械為寶虎韜吳子夫安國家之道先戒為寶料敵韓非子人主之道靜退為寶主道呂覽凡食之道無飢無飽是之謂五藏之葆盡數凡農之道厚之為寶審時是也廣韻道寶並在上聲皓韻琦曰保當作寶未確春日浮如魚之逰在波太素逰作遊波作皮楊曰春時陽氣初開脈從骨髓流入經中上至於皮如魚遊水未能周散堅按照在膚下膚在骨而砍之則改作在皮疑是當考蟄蟲將去或曰王訓藏去者漢書蘇武傳去屮實而食之師古曰去謂藏之也三國志華他傳何忍無急去藥裴松之曰古語以藏為去是其義也此説似是説文蟄藏也此蓋謂當蟄之蟲將蟄地下也按而紀之紀經紀之謂猶理也心脈搏堅而長太素搏作揣下並同楊曰揣動也長謂寸口脈長一寸也此為心脈盛動堅心脈上至舌下故盛動堅舌卷不能言堅按廣雅揣動也先兄曰張云五藏病脈一曰搏堅而長一曰耎而散而其為病多皆不足何也蓋搏堅而長者邪勝於正是謂邪之所湊其氣必虛也一以有邪而致虛一以無邪本虛雖若一而病本不同所以當辨也當消環自已太素環作渴楊曰耎而散者病消渴以有胃氣故自已尤怡曰按搏堅而長者太過之脈心象火而脈縈舌心火有餘故病舌卷不能言也軟而散者不足之脈心者生之本神之處心不足則精神為消奴卑惵遺亡恐懼之類是也環自已者言經氣以次相傳如環一周復至其本位而氣自復病自已也診要經終論云刺中心者環死義與此同環自已者經盡氣復則生環死者經盡氣絶則死也甲乙經環作渴非琦曰心液耗傷故見消渴俟心氣復續津液得生則自已也當病灌汗至令不復散發也太素令作今楊曰以肺氣虛故脈耎散也虛故腠理相舊校曰疑開逐汗出如灌至令不復也易入肌皮腸胃之外楊曰易音亦若脈耎散色又光澤者當因大渴暴飲水溢腸胃之外易入肌皮之中名曰溢飲之病也堅按廣韻易變易又始也改也奪也轉也伊昔切楊氏蓋為轉義讀先兄説亦相合曰易移易之謂言以其多飲不滲入尿脬移易入於肌膚腸胃之外甲乙經易作溢可證又楊言肌皮之中者與原識意合折髀食痹楊注並與王義同下折腰亦然色不澤楊曰足太陰脈循胻故脾虛色不澤者胻腫若水之狀也堅按若水狀專系言胻腫楊注是至令不復也太素令作今病成而變張曰成言病之本變言病之標標本不同是謂之變疸成為消中説文疸勞病也從疒單聲是義醫經所無先兄曰淮南子説山訓嫁女於病消者夭死則後難復處也後漢李迪傳素有消病注消中之病也筋攣骨痛楊曰因於癰腫有此二病故請所主按請疑問訛堅按此與張意合有故病五藏發動張曰有故病舊有宿疾也五藏發動觸感而發也徵其脈小馬與王義同曰小為虛也脈則一時之虛所以謂之新病也張曰脈小者邪氣不盛琦曰色發於藏故久病色必奪脈兼經絡故新病脈即奪不見血已見血琦曰不見血六字疑衍文尺內兩傍則季脅也尺外以候腎尺裡以候腹楊曰從關至尺澤為尺也季脅之部當在尺中央兩傍不在尺外兩傍季脅有病當見此處尺中兩傍之外以候兩腎之有病當見此部也自尺內兩中間總候腹中堅按楊氏蓋就尺部分左右各兩行與中行為説王氏以為兩傍各謂尺之外側則與尺外謂尺之外側者殆無分別故更分上下為説俱似未為明核今考經文但言中附上上附上而不言下附下然以下文推之則此三句是一節其為下附下可知矣且此三句特不分左右是均兩手而言尺內者尺內側也尺外者尺外側也下文內外字皆然可以互證尺內兩傍者兩手尺內側之謂而尺外下無兩傍字者省文也尺裡者尺內外側之中央也向校刊源識用此説為圖先兄曰張云人身以背為陽腎附於背故外以候腎腹為陰故里以候腹所謂腹者凡大小腸膀胱命門皆在其中矣又施沛脈微有説欠確仍不録中附上太素附上以下楊以中字屬上句至內以候膻中四十三字作跗上以候胸中六字楊曰跗當為膚古通用字故為跗耳當尺裡以上皮膚以候胸中之病堅按據楊注則尺裡與膚上膚前膚後並不能知其界限其説蓋謬今姑存之前以候前後以候後太素兩以字無楊曰當此尺裡跗前以候胸腹之前跗後以候背後上竟上者胸喉中事也太素作跗上鬲上也五字楊曰當尺裡跗上皮膚以候膈上也一曰竟上疑錯先兄曰吳云上竟上寸之盡也下竟下尺之盡也張云竟盡也言上而盡於上也下竟下者少腹腰股膝脛足中事也太素作鬲下者腹中事也七字楊曰當尺裡膚上以下以為膈下之分即腹中事粗大者陰不足陽有餘為熱中也太素大作犮中下有跗之下三字楊曰尺之皮膚文理粗犮者是陰衰陽盛熱氣熏膚致使皮膚粗起故為熱中堅按以上楊注並難信來疾去徐楊曰來疾陽盛故上實也去徐陰虛故下虛也上實下虛所以發癲疾也上虛下實楊曰上虛受風故惡風也故中惡風者陽氣受也太素無此九字堅按無者似勝眴僕楊曰眴玄遍反目搖堅按楊本於説文然王謂頭眩者於義為順先兄曰方言朝鮮冽水之間顛眴謂之䀼眩史屈原傳眴兮窈窕徐廣云眴眩也眴眩古通用既見原識五藏生成篇徇蒙下多汗身寒王注氣多據新校正亦當血多陰陽有餘則無汗而寒太素無此文堅按太素似是琦曰陽加於陰謂之汗氣行而血不充故身熱無汗其表實無汗亦此義也陽虛於外故多汗陰盛於內故身寒但滑脈為陽與多汗身寒之證不合陰陽有餘二語未詳真義恐有訛誤推而外之此下一段施沛脈微舉蔡轠説欠妥尤怡以上而不下下而不上為升降義讀亦不確並不具録而身有痹也太素作而身寒有痹平人氣象論篇第十八太素全存三動而躁楊曰脈之三動以是氣之有餘又加躁疾尺之皮膚復熱即陽氣盛故為病溫堅按論疾診尺篇曰尺膚熱甚脈盛躁者病溫也尺熱曰病溫先兄曰吳云溫病者寒毒入里積久變為溫熱故尺部肌肉熱是為溫病尺不熱脈滑曰病風脈澀曰痹楊曰一呼三動而躁尺皮不熱脈滑曰風脈澀曰痹也堅按論疾診尺篇曰尺膚滑其淖澤者風也又曰尺膚滑而澤脂者風也尺膚澀者風痹也藏宜散於肝先兄曰按藏真非真藏之真即言五藏真元之氣各應五時而見脈象也虛里楊曰虛音墟虛里城邑居處也此胃大絡乃是五藏六府所稟居故曰虛里脈宗氣也盛喘數絶楊曰宗尊也此之大絡一身之中血氣所尊故曰宗氣其脈動如人喘數而絶者病在藏中也宗氣泄也琦曰其動應衣動之甚也肺貫宗氣下降於腎以行呼吸胃氣上逆肺無下降之路宗氣不能下行而橫衝於虛里故曰泄房勞傷陽最多此候亦有天真氣少得之者溫中培土使中樞運轉升降不失則氣自清降近代醫家頓為腎虛不能納氣重以地冬滯土代陽否則桂附溫下胥失之矣堅按此謂陰駁景嶽然難為通論寸口楊以為從關至魚一寸之處有九分之位殊失經旨曰足脛痛先兄曰張云長為陰不足陰不足則陽必湊之故足脛痛促上擊者太素作如從口蠹爛難讀按注文似是下字上擊者楊曰脈從下向上擊人手如從下有物上擊人手是陽氣盛陽脈行於肩背故知肩背痛也沉而橫太素橫下有堅字楊曰橫指下脈橫也琦曰脈細而附骨橫格有積又診堅按琦更據金匱積聚篇為解今不具録又大奇論脈至橫格是膽氣豫不足也王注脈長而堅如橫木之在指下也沉而喘曰寒熱楊曰沉陰氣也脈動如人喘者是為陽也即知寒熱也先兄曰吳云喘脈來如人之喘急也王注喘為陽吸誤五臟生成篇喘而堅王注與楊意同又喘有動義開於舉痛論脈滑浮而疾者琦曰浮滑痰數邪氣方張故知新病脈急者楊曰按其脈如按弓弦是陰氣積故知疝瘕少腹痛脈滑曰風脈澀曰痹先兄曰此二句重出系剩文臂多青脈楊曰臂尺地也尺地絡脈青黑為寒即知脫血以其陽虛陰盛乘陽故脈青之志曰臂內浮見之絡脈多青蓋因血脫而不華於色也堅按志注為是蓋膚肉色夭故青絡獨見也尺脈緩澀先兄曰按尺脈緩澀猶言頭項強痛蓋尺膚緩而脈澀也堅按此説甚確論疾診尺篇尺肉弱者解㑊安臥緩與弱其義一也蓋素靈中尺位無診脈之法下文尺澀尺滑及通評虛實論寸脈急而尺緩等皆是尺膚之謂原識於虛實論有説宜參奇病論尺脈數甚脈字衍彼篇詳言之又鰲城公觀曰尺脈緩澀當作尺緩脈滯其意相近公觀寬政中人撰有素問考解㑊楊注次篇曰解音懈㑊相傳音亦謂怠惰運動難也堅按加藤良白曰解㑊通作解釋正法華經卷五授五百弟子決品云又瞻如來諸佛境界得未曾有歡喜踴躍無衣食想肢體解懌不能於衣食音釋懌音亦廣韻懌亦並羊益切集韻夷益切安臥楊接上句讀宜從論疾診尺篇可以互證海論髓海不足則腦轉耳鳴脛酸眩冒目無所見懈怠安臥亦是一徵脈盛謂之脫血太素脈上有尺字堅按此句當作尺熱脈盛謂之脫血正與前後尺脈對言例相合論疾診尺篇曰尺炬然熱人迎大者當奪血此其明據矣蓋太素原有熱字而楊氏不知其脫至王所見本則並尺字而脫之故遂以安臥屬脈盛也又脈盛者蓋非直盛戴起宗脈訣刊誤列之於芤脈下又舉仲景所謂亡血失精半産漏下之脈弦而大弦則為減大則為芤以證之甚得經旨志注診尺篇曰尺炬然熱人迎大者三陽之氣偏盛也故當主奪血尺澀脈滑尺寒脈細楊釋尺與脈與王義同又診尺篇曰尺膚寒其脈小者泄少氣脈尺粗常熱者先兄曰此亦謂脈粗尺膚常熱脈要精微論云粗大者陰不足陽有餘為熱中也又鰲城公觀曰當作脈粗尺常熱堅按脈經曰尺脈粗常熱者謂之熱中腰胯疼小便赤熱更考經無粗脈此脈字疑衍然脈經亦既有之不敢妄決是謂真藏見皆死琦曰此三部九候論篇脫文頸脈動喘疾咳太素喘疾倒楊曰有本為腎脈動也按本為一本目裹微腫如臥蠶起之狀太素裹作果無蠶字楊曰目果上下瞼也瞼之微腫水之候堅按蠶字無者為是水脹篇水始起也目窠上微腫如新臥起之狀論疾診尺篇視人之目窠上微癰如新臥起狀其頸脈動時咳按其手足上窅而不起者風水膚脹也俱可以證王引評熱病論為徵然彼言目下微腫光亮此言目上龐然虛浮親驗病者其候自異王注謬金匱風水有如蠶新臥起狀文蠶字衍又有目下如臥蠶語即與評熱病論同義目黃者黃疸琦曰目者宗脈之所聚脾胃濕熱鬱蒸故土色上見於目甚則一身盡黃婦人手少陰脈動甚者妊子也楊曰手少陰脈心經脈也心脈主血女子懷子則經血外閉不通故手少陰脈內盛所以動也王引經脈別論是陰陽別論文未有藏形楊曰寸口人迎且逆且順即四時未有真藏脈形也又注真藏論曰脈懸絶沉澀失四時和脈雖未見病藏之形不可療也堅按楊注俱未妥風熱而脈靜太素靜作盛楊曰脈盛者風熱之病也前曲後居楊曰心脈來時按之指下覺初曲後直如操捉帶鉤前曲後直按此四字似剩曰心死脈居直也厭厭聶聶聖惠方載十四難文作檿檿欇欇考廣韻檿葉動貌於琰切説文欇木葉搖白也從木聶聲爾雅楓攝攝説文楓楓木也厚葉弱枝善搖一名聶據此如循榆葉義似相葉然要不過蹁躚輕浮之謂如循長竿先兄曰志云辨脈篇云纍纍如循長竿者名陰結也此肝氣病而阻結也喘喘纍纍如鉤太素鉤作旬楊曰旬平也手下堅實而平此為石脈之形故曰平也堅按古旬勻多通用段玉裁謂之故楊以旬為均平之義然於喘喘纍纍殊未襯切仍考太素旬字即是銞字如鈞蓋如鉤訛説文銞古文鈞或從旬淮南子原道訓鈞旋轂轉注鈞陶人作瓦器法下轉旋者漢書鄒陽傳獨化於陶鈞之上張晏曰陶家名模下圓轉者為鈞其云如鉤即是此義為沉濡而滑之象始與夏平脈有別先兄曰注云喘喘纍纍如鉤言其滑而濡也按之而堅濡滑有力也楊曰夫五色有形目見為易五聲無形耳知次難五脈之動非耳目所辨斯最微妙唯可取動指下以譬喻亦之得在於神不可以事推之知也玉機真藏論篇第十九五藏受氣至傳寒之名也及篇末虛實一段太素所缺其氣來實而弦太素弦作強楊曰其春脈堅實徑直名為來實而強此為春脈少陽有餘耶在膽府少陽故在外一曰而弦疑非也堅按太素似是兩脅胠滿楊曰胠去居反腋下三寸以下脅也脅下至八間之外胠也宜參刺瘧論膚痛為浸淫太素膚訛骨楊曰浸淫者滋長也令人煩心上為咳唾下為氣泄太素咳作噬泄字無楊曰陽虛陰盛故心煩也心脈入心中系舌本故上見噬唾噬市滯反也謂嚼唾也氣謂廣腸泄氣也堅按噬字非是故曰浮琦曰金氣收降而脈浮者承六陽盛長之後陽氣微下自皮膚而漸降所謂秋日下膚蟄蟲將去與春夏之浮不同也來急去散即厭厭聶聶如落榆莢之義非徑急散亂之謂中央堅兩傍虛琦曰即如循雞羽也堅按此據前篇王注慍慍然太素作溫溫然楊曰溫溫然熱不甚也堅按楊説誤沉以搏故曰營楊曰營聚也謂萬物收藏歸根氣亦得深搏骨沉聚內營故曰如營也堅按此解難從錢大昕曰古人讀營如環見潛研堂文集問答中先兄難經疏證以為營衛之營與環同義王注如營動亦或此意其去如數太素作其氣去如毛楊曰腎氣不足故其氣去按之如按於毛病在於腎故曰在中一曰如數也琦曰其去如數來不盛去反盛也陽根微弱故來不盛腎精下沉故去似數解㑊琦曰解㑊與彈石之脈疑有誤字脊脈痛太素作腹痛心懸如病飢太素懸如易位堅按楊注亦不了不録小便變楊曰又小腹虛滿小便變色也如水之流先兄曰張云平人氣象論如水之流曰脾死此言太過蓋水之流滔滔洪盛者其太過也濺濺不及者其將竭也如鳥之喙太素喙作啄堅按此與新校正引別本合先兄曰高雲如鳥之喙者則堅徑自止四支不舉尤怡曰玉機真藏論云脾脈太過則令人四支不舉其不及則令人九竅不通靈樞本神篇云脾氣虛則四支不用實則涇溲不利蓋脾虛則營衛涸竭不能行其氣於四支而為之不舉脾實則營衛遏絶亦不能行其氣於四支而為之不舉九竅亦然兩經互言之者所以窮其變也九竅不通琦曰生氣通天論陽不勝其陰則五藏氣爭九竅不通蓋脾陰下陷升降倒置濁陰填湊故九竅不通也死生之早暮也先兄曰按新校正説誤故曰別於陽者先兄曰張云陽者言表謂外候也陰者言里謂藏氣也凡邪中於身必證形於外察其外證即可知病在何經故別於陽者知病所從來病傷藏氣必敗真陰察其根本即可知危在何日故別於陰者知死生之期此以表裡言陰陽也如陰陽別論乃以脈言陰陽也皮膚閉而為熱即仲景所謂名曰傷寒者麻黃湯證是湯尉先兄曰吳云湯洗也尉烙也堅按扁鵲曰疾之居腠理也湯尉之所及也湯尉恐是溫湯蒸尉之謂存考肺痹先兄曰吳云肺痹蓋肺氣不利之名也志云痹閉也弗治肺即傳琦曰上脫治法一節疑上或痹不仁二十字當在此上也發疸山海經西山經服之已疸郭注黃疸病也音旦此疸本作疸之明徵漢書藝文志五藏六府疸十二病方四十卷師古曰疸黃病音丁韓反外臺祕要引仲景傷寒論疸或作疸又引古今録驗及千金翼方正有胃疸腎疸等九疸六元正紀大論少陰司天下曰黃疸鼽衄是知疸字隋唐人或用疸故王氏亦以發黃為解也疝瘕長刺節論病在少腹腹痛不得大小便病名曰疝得之寒仲景有寒疝之稱並足以知疝之因寒今此云冤熱者蓋是寒鬱為熱非疝之因熱矣巢源癥瘕候曰瘕者假也謂虛假可動也蓋疝之結塊乍聚乍散故謂之疝瘕也冤熱儒門事親曰冤者屈滯也病非本經為他經冤抑而成此疾也冤一作客客猶寄也遺客熱於少腹久不去從金化而為白堅按此説非是不以次入者馬曰或以有餘而乘彼盛以不足而受乘皆乘所不勝此其不以次而入之道也堅按此節心腎則其志太過而為他藏所克肝則移克他藏而肺特具二者悲憂俱為肺志且不及脾藏故王氏據五氣篇有憂則肝氣移於脾之解而志聰改易三字然既云不以次則何怪乎其不畫一乎又琦曰精氣並於心則喜喜則氣緩神不收持故腎氣乘之怒則氣上悲則金旺故所勝所不勝所生皆為所乘恐者腎精之下陷故脾氣乘之憂當作思思者脾陽之鬱結故心氣乘之凡諸相乘各由衰盛喜恐者衰而所勝乘之也怒悲者盛而互乘諸藏也憂則母乘子也舉此三端而相乘之道備不言子乘母者前文五藏受氣於其所生已言之也此説亦不免牽強姑存備考憂則心氣乘矣先兄曰張云憂傷肺而心氣乘之火勝金也其氣動形楊曰喘息氣急肩膺皆動故曰動形也堅按仲景所謂呼吸動搖振振者不治正此之謂也期六月死真藏脈見太素無脈字楊曰肺病次傳至肺再傷故六月死也又曰古本有作正藏當是秦皇名正故改為真耳真正義同也堅按此五項楊配之五藏與王意相同內痛引肩項期一月死楊曰內痛謂是心內痛也心府手太陽脈從肩絡心故內痛引肩項也心不受痛受病不離三月故一月死真藏脈見可即與死期也先兄曰張云一月者鬥建移而氣易也堅按金匱曰脈沉而弦者懸飲內痛內痛引肩項楊以為脾胃中痛不妥十月之內死楊曰良以脾胃受於穀氣故至十月而死也先兄曰張云十日者天干盡而旬氣易也月字誤當作日肩髓內消太素髓作隨楊曰腎府足太陽脈循肩髆內故腎病肩隨內藏消瘦也又兩肩垂下曰隨堅按脈要精微論有肩隨文琦曰肩髓疑當作骨髓內消即動作益衰也動作益衰王注過鑿真藏來見太素亦作未見楊曰腎氣未是甚衰所以期至一年心中不便太素無心字肩項身熱先兄曰高雲肩項痛引肩項也目匡陷先兄曰説文眥目也今考經文匡助眼骨也匡飯器也筥也義取於此後世遂從目旁玉篇眶眼眶也集韻眶目崖宜與刺禁論原識參堅而搏太素搏作揣下搏而絶亦同宜參脈要精微論如毛羽中人膚先兄曰張云浮虛無力之甚而非微毛之本體形氣雞峰普濟方有脈形氣逆順説演本節之義文繁不録宜參閲蓋此所謂氣者即氣息之氣元氣之盛衰必徵之於脈又徵之於氣息之靜躁以與形貌之肥瘦剛脆互相表裡而為診察之緊要矣且古書於病之繫於呼吸者多命以氣上文胸中氣滿其氣動形俱氣息之謂而次篇形盛脈細少氣不足以息者危乃所謂形氣相失也彼篇王注引證本節金匱要略有息搖肩者一條並可以互證焉論語鄉黨屏氣似不息者儀禮聘禮下階發氣怡焉鄭注曰發氣舍息也王念孫曰舍讀為舒謂發舒其氣也見經義述聞此足以為古人謂息為氣之徵明告之太素此下有勿趣以時一句病熱脈靜泄而脈大脫血而脈實張曰如病熱脈靜者陽證得陰脈也泄而脈大脫血而脈實者正衰而邪進也五實琦曰邪結於中升降道塞表裡不得泄越故然五虛嚴氏濟生方曰大抵滑泄忌五虛證治要訣曰五虛者死元是泠瀉三部九候論篇第二十此篇中太素有缺天光書顧命宣重光馬注重光日月星也下副四時先兄曰廣韻副佐也稱也以處百病先兄曰大戴禮聽其聲處其氣堅按左傳文十八年傳德以處事注處猶制也國語魯語夫仁者講功而智者處物注處名也漢書谷永傳臣愚不能處也師古曰處謂斷決也上部天楊以為足少陽陽明二脈之動與王義異上部地楊以為足陽明與王義同上部人楊以為手太陽手少陽足少陽三脈在和窖中動與王義異以平為期志曰蓋凡治病必先去其血乃去其所苦然後寫有餘補不足無問其病之可否必候其氣至和平而後乃出其針堅按此殆是一説形盛脈細江之蘭醫津一筏曰形盛脈細元陽虛也少氣不足以息虛之極也故死形瘦脈大真陰虛也胸中多氣虛之極也故死中部之候先兄曰高雲中部之候雖獨調究其上下左右之衆藏相失是上下左右不歸於中土故死中部之候獨減是中土不達是上下左右故死堅按志曰血氣生於中焦故獨重於中部此説似是然中部不中焦之謂蓋獨舉中部者豈須人隅反歟目內陷者死琦曰即玉機真藏目匡陷之義渾渾然徐徐然志曰渾渾然者急疾而太過也徐徐然者氣之不及也故皆主病身不去者楊曰去者行也脫肉羸瘦身弱不能行者為死琦曰是以脫肉身不去者死句未詳疑有誤真藏脈見者勝死太素者勝錯易楊曰候諸病脈有真藏脈見胃氣之柔獨勝必當有死沉細懸絶楊曰深按得之曰沉動猶引線曰細來如斷繩曰懸絶以平旦死楊曰脾病寒熱死於平旦平旦木也木克於土故脾病至平旦死以日夕死楊曰風為肝病酉為金時金克於木故日夕死日乘四季死楊曰脾者土也王於四季平和時脈在中宮靜而不見有病見時乍疏乍數故以日乘四季時死也七診雖見楊以為沉細懸絶此一診盛躁喘數此二診寒熱病此三診熱中及熱病此四診風病此五診病水此六診形肉已脫此七診亦覺未允必發噦噫張介賓景嶽全書曰厄之大要亦惟三者而已則一曰寒厄二曰熱厄三曰虛脫之厄張錫駒傷寒直解曰厄有虛厄有實厄有敗厄此云噦噫即所謂虛厄敗厄也其脈疾者不病琦曰不字衍留瘦不移楊曰留久也久瘦有病之人不可頓刺可節量刺之琦亦以瘦為廋字之誤曰留廋謂癰瘕之類伏匿而不移動當節減而去之堅按集韻瘦廋並疏鳩切是知可相通用不必改上實下虛先兄曰刺節真邪論一經上實下虛而不通者此必有橫格盛加於大經令之不通視而寫之此所謂解結也經脈別論篇第二十一太素佚有所墮恐墮恐二字義似不屬且下有驚恐此恐字疑訛觀人勇怯勇怯之分詳見論勇篇蓋此節四句實為診處之要病邪危劇而偶得快了者病邪輕易而遽就困憊者俱亦不可不由強弱壯孺之殊也能知其情先兄曰吳云情病之所由來也淫精於腋此下十句每取句末一字以為次句之首脈要精微論既有此例濁氣歸心琦曰穀氣對藏府之氣言則為濁氣谷入於胃先傳之肺乃化精氣注於藏府此文首歸心而脈而精乃歸於肺誤也堅按此説似有理然上文雲散精於肝淫氣於筋下文云淫精於肺則心字難得改易又吳醫匯講載沈家瑗説辨此心字為脾字之誤然至淫精於脈而其説亦不通藏氣法時論篇第二十二太素僅存肝色青以下一段更貴更賤高曰貴者木王於春火王於夏賤者木敗於秋火滅於冬更貴更賤者生化迭乘寒暑往來也急食甘以緩之醫津一筏曰肝欲散急食辛以散之肝之實也肝苦急急食甘以緩之肝之虛也推之他藏亦然急食苦以燥之按肺云食苦以泄之是五藏中宜食苦者有二而無一宜食鹹者且末段列五藏色味正與此段相發而有脾色黃宜食鹹句然則此苦字為咸字之誤明矣所謂咸傷血鹽勝血者皆燥中之驗也蓋咸之訛苦自唐以前既然故撰運氣偽經者沿襲不辨於至真要大論頻復言之而金元諸家更主張之遂至使苦燥之説入人肺腑牢不可破且今試之苦寒之藥實未見有燥中之害矣一字之誤以生千古之惑有如此者腎苦燥李中梓苦欲補瀉論本於繆希雍神農本草經疏持於冬巢源持作待以下並同溫食飽食琦曰飽食中氣遲滯濕地濡衣則助溫溫食疑當作冷食生冷最傷脾也日昳先兄曰高雲昳昃也日昳乃午後未分土王之時甚於戊己先兄曰志云在四藏曰加者言所勝之氣加於我而使病加之是客勝也在腎藏曰甚於戊己乃至其所不勝而甚是主弱也至於所生而持先兄曰志云持得所生之氣而能支持也取血者先兄曰脈經注云血者謂有血之穴脅下與腰相引而痛琦曰藏府病形篇小腸病小腹痛腰脊控睪丸而痛以小腸附脊也大腹先兄曰臍下為小腹則大腹似言臍上易説卦曰離其於人也為大腹集解象曰常滿如妊身婦故為大腹與此不同葵阮元葵考曰葵為百菜之主古人恆食之詩豳風周禮醢人儀禮諸篇春秋左氏傳及秦漢書傳皆恆食之爾雅於恆食之菜不釋其名為其人人皆知也故不釋韭蔥之名而但曰藿山韭茗山蔥爾雅不釋葵其曰菟葵芹葵戎葵蔠葵皆葵類非正葵亦韭蔥之例也六朝人尚恆食葵故齊民要術栽種葵術甚詳鮑照葵賦亦有豚耳鴨掌之喻唐宋以後食者漸少今人直不食此菜亦無知此菜者矣然則今為何菜耶曰古人之葵即今人所種金錢紫花之葵俗名錢兒淑氣即蜀葵二字吳人轉聲者以花為玩不以葉充食也今之葵花有四種一向日葵高丈許夏日開黃花大徑尺一蜀葵高四五尺四五月開各色花大如杯此二葵之葉皆粗澀有毛不滑不可食唯金錢紫花葵及秋葵葉可食而金錢紫花葵尤肥厚而滑乃為古之正葵此花高不過二尺許花紫色單瓣大如錢葉雖有五歧而多駢誠有如鮑明遠所謂鴨掌者異於秋葵之葉大多歧不駢如鶴爪也齊民要術稱葵菜花紫今金錢葵花皆紫無二色不似蜀葵具各色秋葵色淡黃也云云出研經室三集此説是也考本草白字但有冬葵子圖經曰苗葉作菜茹更甘美然齊民要術種葵術中又有種冬葵法可知冬葵雖亦充菜茹而非古正葵明矣詁經精舍文集中有釋葵三篇而金鶚謝淮則謂為秋葵孫同元則謂為向日葵並謬又阮氏謂人所謂秋葵即是黃蜀葵一名側金盞者耳要術有言秋葵者繫於正葵之秋種者日華子云秋葵即是種早者俗呼為葵菜此可以證脾色黃宜食鹹此節五味之用俱就五藏所苦而言脾性善濕故食鹹味取其燥涸也王注肝性喜急心性喜緩等喜字俱為善義王氏及新校正其説似精然不改上文為咸字徒就苦字為辨殊似屬迂回矣琦説亦系肆臆仍不録黃黍程瑤田九穀考曰內則飲黍稷稻粱白黍黃粱鄭氏注黍黃黍也聞之農人云黍𪐎二谷其色皆有黑白黃赤之異及與人索取其種凡持以至者有黑黍白黍又有赤黍雜黑黍中者而獨無黃黍惟𪐎則類多黃者余因以所目驗難農人農人無以應然則黃黍者𪐎也穄也説文黍禾屬而黏者也𪐎穄也穄𪐎也程瑤田曰按説文以禾況黍謂黍為禾屬而黏者非謂禾為黍屬而不黏者也是故禾屬而黏者黍則禾屬而不黏者𪐎辛散酸收甘緩苦堅咸耎此五味之用就五藏所欲而言與上異義兩相對待也氣味合而服之以補精益氣太素益作養堅按此二句據應象大論即兼藥食而言之蓋毒藥攻邪而調以穀肉果菜實為療病之大法然徒如是立説則似他無藥補者故承以此二句以示有藥食相濟能為補益之理下文所謂各有所利者亦寓藥之五味又有補益不止攻邪一端之意或急太素無此二字堅按是足以確原識説宣明五氣篇第二十三太素僅存五病五邪五脈應象余皆缺肺為咳高雲病氣在肺則為咳咳氣上逆也脾為吞説文吞咽也從口天聲玉篇同又曰子虛賦吞若雲夢者當考琦曰脾病則口常作吞咽聲謬為恐琦曰恐者腎之情而見於胃未詳其義蓋衍文大腸小腸為泄五十七難大腸泄者食已窘迫大便色白腸鳴切痛小腸泄者溲而便膿血少腹痛金匱大腸多寒者多鶩溏便腸垢小腸有寒者其人下重便血膀胱不利為癃不約為遺溺金匱熱在下焦者則尿血亦令淋泌不通又曰下焦竭即遺溺失便楊注刺瘧論小便不利如癃狀非癃淋也小便不利如淋也宜與奇病論相參五藏所惡此不拘相剋之次序又不必以天之五氣蓋亦專就五藏之本性而言藏病之理實不外乎此熱寒濕三者俱兼內外因而言風以外因言燥以內因言且熱風濕俱本藏主氣而其太過卻足以為病矣王釋心肺脾似未盡陽病發於血琦曰陽病發於血者陽淫失斂則血流溢陽虛不化則血凝結凡上下血症及瘕疝瘍癰胥此義也陰病發於肉太素作以味病發於氣楊曰陰之為病發骨疼等陽之為病發於血痹等五味為病發於氣不調等冬陽在內故病發冬夏陽在外故病發夏也堅按太素非是五邪所亂太素作五邪入三字則痹作則為血痹楊曰熱氣入於陽脈重按説陽字故為狂病寒邪入於陰脈重陰故為血痹脾脈代張曰代更代也脾脈和耎分王四季隨時相代故曰代此非中止之謂血氣形志篇第二十四太素全存夫人之常數太素此一句及下六常字此天之常數句並無伺之所欲楊曰凡療病法諸有痛苦由其血者由字疑血聚之處先刺去之刺去血已伺候其人情之所欲得其虛實然後行其補寫之法也欲知背俞太素左角右角相錯楊曰以上言量背輸法也經不同者但人七尺五寸之軀雖小法於天地無一經不盡也故天地造化數乃無窮人之輸穴之分何可同哉昔神農氏録天地間金石草木三百六十五種法三百六十五日濟時所用其不録者或有人識用或無人識者蓋亦多矣次黃帝取人身體三百六十五穴亦法三百六十五日身體之上移於分寸左右差異取病之輸實亦不少至如扁鵲灸經取穴及名字即大有不同近代秦承祖明堂曹子氏灸經等所承別本處所及名亦皆有異而除疴遺疾又復不少正可以智量之適病為用不可全言非也而併為非者不知大方之論所以此之量法聖人設教有異未足怪之也病生於肉楊曰形志俱逸則邪氣客肉脾之應也多發癰腫故以硂針及石尉調之也按硂字疑山海經曰高氏之山其上多玉有石可以為𥐦針堪以破癰腫者也堅按楊雲石尉誤治之以尉引楊曰筋之病也醫而急按醫字當考故以尉引調其筋病也藥布尉之引之使其調也堅按楊尉引解是聖濟總録曰引取舒伸之義蓋本於此病生於咽嗌太素嗌作喝楊曰喝肺喘聲也有本作渴百藥太素無百字經絡不通太素作筋脈不通堅按此五節楊氏以配五藏而筋脈不通為腎之應俱似屬牽強此謂五形志也馬曰按疏五過論有云凡欲診病者必問飲食居處暴樂暴苦始樂後苦等義與此意同寶命全形論篇第二十五太素全存夫鹽之味鹹者太素經注並與新校正引同但首句味字令字並無注文陳木之已畫盡字作蠹楊又曰府者中府謂五藏也壞者則聲歲也此十四字在中府壞者上歲當作噦堅按陳古文作敶故訛為敷字人有此三者琦解上文從楊義且曰三字疑衍府謂胃府知萬物者太素作荷主萬物者敢問其方楊曰方道也土得木而達太素木作水無下金得火而缺水得土而絶二句楊曰言陰陽相分五行相剋還復相資如金以剋木水以剋火土以剋水始土剋水得水通易餘四時皆然並以所克為資萬物皆爾也堅按太素經注並難從竊謂達當作奪聲之誤也黔首共餘食楊曰黔黑也渠廉反人之首黑故名黔首也飲食服用也此文在新校正所引止知養身太素作治養身堅按此與新校正引異又治神養身新校正以楊説為優然熟審經文王注似是先兄曰楊注單豹外凋之害出莊子達生篇知毒藥為真太素藥字復非是知府藏血氣之診太素府作輸非是道無鬼神獨來獨往太素來往字錯楊曰應天地之動者謂之道也有道之者其鬼不神故與道往來無假於鬼神也堅按關尹子五鑑篇曰人之平日目忽見非常之物者皆心有所歉而使之然苟知吾心能於無中示有則知吾心能於有中示無但不信之自然不神或曰厥識既昏熟能不信我應之曰如捕蛇師心不怖蛇彼雖夢蛇而不怖畏故黃帝曰道無鬼神獨往獨來可玩往來太素玩作梲楊曰梲五骨反動知也梲當杌知字疑堅按太素經注非是五虛勿近先兄曰吳云針道難補而易寫故五藏天真已虛戒人勿近五邪相乘而實戒人勿遠間不容瞚楊曰眴音舜也堅按楊蓋以眴為瞚義或是音通玉篇瞚式閏切瞬同上原識舒問切考段注説文問當作閏慎守勿失先兄曰高雲其慎守也則如臨深淵其勿失也則手如握虎其深淺在志而遠近如一也則神無營於衆物神無營於衆物營王以外營為解恐非呂覽尊師篇凡學必務進業心則無營注營惑淮南精神訓而物無能營注營惑也一曰亂荀子宥坐言談足以飾邪營衆注營讀為熒據此言下針之際能一其神不敢惑於他務即無左右視之義王引之經義述聞周易不可榮以録條宜參八正神明論篇第二十六太素全存靈樞晚出於素問然如此篇及脈解針解俱似原於彼者不知古自有其説二經皆為根據馬氏專崇靈樞以為素問之言所出者謬矣吳曰自法往古凡九釋率皆古語因問而詳及者也此言為是合以天光楊曰光謂三光宜參三部九候論氣定楊曰定者候得天地正氣日定定乃刺之按日字疑人血淖液楊曰淖大卓反濡甚也謂血濡甚通液也堅按爾雅釋言釋文引字林雲淖濡甚也此楊所本又廣雅淖濕也澤潤液也謂微濕潤也行針篇陰陽和調而血氣淖澤滑利蓋淖液淖澤其義相同宜參陰陽別論凝泣太素凝作涘楊曰泣音漝之堅按涘凝異構漝蓋澀訛血氣始精楊曰精者謂月初血氣隨月新生故曰精也但衛氣常行而言始行者亦隨月生稱曰始行也精字義見於生氣通天論下月郭先兄曰馬雲月之四圍為郭猶城郭之郭衛氣去形獨居楊曰經脈之內陰氣隨月皆虛經絡之外衛之陽氣亦隨月虛故稱為去非無衛氣也形獨居者血氣與衛雖去形骸恆在故曰獨居故謂血氣在於時也天溫無凝太素凝作疑楊曰天溫血氣淖澤故可刺之不須疑也故日月生太素日作曰絡有留血太素作經有流血堅按據王注太素為誤沉以留止先兄曰吳云邪氣沉著留止不去也八風之虛邪先兄曰馬雲靈刺節真邪篇云虛邪之中人也此可見虛邪本指風而王注以為人虛感風邪者非也以身之虛楊曰形及血氣年加皆虛故曰身之虛堅按官針篇曰故用針者不知年之所加氣之盛衰虛實之所起不可以為工也陰陽二十五人篇曰岐伯曰形勝色色勝形者至其勝時年加感則病行失則憂矣云云楊所言此即是也歲露篇年之衰亦同義耳注靈樞者以年加為五運加臨之謂先兄嘗辨其謬極為明確身形若用力太素形下有飢字楊曰胃中無谷曰飢飢及汗出虛因腠理開虛風得入虛風入時難知故曰冥冥也萌牙王注應象大論故善治者治皮毛一節全據此段處而治之此四字當為一句讀寫必用方楊曰方正也氣正盛時月正滿時日正溫時身正安時息正吸時此之五正是內針時也身方定先兄曰吳云身方定身之陽氣不擾也離合真邪論篇第二十七太素全存竇漢卿針經指南曰古有離合真邪云者蓋聖人欲使其真邪相離而勿合之謂也若邪入於真則真受其蠹而不遂其純一之真真之不遂則其所謂真也罹害有不可勝言者真被邪竊其柄而肆其橫逆邪既橫逆則其為患復可勝言哉嗚呼真邪之不可合也如此胡為真胡為邪真之為言也天理流行付與萬物萬物得以為生者皆真也聖人保之如持盈邪之為言也天地間非四時五行之正氣而差臻迭至者皆邪也聖人避之如矢石其防微杜漸之嚴如是淵有旨哉蓋真立則邪遠邪厲則真殘邪固可除真尤宜養原文多訛今據衛生寶鑑録此説蓋吳所本榮輸太素作滎輸氣淖澤太素氣下有血字亦時隴起楊曰耶氣至時亦皆有波隴波隴者耶風動正氣循循然太素此下有循字楊曰牛忿反輑車前橫木備車行也耶循脈行曰輑有本作軺非之也堅按太素經注義不了在陰與陽不可為度先兄曰按邪之所在或陰或陽非寸口不能為度者故下文云云以得氣為故先兄曰呂覽本生篇云天子之動也以全天為故者也注故事也捫而循之楊曰先上下捫摸知病所在適而自護太素而作人堅按史記日者傳歲谷不熟不能適索隱適猶調也逢其沖楊曰不得刺其盛沖寫法比之不擊逢逢之陳經氣楊曰經氣者謂十二經脈正氣也堅按此蓋經常之氣其病不可下太素無可字不知其取太素取上有可字補寫如何此句難解諸注未確但志曰夫邪氣盛則精氣奪將先固正氣而補之乎抑先攻邪氣而寫之耶稍通吳作取血如何肆逆而刺之太素無此句溫血也楊曰溫熱也耶之新入未有定處有熱血刺去之病愈堅按張意與楊相符琦曰溫疑作蘊蓄血也難從中府楊曰中府五藏也欲調五藏之氣取定天地人三部九候之也邪之新客至其病立已琦曰二十六字衍文通評虛實論篇第二十八太素存頗有缺氣逆者足寒也琦曰者也二字衍文又曰此明五藏之虛實從肺起例也肺主氣肺虛故氣虛氣逆足寒肺虛之證也肺宜清降虛則治節不行故上則喘逆而下則足寒濁陰不降則清陽不升也氣熱脈滿先兄曰馬雲以後文寒氣暴上脈滿而實照則此氣熱者邪氣熱也非人之中氣也高曰重實者言人身大熱之病氣盛而熱脈盛而滿陰陽血氣皆實是謂重實堅按高注似是皆從其物類始高曰物猶形也類猶合也物類者五藏在內皮肉脈筋骨有形在外而合於五藏也始先見也夫虛實者皆從其有形之外合以先見也堅按甲乙始作治其義似長脈口熱而尺寒也楊曰絡為陽也經為陰也寸為陽也外也尺為陰也內也秋冬陰也春夏陽也絡氣不足陽氣虛也經氣有餘陰氣盛也於秋冬時診寸口得緩脈尺之皮膚寒為逆春夏緩脈尺之皮膚寒為順緩脈熱也以秋冬陽氣在內陰氣在外春夏陰氣在內陽氣在外也堅按楊以脈口熱為緩脈非是又尺膚寒見論疾診尺篇經虛絡滿先兄曰馬雲滿實也尺熱滿脈口寒澀也太素無口字楊云滿盛也經虛絡盛春夏診得尺之皮膚熱盛寸口得急脈為逆故死秋冬得尺熱脈急故生脈急多寒脈緩多熱也堅按楊以寒澀為急義亦誤又尺膚熱見論疾診尺篇又邪氣藏府病形篇脈大者尺之尺膚亦賁而起尺滿蓋即是也灸陰刺陽楊曰經虛陰虛故灸陰絡滿陽滿故刺陽也經滿陰滿故刺陰絡虛陽虛故灸陽之也堅按此先得張意尺虛邪氣藏府病形篇脈小者尺之皮膚亦減而少氣不象陰也琦曰不象陰未詳疑有脫誤堅按此説不必寒氣暴上脈經診百病死生決曰寒氣上攻脈實而順滑則生實而逆澀則死其注引太素與本文同蓋寒氣暴上恐沖疝之類實而逆則死琦曰寒中之屬脈多沉虛今脈滿而實是陰盛之極故以脈滑澀為生死也脈浮而澀此十一字太素在帝曰形度云云下與王氏舊本同琦曰此為陽病見陰脈浮脈宜汗解澀為血少不能作汗故死其形盡滿者脈經注引太素作舉形盡滿者堅按此可以徵王注之非滿字推上例高説為優志以腫脹釋蓋誤尺澀脈經注引太素亦作尺滿乳子而病熱琦曰懸當為弦聲之誤也産後氣血空虛病熱而得弦細之脈弦為寒鬱細為氣少是亦陽病見陰脈也足溫木氣尚存足寒脾陽已絶堅按脈經曰診婦人新生乳子因得熱病其脈懸小四肢溫者生寒清者死又説文人及鳥生子曰乳獸曰産蓋指潼為乳非其本義據此琦説為是其懸字並下文懸絶懸小改為弦者不可從又張氏醫通曰乳子言産後以乳哺子時非嬰兒也此説亦是然恨不知乳之為産耳乳子中風琦曰産後中風發熱而喘鳴肩息者邪客中上二焦氣道不利故喘息有音搖肩以伸其氣也肩息之證邪實者可治故得實大之脈然必有舒緩之象則胃氣猶存且閣中風之症若得弦急為陰盛於內而陽絶於外故主死也堅按脈經曰論婦人生産因中風傷寒熱病喘鳴而肩息脈實大浮緩者生小急者死身熱則死身寒則生朱丹溪曰內經所謂身熱則死寒則生此是大概言必兼證詳之方可今豈無身熱而生寒而死者出心法類集此説誤矣蓋滯下初起表邪發熱固非所忌如夫經久引日液脫肉燥以為煩熱者攻補兩難必屬不治經言真不誣而王以為熱為血敗者能得其理腸澼下膿血膿血即腸垢與血俱下之謂不是真膿巢源赤白痢候曰重者狀如膿涕而血交之婦人帶利候曰其狀白膿如涕而有血雜俱可以徵身不熱脈經診百病死生決無不字脈搏大滑脈經與新校正引巢元方同小牢急作小堅急脈實大病久可治滑氏所引巢元方本出脈經春亟治經絡亟太素作極下並同楊曰春時陽氣在於皮膚故取絡脈也夏時在於十二經之五輸故取輸也秋氣在於六府諸輸故取之也冬氣在於骨髓腠理閉塞血脈凝澀不可行針與砭石但得飲湯服藥不得頃時回太素回作因楊接下句讀刺手太陰傍先兄曰吳云傍經之側處也掖癰腋俗字説文所無暴癰筋緛太素緛作濡楊曰筋濡者謂筋濕也堅按太素經生並誤太陽經絡者楊曰足太陽與足少陰以為表裡足少陰上行貫肝膈發腹諸穴故腹暴滿故取太陽經絡新校正節引仍具録琦從楊説曰腹滿自屬陽明之病取足太陽胃俞以寫之則已胃之募也太素訛則人募者也楊曰募有本為幕也琦曰胃募即謂胃俞也癇驚太素猶作癇驚與新校正引異刺手少陰太素作刺手少陽凡治消疸至寒風濕之病也琦曰僕擊如擊而僕也氣滿發逆即喘逆也在肥貴人則為膏粱所致蓋甘肥之過中氣緩滯肺胃壅鬲郁生痰熱故見諸症堅按此段一則肥貴人高粱之疾蓋得之逸藥一則得之暴憂蓋是貧苦勞役之人兩相對言一則內因之病一則外因之病亦兩相對言如跖跛亦屬外因故瘦留著也按瘦廋同用三部九候論有留瘦不移交宜相參看久逆之所生也琦曰陰不升陽不降則為逆其在脾胃則濕淫為黃疸其在經脈則為暴卒而痛若在上焦則癲疾厥狂皆氣逆之所致也頭痛耳鳴蘭室祕藏曰頭痛耳鳴九竅不利者腸胃之所生乃氣虛頭痛也又曰氣虛頭痛人參黃耆為主此言可疑太陰陽明論篇第二十九太素全存願聞其異狀也馬曰此乃總論六陽六陰之理而脾胃自在其中也堅按志以此下至傷於濕者下先受之一屬脾胃為解稍覺牽強陽道實陰道虛朱丹溪陽有餘陰不足論根據於此陽受之則入六府琦曰府陽藏陰各從其類按陰陽應象論云天之邪氣感則害人五藏水穀之寒熱感則害人六府與此相反而義實相成以形氣言邪氣無形故入藏水穀有形故入府以表裡言府陽主外故賊風虛邪從外而受藏陰主內故食飲不節從內而受實則府藏皆當有之蓋內外之邪病情萬變非一端可盡故廣陳其義耳堅按徐氏及琦説並本於王氏溯洄集入六府楊曰六府陽氣在外故身熱也陽盛晝眠不得至夜故不時臥也陽氣盛於上故上為喘呼也張曰陽邪在表在上故為身熱不臥喘呼琦曰不時臥謂臥不以時即不得臥也入五藏楊曰陰邪在中實則䐜脹腸滿閉塞不通虛則下利腸澼張曰陰邪在裡在下故為䐜滿飧泄腸澼故喉主天氣楊曰肺為天也喉出肺中之氣呼吸故主天脾為地咽出脾胃噫氣故主地吳曰喉嚨為肺系受氣於鼻故納無形之天氣咽為胃系受氣於口納有形之地氣琦同又曰此義又與陰陽應象論同脾病而四支不用何也楊曰五藏皆連四支何因脾病獨四支不用也常著胃土之精也太素無胃字堅按王胃字句是陽明者表也吳曰陽明者太陰之表也各因其經張曰因其經因脾經也四支不得稟水穀氣此下二十八字與上文復正是衍文陽明脈解篇第三十太素全存篇存上脫論字其脈血氣盛太素作其氣盛惋太素作悗楊曰悗武槃反此經中為悶字厥逆連藏則死金匱卒厥條其義相發妄言罵詈不避親疏而不欲食太素此十二字無為是故妄走也太素作故妄言為是先兄曰張子和治狂人本於經旨用調胃承氣湯治驗宜參
