body:
  text: 卷第三熱論篇第三十一太素全存頭項痛腰脊強太素作頭項腰脊皆痛堅按與新校正引異目疼太素無此二字少陽主膽太素膽作骨楊曰肝足厥陰主筋三膲手少陽與膀胱合膀胱腎府表裡皆主骨三陽經絡太素作三經皆受病而未入通府也未入於藏者太素作未入通於府也可汗而已三陽經絡至此琦曰十七字衍文堅按此說非囊縮吳緩傷痛蘊要曰凡囊縮有熱極而縮者亦有冷極而縮者要在詳辨治之五藏不通則死矣太素五作府堅按此下承以其不兩感於寒者云云則三陰三陽六句蓋指兩感而言王意為然高注過鑿嚏太素作咳楊曰咳者肺氣通也可泄而已琦曰泄謂泄越其熱非攻下之謂也堅按此說謬遺楊曰遺余也大氣雖去猶有殘熱在藏府之內外因多食以穀氣熱與故熱相薄重發熱病名曰餘熱病也兩熱相合先兄云注云兩熱者謂所藏之熱與新谷入氣之熱相侵薄也食肉則復楊曰肉熱過谷故少食則復谷熱少肉故食多為遺也張曰復者病復作遺則延久也堅按肘後方曰凡得毒病愈後百日之內禁食豬犬羊肉並傷血及肥魚久膩乾魚則必大下痢下則不可復救又禁食麵食胡蒜韭薤生菜蝦䱉輩食此多致復發則難治又令到他年數發也譫言楊注厥論曰譫諸閻反多言也相傳乃銜反獨語也堅按集韻譫之廉切疾而寐語也又女監切病人自語也譫噡之廉切多言或從口三日乃死楊曰更得三日方死也堅按兩感乃仲景所謂三陽合病之類系乎表裡俱熱證暑當與汗琦曰暑當與汗八字有脫誤堅按溫不云汗暑特無汗其理難晰琦說似是刺熱篇第三十二太素全存小便先黃王注有不通二字不知何意腹痛多臥琦曰木克脾故腹痛肝膽同氣膽熱故好眠狂言及驚楊曰肝動語言也故熱爭狂言及驚也堅按宣明五氣篇肝為語其逆則頭痛員員太素無逆則二字員員作下貝下貝楊曰下貝都示井反頭切痛也堅按下貝字當考脈引沖頭也此五字太素亦有之然竊疑古注文所錯入宜刪去方與下文例相合卒心痛煩悶琦曰氣液交郁故心痛煩悶善嘔者胃脈入心心熱胃亦病也頭痛面赤者火壅於上也頰痛太素頰作顏顏青欲嘔身熱琦曰肝木克脾故顏青然詳篇中五藏病無勝已之證則衍文是也胃逆故嘔脾主肉故身熱堅按顏青不必肝克脾證兩頷痛太素頷作頜先兄曰至真要大論王注頷頰車前牙之下也銅人經注頷謂頰下是也方言云秦晉頷謂之頜先淅然厥起毫毛惡風寒太素厥字毫字寒字並無楊曰肺主毛腠內熱衍然起毛惡風也肺熱上熏故舌上黃也肺主行氣於身故身熱也堅按王不注厥字恐原本亦無之琦曰淅然厥起惡風寒似外感之症然本篇皆言病自內發蓋熱甚於藏陰氣浮越於外肺主皮毛故先見之後乃身熱也此說殆得楊意頭痛不堪汗出而寒太素堪作甚楊曰肺熱沖頭以肺脈不至故頭痛不甚也有本為堪言氣衝甚故頭痛也琦曰肺失清肅之令氣不下行三陽脈壅於上故頭痛衛虛陰浮故汗出而寒出血如大豆立已楊曰出血如豆言其少也恐泄氣虛故不多也琦曰獨言出血五藏可知身熱楊曰為足太陽脈別項本支行背合有四道故身熱其逆則太素無逆則二字淡淡然太素無然字楊曰淡徒濫及動也謂不安動也按安動疑安靜諸汗者至其所勝日汗出也太素無此十一字堅按此可以確高說名曰治未病楊曰五藏部中赤色見者即五藏熱病之微熱病已有未成未發斯乃名為未病之病宜急取之熱病從部所起者楊曰部所者色部所也諸治熱病琦曰治熱病大意可見矣仿之用藥辛涼清潤之劑其亟亟乎刺足少陽補足太陰太素無補字堅按補字無者亦是楊以為刺此二脈不斥言孔穴而以下四項並然其意蓋與吳同始手臂痛太素始作先始於頭首者素問太素無痛字按上文此言始於頭首痛下始於足脛亦同刺足陽明而汗出止琦曰前言五藏之熱此列六府之熱林氏補足陽明復缺手太陽手少陽二條古文簡脫多矣藏病云至其王日汗出蓋藏病無發汗之理故俟其王日正氣勝邪自然汗出邪解此所列府府病皆在經故可刺以出汗刺足少陰太素作刺足少陽楊曰足少陽脈起目兌眥胳身骨節入耳中故熱病先身重耳聾好瞑所以取此脈之輸穴者也有本為足少陰也太陽之脈楊接上句讀且以為此之三脈皆生於骨故赤色榮顴非是榮未交禮記大學注夭夭美盛貌曰今且得汗待時而已太素今作令而作自楊曰赤色未夭之日且得汗者至勝時病自得已也堅按據楊所注太素原文曰是日字傳寫誤之耳下文則作日字可以互證又仲景所謂面色反有熱色面色緣緣正赤其證相似而不同與厥陰脈琦曰厥陰當作少陰若與少陰脈爭見則是一日府藏俱病三日遍六經而死緣其熱本自腎發故病內連腎也堅按此即原下文新校正所言或者之意存考其熱病內連腎少陽之脈色也太素病下有氣字無少陽之脈色也六字堅按此與王所謂或為及新校正引舊本合色榮頰前至不過三日太素曰作日而作自無期不出三日五字余與新校正引同琦曰按當有太陰色脈爭見之條古文脫誤也堅按此說與原識意符與少陰脈琦曰當作厥陰熱病氣穴太素無此句楊以椎下問為皆兩葙取之非是榮在骶也項上三椎陷者中也太素無骶也二字及也字楊曰從肺輸以上三椎在頂故曰項上三椎即大椎上陷者中也逆顴為大瘕太素顴作椎瘕作瘦顴後亦作椎後馬曰按靈樞五色篇當以顴下為大小腸之分難經亦有大瘕泄堅按太素難從大瘕恐不大瘕泄之謂當考評熱病論篇第三十三太素存陰陽交琦曰陰陽交即兩感也一陰一陽藏府相交而以火為作合故脈躁疾不為汗衰由熱邪布滿如焚如毀故也堅按此說缺妥郭雍傷寒補亡論既辨陰陽交兩感相似文繁不録當參三死楊曰汗出而熱不去死有三候一不能食二猶脈躁三者失志堅按馬暗得楊意服湯太素無服字楊曰飲之湯液以療其內勞風太素作勞中楊曰勞中得風為病名曰勞中亦曰勞風雞峰普濟方舉此證曰此由腎氣不足動作勞損風搏於肺腎氣不足則膀胱不榮於外故候強上瞑視因其勞動而受病在肺宜芍藥黃耆湯芍藥黃耆川芎烏頭薑棗水煎醫學讀書記曰此可悟傷風不解成癆之故勞風者既勞而又受風也勞則火起於上而風又乘之風火相搏氣湊於上故云法在肺下也肺主氣而司呼吸風熱在肺其液必結其氣必壅是以俯仰皆不順利故曰當救俯仰也救俯仰者即利肺氣散邪氣之謂乎然邪氣之散與否在乎正氣之盛與衰若陽氣王而精氣引者三日次五日又次七日則青黃之涕從咳而出出則風熱俱去而肺無恙矣設不出則風火留積肺中而肺傷肺傷則喘咳聲嘶漸及五藏而虛勞之病成矣今人治勞日用滋養叨不少益者非以邪氣未出之故歟而久留之邪補之固無益清之亦不解虛勞病之所以難治也按王注曰從勞風生曰故腎勞風生陰陽別論風消注曰胃病深久傳入於脾故為風熱以消削又風厥注曰夫肝氣為風腎氣陵逆既風又厥故名風厥奇病論息積注曰灸之則火熱內爍氣化為風又腎風注曰勞氣薄寒故化為風並謂內生之風非外來之風邪此是王氏之創說而其實淵源於四時刺逆從篇狐疝風及膽肺心腎風疝之自以救俯仰琦曰謂通利氣道使呼吸得達堅按此證項強目眩起居不便且咳者橫臥必甚然則豈是扶持針藥俱使其就安之謂乎巨陽引精者琦曰句不可解疑有誤其狀如膿太素膿上有稠字面胕痝然太素痝作𤼃先兄曰周語敦痝紙固注痝大也時熱太素不復堅按此段太素異同頗多今不具存風水琦曰水病肺腎為主而實本於脾蓋腎為水藏以類相從故凡水責之腎肺主治節氣虛不化亦令積水然句中土氣實升降不失則水無從生故水病悉由脾虛不能制水也邪之所湊其氣必虛此非邪湊則氣虛之謂言氣所虛處邪必湊之故下文承以陽虛者陽必湊之蓋此語足以盡邪氣傷人之理矣逆調論篇第三十四太素存先兄曰吳云逆調者逆於調攝而病茲乃論其致病之由也非常溫也琦曰非逢溫暑之時而生煩滿是即所謂能冬不能夏者中非有寒氣也琦曰中字疑誤故身寒如從水中出琦曰此能夏不能冬者陰陽之氣偏則為中寒中熱之病非因外也兩陽相得楊曰人有四支先熱若遇風寒更如火炙是人陰虛陽盛以其四支是陽陽氣更盛四支二陽合而獨盛銷爍肌肉不能生長故曰肉爍之馬曰按此節當為內傷兼外感者歟堅按此蓋不兼外感者以水為事琦曰以水為事涉水游泳之類恃其腎氣之勝而冒涉寒水水氣通於腎腎得水寒則腎中陽衰太陽之氣亦衰腎主骨髓而髓之生長惟恃乎氣寒濕在內反消真精腎氣既衰則脂枯不長痿論亦有以水為事之文指濕言也一水不能勝兩火琦曰句衍堅按此據高說而生於骨太素作而主骨故不能凍栗琦曰能字衍下同腎孤藏也琦曰猶言一水當攣節也琦曰寒入骨髓骨病而筋亦縮為攣節病名骨痹因乎寒濕也堅按此段琦說稍奇姑存備考雞峰方舉此證處以乾漆元曰所以不凍栗者非陽虛而為陰乘也名曰骨痹瘧久久不治令攣縮其方用鹿茸生乾地黃各四兩乾漆半兩附子一兩上為細末酒煮麵糊和丸如梧子大酒下三十丸空心服苛先兄曰源順和名鈔引玉篇云苛小草生刺也肉如故也太素故作苛楊曰苛音何有本作苟皆不仁之甚也故雖衣絮溫覆猶尚不仁者謂之苛也故知衣絮溫覆即知覺首為不仁也臥不安琦曰衛氣晝行於經則寤夜行於藏則寐而衛氣之出入依乎胃氣陽明逆則諸陽皆逆不得入於陰故不得臥瘧論篇第三十五太素全存夫痎瘧太素痎作㾬先兄曰聖濟總録云痎瘧者以瘧發該時或日作或間日乃作也寒溫疸瘧動皆該時故內經統謂之痎瘧此說非又左傳疥字據舊說亦即痎字昭二十年左傳齊侯疥遂痁杜預注痁瘧也陸氏釋文疥舊音戒梁元帝音該字當作痎兩日一發之瘧也痎又音皆後學之徒僉以痎字為誤案傳例因事曰遂若痎已是瘧疾何為復言遂痁乎顏之推曰說文痎二日一發之瘧痁有熱瘧也齊侯之病本是一發後漸加重遂頻日熱發也今北方猶呼痎瘧音皆而世間傳本多以痎為疥俗濡就為通云病疥令人惡寒變而成瘧此臆說也疥癬小疾寧有轉作瘧乎今案孔疏引梁人袁狎之就亦謂疥當痎堅按王念孫以陸說為是說見經義述聞宜參願聞其道楊曰諸問寒瘧發之所以也陽並於陰琦曰陽並於陰陰出之陽也陽為陰並故陽虛而惡寒王注謂陽氣入於陰分非也堅按楊注下文曰三陽俱並於陰則三陽皆虛虛為陰乘故外寒琦意與此相合陽盛則外熱陰虛則內熱楊曰陰極則陽盛陽盛則外熱陽極則陰虛陰虛則陽乘故內熱喘上文不言喘故此補出即呼吸喘迫之謂不是痰喘此榮氣之所舍也楊曰此言其日作所由也皮膚之內腸胃之外脈中營氣是耶之舍也堅按此說是邪在營分者其氣淺故日作邪在募原者其氣深故間日琦以為瘧邪多在營分者誤與衛氣並居琦曰並居即與衛氣合而病作之義非邪本居於衛也遇風及太素及作乃夜行於陰太素無此四字內外相薄太素無此四字楊曰耶氣與衛俱行以日日而作也堅按病源亦無此句顧無者為勝楊注與高同義琦曰得衛氣之行則外發故病作氣過則仍內薄故不作其意亦同陰與陽爭不得出楊曰其耶氣因衛入內內薄於陰共陽交爭不得日日與衛外出之陽故間日而作也膂太素作𦛗間日發者由邪氣太素無此七字橫連募原楊曰募原五藏背有募原其耶氣內著五藏之中橫連五藏募源之輸堅按楊說不晰然邪客篇募筋太素作募筋而楊注則曰募當為膜亦募覆也蓋其改募作膜者未必是然足以堅原識之意先教諭別有募原考附刊在所者醫賸後學者當參看橫連二字諸家無解蓋膈募橫遮故邪之客亦橫連其位也又按堯典光被四表漢書作橫被四表戴東原文集有說曰樂記鐘聲鏗鏗以立號號以立橫橫以立武鄭注曰橫充也謂氣作充滿也祭義曰溥之而橫乎四海孔子閒居曰以橫於天下注曰橫充也據此橫連之橫恐亦充滿之義存考不能與衛氣俱行不得皆出太素無不得二字皆作偕楊曰偕俱也堅按此與甲乙合故虛實不同邪中異所志曰虛實者早晏也若邪中異所則或發於早者每日早發或發於晏者每日晏發非若客於風府之邪日晏而日早也堅按此說難從姑存之邪氣之所合太素合作舍堅按此與靈樞病源合則其府也先兄曰吳云上文邪客風府之論似乎拘泥故虛實不同邪中異所至此其論風無常府邪之所舍則其府也始為活潑無弊也張云邪之所中亦但隨虛實而異其處不必盡當風府然則所謂日下者惟邪氣耳衛氣周環豈有日下之理但氣至而會其病即作馬雲凡物之所聚皆可以言府也沉以內薄先兄曰張云言其深也即薄於五藏橫連膜原之謂淒滄之水寒太素水作小寒下有寒迫之三字外臺引病源並同今本猶作水旡原本作無迫字堅按上文夏傷於暑熱氣盛云云與此稍異秋傷於風則病成矣太素成作盛病源同外臺引作成溫瘧琦曰蒙上夏傷於暑故但言風寒堅按此說傎矣疸瘧楊曰疸熱也熇熇之熱先兄曰易家人九三家人嗃嗃鄭玄曰嗃嗃苦熱之意釋文劉表章句作熇熇外無氣先兄曰吳云外無氣謂衛氣併入於陰而表虛也陽與陰復並於外琦曰外應作內字之誤也此陽入之陰真性而未得並者也太素真作直而下有取字新校正特舉直往是琦曰所謂迎而奪之客於六府琦曰句有錯誤篇中並無邪客六府之義以春病者惡風楊云惡於路反畏惡也邪氣與汗皆出太素皆作偕刺瘧篇第三十六太素全存足太陽之瘧琦曰瘧邪不居經絡亦有六經證者邪從風府而下漸以內傳其出也亦必背俞而出各視所近經絡為變現也足少陽之瘧楊曰足少陽脈羈終身之支節故此脈病身體解㑊刺足少陽楊曰可刺足少陽風池丘虛等穴也令人先寒至乃快然琦曰此與少陰節錯簡當在足少陰其病難已之上陰病多寒喜見日月光火氣者陽虛故也令人嘔吐至欲閉戶牖而處琦曰此陽明瘧脫文也胃逆故嘔吐陽盛故熱多陽明病惡人與火故欲閉戶牖而處堅按琦說臆斷姑存之其病難已琦曰病在陰者難已通太厥而言之也刺足厥陰楊曰可刺足厥陰五輸中封等穴也肺瘧太素熱字不復按與巢源合楊曰以上言經病為瘧以下言藏病瘧肺以逼心故肺病心寒嘉驚妄有所見宜取肺之藏府表裡之脈也心瘧楊曰心中煩熱故欲得冷水及欲得寒以其足陽得寒發熱故欲得寒多也其寒不甚其熱甚也心經手少陰受病遂令心煩又曰療在手少陰少海之穴也肝瘧太素蒼蒼作倉倉楊曰肝瘧病甚則正色見故倉倉然也倉青也病甚氣奔故太息出之可取肝之經絡見血得愈也脾瘧楊曰脾脈足太陽脈屬脾胳胃連腸以穀氣盛故寒疾腹痛腸鳴可取脾之經脈大都公孫商丘等穴也宛轉大便難先兄曰高雲靈五邪篇云邪在腎則骨病陰痹大便難胃瘧者令人且病也楊曰疽音且內熱病也胃受飲食飲食非理致有寒熱故胃有瘧也堅按千金方曰五臟並有瘧候六腑則無獨胃腑有之三因方曰病者寒熱善飢而不能食食已支滿腹急㽲痛病以日行名曰胃瘧六腑無瘧唯胃有者蓋飲食飢飽所傷胃氣而成世謂之食瘧或因諸瘧飲食不節變為此證景嶽全書曰三因所云胃瘧既云飲食則明是內傷且凡先因於瘧而後滯於食者有之未有不因外邪而單有食瘧者也刺足陽明太陰橫脈楊曰陽明大胳即大橫脈也先兄曰高雲橫脈絡脈也經直絡橫之意立寒琦曰二字衍瘧方欲寒琦曰刺手經以寫熱刺足經以寫寒使陰陽分泄氣不相併則病已傍五胠俞先兄曰玉機真藏論次注胠謂腋下脅也說文胠亦下也按瘧脈滿大急下新校正中五十五字當作五十七字諸瘧而脈不見楊以脈為胳脈難從儒門事親曰會陳下有病瘧二年不愈者止服溫熱之劑漸至衰羸命豫藥之余見其羸亦不敢便投寒涼之劑乃取內經刺瘧論詳之曰諸瘧不已刺十指間出血正當發時余刺其十指出血血止而寒熱立止咸駭其神醫學議書記曰凡諸瘧而脈不見刺十指間出血血出必已故初病脈不出者多是氣血壅遏所致無用張皇遽投溫補亦致敗事手少陰陽明太素作陰陽楊曰手表里陰陽之脈十指之間也堅按據新校正太素脫手字刺三陽經背俞之血者楊曰風瘧候手足三陽經之背輸有瘧穴處取之堅按楊說似是琦亦以為謂足三陽經胕髓病楊曰有本髓為體刺至陰諸陰之井太素刺至陰作刺之楊曰五藏諸陰之井起於木宜取勿出血也堅按此與甲乙經合原識三字衍三當作二刺足陽明太素同於本文與新校正引異甲乙曰九捲雲取足陽明素問刺太陰刺足少陽太素同於本文甲乙引九卷與新校正引同氣厥論篇第三十七太素全存腎移寒於肝肝太素亦作脾肺消楊曰心得寒氣與肺肺得寒發熱肺燋為渴名曰肺消飲一升溲一升可療飲一升溲二升肺已傷甚故死也琦曰肺藏受寒脾陽亦敗飲入於胃不復消化精微而直輸水府上則相火爍金下則膀胱寒滑風水竭力沖決是以飲一而溲二也是其上熱下寒中焦濕滯金匱男子消渴飲一斗溺亦一斗腎氣丸主之所以濕味而滋水此飲一溲二由於心氣之敗君火衰熄而相火燔炎樞軸不運五藏精液輸泄無餘藏神已敗故不治陰陽別論曰心之肺謂之死陰是也醫學讀書記曰肺居上焦而司氣化肺熱則不肅不肅則水不下肺寒則氣不化不化則水不布不特所飲之水直趨而下且並身中所有之津盡從不趨之熱有降無升生氣乃息故曰飲一溲二死不治如囊裹漿水之病也太素作如裹囊治肺者蓋有訛脫肝移熱於心則死楊曰肝將熱氣與心心中有神不受外耶故令受耶即死也琦曰王注引陰陽別論甚當但非火木相燔之義耳柔痓太素作素痓楊曰素痓強直不得回轉堅按太素非是傳為虛琦曰虛字衍腸澼死太素澼作石𨐌楊曰脾主水穀故脾得熱氣令腸中水穀消竭所以腸虛闢疊不通而死堅按楊注不穩王注腸澼除亦不了當考胞移熱於膀胱楊曰胞女子胞也女子胞中有熱傳與膀胱尿胞尿脬得熱故為淋病尿血也堅按楊注甚核口麋太素麋作靡楊曰熱上衝口中爛名曰口靡爛也按此爛字衍亡皮反堅按靡蓋㸏者說文㸏爛也原識麋字是寫胥所誤皆當從麻為虙瘕為沉太素虙瘕作密疝楊曰小腸將熱氣與大腸為病名曰密疝大腸得熱密澀沉而不通故得密沉之名也堅按王注瘕一作疝者蓋指太素也琦曰沉當作症是臆說食亦楊曰亦義當易也言胃中熱故入胃之食變易消無按無字疑訛不為肌肉故瘦堅按楊注缺當鼻淵太素作鼻淟楊曰淟他典反垢濁也堅按鼻淟之名與證相協然蓋是避唐太祖諱而所改也太素淵掖作泉掖清冷淵作清冷泉是其證衄衊太素衊作𥌋楊曰𥌋亡結反眵也堅按太素經注並誤太素𥌋字據楊注系字之訛千金作鼽瞢此由𥌋字而更轉訛者故得之氣也太素氣厥倒楊曰此膽傳之病並曰逆熱氣之所致也堅按楊注與原識意符咳論篇第三十八太素全存先兄曰醫宗必讀云此言咳而不言嗽者省文也如秋傷於濕見於二篇一篇只有咳字一篇兼有嗽字則知此篇舉咳而嗽字在其中矣非其時各傳以與之琦曰非其時三字衍堅按此說當考五藏各以治時張曰治時治令之時也乘秋則太素無此三字有黃帝曰五藏之咳奈何岐伯曰五藏之久咳乃移於府五句楊曰以下言肺咳相傳為藏府咳也五藏之咳近者末皇久者傳為府咳也肺先受之云云太素心先受之以下三先字並無楊曰肺以惡寒肺先受寒乘春肝王之時肝受即為肝咳若肺先受寒乘於至陰即為脾咳若肺先受寒乘冬即為腎咳堅按據楊注太素肝先受之之先字亦並芟去於例相協唾血唾蓋是涕唾非津唾之謂張曰唾血者隨咳而出是咽腫喉痹太素作咽喉腫咳則兩脅下痛太素脅作胠楊曰胠有本作脅也咳涎太素涎作演楊曰音涎腎液也謂咳涎出之也堅按演蓋㵪之訛㵪即涎字見集韻及慧琳藏經音義又按此涎即今之稠痰也琦曰腎主五液入脾為涎濁陰上填故咳而多涎遺失太素亦作遺矢楊曰遺矢者咳引大腸故遺矢也先兄曰滑云失當作矢如一飯三遺矢大腸為傳送之府故寒入而氣不禁咳而失氣氣與咳俱失太素作咳而氣氣者與咳俱出楊曰小腸在上咳引小腸故氣與咳俱發者也之此皆聚於胃關於肺楊曰此六府咳皆以氣聚胃中上關於肺致使面壅浮腫氣逆為咳也堅按楊特屬之六府未為盡多涕唾此亦恐今之稠痰與評熱病論唾出若涕及咳出青黃涕之涕其義相同帝曰善琦曰經文論咳專主於寒金匱以支飲言亦寒也金匱及此經正相發明皆水濕寒氣為之也若燥火之邪亦有作咳乃其兼症非專病也至內傷勞嗽又屬標中之標不可責之咳者猶肺痿肺癰及大病後年高氣弱多有咳嗽不可以咳論治也堅按張介賓既有詳說其義甚精須參看舉痛論篇第三十九太素全存要數極楊曰所以然者得其要理之極明達故也數理也明明也太素作明矣二字如發蒙解惑先教諭撰醫賸曰枚乘七發云發蒙解惑未足以言也先兄曰易蒙初六發蒙利用刑人又見氣穴論五藏卒痛高曰痛者藏府之氣不通也故願聞五藏卒痛何氣使然堅按詳下文五藏卒痛是諸痛中一證蓋帝先舉病最重者為問也而伯對以寒氣入經有脈外脈中之辨帝仍就其義以問諸痛之別高注以為其第一第二痛有止不止之不同第三四五痛有宜按不宜按之不同第六七八九痛有上下相應相引之不同第十十一痛有久暫之不同第十二十三十四痛有通閉之不同寒氣入經而稽遲太素作寒氣入焉經血稽遲客於脈外則血少馬雲或客於經脈之外則血原少而愈澀或客於經脈之中則脈遂澀而不通皆能卒然而痛也琦曰脈外傷衛脈中傷營互文見義血少則氣虛可知氣不通則血亦不行矣其脈必見遲澀堅按馬說為優寒氣客於脈外史載之方曰若寒濕之氣勝而腹痛六脈皆微細而沉時時小擊經訣所謂陽弦頭痛陰微腹痛是也又曰舉痛論云寒氣客於脈外云云其脈正與寒濕之氣勝同炅楊曰炅熱也又注後炅則氣泄曰炅音桂熱也因重中於寒則痛久矣吳曰此明痛甚不休者寒氣重盛不易解散故痛久衍高同堅按據此則不須必從滑氏改下文寒氣客於經脈之中太素脈作胳楊曰痛不可按之兩義解之一寒熱薄於脈中滿痛不可得按二寒下留熱氣上行令脈血氣相亂故不可按也堅按此疑非兩義琦曰寒氣稽留熱氣從上釋相薄之義此說似是吳馬等諸言其意既然史載之方引刪滿則以下十七字蓋以為重復也史又曰其脈散滿指下充大而至數不多卻不甚有管力宜去其寒而行其血氣寒氣客於腸胃之間史載之曰其脈亦差大差緩而沉血不得散太素血作而寒氣客於俠脊之脈史曰其脈當尺澤沉而擊宜行其腎經以去其寒寒氣客於衝脈史曰其脈當實大有形不勻輕滑而又緊來疾去遲如有物制之宜通其脈行其氣衝脈起於關元脈經衝脈者起於關元循腹裡直上至咽喉中喘動廣雅揣𧍒動也疏證曰釋訓云揣抁搖捎也揣抁之轉作喘耎莊子胠篋篇喘耎之蟲崔撰注云動蟲也一云無足蟲此說足以證喘蠕之相通揣喘蠕並同韻寒客於背俞之脈史曰脈澀以血虛而不行其脈六脈細數而肝心尤微心脈如帶芤重按即缺往往身有汗宜足其血以得其心則血脈泣太素無血字寒氣客於厥陰之脈史曰其脈皆輕帶弦肝脈連腎脈弦長而緊甚則透過尺澤而弦寒氣客於小腸募原太素小腸募原作腸募關元史曰其脈沉大而實膀胱動而有聲宜通其小腸寒氣客於五藏楊曰寒氣入五藏中厥逆上吐遂令陰氣竭絶陽氣未入之間卒痛不知人陽氣入藏還生也史曰其脈伏而大極無骨力三部皆芤身有冷汗宜灸氣海後用暖藥寒氣客於腸胃史曰其脈細而滑史氏於每證附有治方殊少可取仍不録疸熱焦渴太素渴作竭視其主病之脈張曰主病之脈病所在也脈堅者邪之聚也血留者絡必盛而起也陷下者血氣不足多陰候也怒則氣上喜則氣緩春秋繁露曰怒則氣高喜則氣散恐則氣下春秋繁露曰懼則氣懾驚則氣亂春秋繁露曰憂則氣狂飧泄故氣上矣太素作食而逆氣逆上也楊曰引氣而上故氣逆怒其氣逆則致嘔血及食氣逆上也堅按此與新校正引稍異張子和儒門事親曰素問之論九氣其變甚詳其理甚明然論九氣所感之疾則略惟論嘔血及飧泄余皆不言又曰靈樞論神意魂魄志精所主之病然無寒熱暑驚勞四證余以是推而廣之云云其文頗繁宜參故氣緩矣張曰氣脈調和故志暢達榮衛通利故氣徐緩然喜甚則氣過於緩而漸至渙散故調經論云喜則氣下本神篇曰喜樂者神憚散而不藏義可知也琦曰九氣皆以病言緩當為緩散不收之意陰陽應象論曰暴喜傷陽又曰喜傷心是也故氣消矣楊曰營衛之氣在心肺聚而不散神歸本移所以熱而氣消虛也營則喘息太素息作喝神有所歸正太素與新校正引甲乙經同腹中論篇第四十太素熱中消中及懷子二節缺余皆存鼓脹太素今本與本經同雞矢醴太素無矢字楊曰氣滿心腹故旦食暮不能也是名鼓脹可取雞糞竹丸按此二字疑熬令煙盛以清酒一斗半潑之承取汁名曰雞醴飲取汗一劑不愈至於二劑非直獨療鼓脹膚脹亦愈堅按既名以醴則用酒以優但雞矢瀉下之力頗峻王氏以為利小便者是其云取汗者誤矣千金治産後中風別是法鼓脹豈宜取汗乎雞峰普濟方雞矢釀若心腹滿旦食暮不能食由脾元虛衰不能剋制於水水氣止行浸漬於土土濕則不能運化水穀氣不宣流上下痞塞故令人中滿旦則陽氣方長穀氣易消故能食暮則陰氣方進谷不得化故不能食其脈沉實而滑病名谷脹宜雞矢醴雞矢白半升上以好酒一斗漬七日溫服一盞溫酒調服盡淨為佳按王氏所舉大利小便微寒是本草黑字文又方以智物理小識有矢醴說殊少其要仍不録故時有病也雖然太素病作痛無雖字下文病氣亦作痛氣堅按雖然以下琦曰有脫誤或衍文血枯病源論曰醉以入房則內氣竭絶傷肝使月事衰少不來也所以然者肝藏於血勞傷過度血氣枯竭於內也又先經唾血及吐血下血謂之脫血使血枯亦月事不來也琦曰凡血枯經閉固屬虛候然必有瘀積乃致新血不生舊積日長藏府津液俱為所蝕遂成敗症徒事補養無救於亡金匱治虛勞有大黃䗪蟲丸蓋本此也由血氣本虛挾痰挾寒挾氣即著而為瘀治宜先去其瘀繼養其正則得之矣烏鰂厥陰血藥藘茹即茜草二味主平肝行瘀雀卵溫補精血鮑魚腐物也亦利瘀血補益精氣兼以活血散瘀虛勞治法不出於此復以何術先兄曰張云復復其血氣之原也四烏鯽骨至傷肝也太素鯽作賊藘作蘆腸作脅楊曰四四分一一分搗以雀卵為丸食後服之飲鮑魚汁通利腸及補肝傷也堅按本草經曰病在心腹以下者先服藥而後食張氏醫通曰久病虛勞失血血枯發熱及女人經閉血枯者宜素問四烏鰂骨一藘茹丸又有此方治驗舉在病能論下宜參又有方意論頗精文繁不録當閲此下至內癰太素下膿之下無生作出俠作使楊曰以其伏梁下因於陰膿血必上迫於胃管上出於膈使胃管生癰故按之下引於陰上連心腹所以致死論在刺法中琦曰此節訛缺甚不可讀以意逆之蓋藏府鬱熱久而不散乃成內癰病名伏梁此段太素文句有錯缺妥仍不具載外科精義伏梁丸出養生必用方治環臍腫痛腸胃瘡疽厚朴生薑汁製茯苓枳殼麩炒去穰白朮荊三稜炮半夏湯洗七次人參以上各乙兩上為細末麵糊為丸如小豆大每服三十丸食前米飲湯下肓之原在齊下稗海本搜神記曰心上為膏心下為肓段玉裁曰許云鬲上為肓者折言之鬲上肓肓上膏膏上心是說本於杜氏稗海本搜神記似晚出書然釋膏字或有其理當考動之為水溺澀之病王注奇病論曰故動之則為水而溺澀也動謂齊其毒藥而擊動之使其大下也芳草楚辭大招和致芳只注芳姜椒也張衡七辨芳以姜椒此所謂芳草蓋姜椒之屬張注亦謂是也上藥之氣悍倉公傳論曰中熱不溲者不可服五石石之為藥精悍膺腫太素亦作癰腫無邪脈也金匱曰婦人得平脈陰脈小弱其人渴不能食無寒熱名妊娠刺腰痛篇第四十一太素全存尻先兄曰吳云尻臀也按尻臀自異吳說誤刺金門楊云刺金門堅按此說非是善悲楊曰陽明穀氣虛故妄有見虛為肝氣所克故善悲䯒前太素䯒作骭楊曰下循胻外廉故刺之以和上下堅按說文骭骹也從骨交聲骹下曰脛也痛引脊內廉太素無痛字廉作痛堅按新校正引少異內踝上太素上作下楊曰足少陰脈云云出然骨之下循肉踝之後故取內踝之下出血太多太素作出血大虛厥陰之脈太素並作居陰之脈堅按此與王所謂一經同腨踵魚腹太素腹作腸善言太素亦無善字解脈楊曰解脈行處為病與足厥陰相似亦有足厥陰胳脈堅按此與王注不同痛引肩太素無痛字肩作膺解脈醫學讀書記曰詳本篇備舉諸經腰痛乃獨遺帶脈而重出解脈按帶脈起於少腹之側季脅之下環身一周如束帶然則此所謂腰痛如引帶常如折腰狀者自是帶脈為病云解脈者傳寫之誤也堅按未是如引帶太素引作別無帶字堅按引或體別故訛作別也善恐太素亦作善怒刺解脈在郤中楊曰前之解脈與厥陰相似今此刺解脈郤中當是取足厥陰郤中之胳也合腨下間去地一尺所太素云作上楊曰腨下間上地一尺所即陽交穴陽維也陰維會即築賓穴陰維郤也堅按甲乙陽交陽維之郤在外踝上七寸斜屬三陽分肉間足少陽膽經衡絡之脈太素作沖絁之脈衡絡絶作沖絁胳衡居作沖居堅按此即王所謂一經楊注亦缺晰不録考沖亦橫也見顏師古匡謬正俗直陽之脈楊曰刺直陽者有本作會陽堅按此足以證直之為值義內踝上五寸太素亦作二寸飛陽之脈先兄曰按飛陽即腓陽古文肥作非包與古蜚字相似故訛作飛而腓肥古相通易遁卦肥遁無不利文選思玄賦作飛遁曹子建七啓作飛遁可見飛肥古文相訛又易咸卦咸其腓凶釋文荀爽作肥即肥腓古文相通可以證也蓋足太陽之脈別下貫踹內者故云腓陽之脈前說據姚氏西溪叢話上踝二寸所太素二作三堅按內踝上三寸即三陰交穴屬足太陰經此云太陰後知太素非是散脈陽曰散脈在膝前骨肉分間者十二經脈中唯足厥陰足少陽在膝前主溲故當是此二經之別堅按楊說誤肉裡之脈楊曰太陽外絶骨後當是少陰為肉裡脈也堅按此說亦難從筋縮急太素縮作攣刺足太陽郤中太素太陽作陽明腰痛上寒不可顧此以下六十二字太素亦無兩踝胛上太素無踝字楊曰胛脊骨兩葙間也先兄曰王注長刺節論云腰踝骨者腰旁俠脊平立陷者中按之有骨處也左取右右取左太素無此六字風論篇第四十二太素全存或為風也太素風上有賊字堅按據張注賊風亦蓋指腦風目風等巢源有賊風候別是一證風氣藏於皮膚之間至寒中而泣出楊曰風寒之耶得之因者或因飢虛或因復用力腠理開放風入毛腠灑然而寒腠理閉塞內壅熱悶又曰其寒不泄在內故不能食其熱不泄在外故銷肌肉也是以使人惡風而不能食稱曰寒熱之病怢慓振寒貌也堅按千金方錯綜此段更演其義曰風者善行而數變在人肌膚中內不得泄外不得散因人動靜乃變其性有風遇寒則食不下遇熱則肌肉消而寒熱有風遇陽盛則不得汗遇陰盛則汗自出肥人有風肌肉厚則難泄善為熱中目黃瘦人有風肌肉薄則常外汗身中寒目淚出有風遇於虛腠理開則外出悽悽然如寒狀覺身中有水淋狀時如竹管吹處此是其證也有風遇於實腠理閉則內伏令人熱悶是其證也風氣與太陽俱入此以下至有不仁也楊接下文癘風為說正與高意同與衛氣相干太素此下有沖氣淫耶四字有瘍太素瘍作傷下瘍潰同堅按作傷者非有榮氣熱胕楊曰胕腐也堅按榮氣猶言營血其氣不清太素清作精以春甲乙云云楊曰春甲乙者木王時也木王盛時衝上風來名曰耶風木盛近里故衝上耶風來傷於肝故曰肝風余曰仿此也亦為藏府之風據志高說推之此言風中五藏六府之俞者不拘時日亦為藏府之風但下五藏風病能不言偏枯喑俳等候則本篇所謂五藏風別是一證殆是金匱五藏風寒篇中所舉中風之類歟志又曰此二因按二因言以時傷者與中藏府之俞者與金匱之所謂邪入於府即不識人邪入於藏舌即難言口吐涎之因證不同金匱之所謂中藏中府者邪直中於藏府而傷藏府之元神本篇之論一因隨時而傷藏氣一因經絡受邪而內連於藏府是以五藏之風狀止見色證而不致如傷藏神之危險者也此說亦是各入其門戶所中則為偏風太素所作之楊曰門戶空穴也耶氣所中之處即偏為病故名偏風也堅按楊注與原識符蓋本篇總該諸風之為病者辨證揭名並五藏風凡十四般其候各異特此偏風乃為仲景所謂半身不遂之風矣高以腦風目風等七證屬之偏風恐不必然風入係頭太素係作系楊曰耶氣入於目系在頭故為目風也眼寒太素作眠寒楊接下句讀且曰有本目風眼寒也堅按太素經注並誤琦曰寒者隱澀之意亦非先兄曰六書故云眼目中黑白也易曰多白眼合黑白與匡謂之目內風龔氏壽世保元以為腎水虛衰陰虛陽實卒倒無所知之證風者百病之長也楊曰百病因風而生故長也以因於風變為萬病非唯一途故風氣以為病長也無常方然致有風氣也太素致作故張曰無常方然者言變化之多而其致之者則皆因於風氣耳其診及其病能楊曰診者既見其狀因知所由故曰診也晝間暮甚等即為狀也咳短氣等即為病服之也按眠當能字皏然楊曰皏普幸反白色薄也焦絶楊曰焦執也絶不通也言熱不通也堅按義不了病甚則言不可快太素病作痛無言字琦曰心開竅於舌其脈別系舌本經絡受邪故言語蹇澀色薄微黃琦曰土居中以灌四傍藏府精氣變現已為色則精明而厚脾衰不能灌溉故色薄面痝然浮腫琦曰面腫者風挾水氣上行即評熱病論之風水也脊痛太素脊上有腰字隱曲不利楊曰謂大小便不得利琦曰陽道不利其在女子則月事不來也肌上太素作頤上楊曰頤上腎部也有本為肌上誤也琦曰診在肌上未詳刺熱論以頤候腎肌或頤之訛也堅按二說俱允惜未知肌之為肌耳首風三因方處以附子摩頭散即金匱頭風摩散漏風三因方與病能論酒風錯綜處以麋銜湯常不可單衣楊曰謂重衣則汗衣單則寒堅按任說最穩身汗琦曰身汗二字衍衣常濡太素常作裳堅按王注亦云衣裳濡恐原本為然不能勞事琦曰陽泄而虛故不耐勞事也泄風三因方從千金作內風治以附子湯方附子生去皮臍人參各半兩茴香炒茯苓山藥各一分甘草炙乾薑炮各三分上為銼散每服四大錢水二盞姜三片鹽少許煎至七分去滓空心服上漬其風琦曰其風二字衍身體盡痛汗出液燥營衛澀滯故有此證猶桂枝加芍藥生薑人參新加湯身疼痛之類琦以為重感於寒謬痹論篇第四十三太素全存以冬遇此者為骨痹楊曰冬時不能自調遇此三氣以為三痹痹俱稱骨痹以冬骨也餘四仿此至陰六月脾所主也琦曰至陰當作季夏多飲數小便琦曰熱上淫肺故多飲肝鬱欲泄故便數上為引如懷太素作上為演壞楊曰演當作涎謂涎流壞中心也堅按太素經注俱非上為大塞太素塞作寒楊曰胃寒嘔冷水也先兄曰按大塞義未詳豈飲食不進之謂歟琦曰下云入藏者死此列五藏痹未見死候且五藏惟腎痹為骨痹之診余並藏之本病絶與痹無與故林氏云云系痛聚在脾下新校正文蓋因有肺痹心痹等名遂以意竄入殊不知經所云肺痹心痹云者乃病之變名如五藏生成篇亦有五藏痹證與本篇風痹之義渺不相涉也率意移之過矣堅按琦說是腸痹者數飲而出不得太素腸上有大字楊曰大腸中熱大便難胞痹楊曰膀胱盛尿故謂之胞即尿脬脬返苞反內痛太素亦作兩髀楊曰膀胱中熱故按之髀熱先兄曰高雲言六府之痹不言胃膽三焦者腸胃自受糟粕言腸不必更言胃矣胞為經血之海膽為中精之府言胞不必言膽矣三焦者中瀆之府水道出焉言膀胱不必更言三焦矣陰氣者靜則云云琦曰府陽藏陰故藏氣謂之陰氣言人能安靜志氣則神藏於內陰平陽祕水升火降精氣內治邪不得干若時時躁動擾其血氣則陽神消耗生氣通天論所謂起居如驚神氣乃浮也神氣消亡故邪得入之腸胃本受盛轉輪之府然飲食不節每致受傷此統言藏府所以受邪之由也淫氣楊曰淫過也喘息肺所為也喘息過者則肺虛邪客故痹聚也下文意並同遺溺太素作嘔唾楊曰嘔唾腎所為也乏竭太素作渴乏楊曰肝以主血今有渴乏多傷肝血虛故痹聚也淫氣肌絶痹聚在脾太素作淫氣飢絶痹聚在胃淫氣壅塞痹聚在脾楊曰飢者胃少谷也飢過絶食則胃虛故痹聚又曰穀氣遇塞則實而痹聚於脾也太素從上凡痹之客五藏者至此亦在陰陽別論陰陽相過曰溜下總題云陰陽雜說其入藏者死孫思邈論腳氣曰黃帝曰緩風濕痹是也然則痹之入藏豈腳氣衝心之類乎其留皮膚間者太素留作流楊曰流行在於皮膚淺處之間動而又淺故易已也各隨其過太素作各治其遇遇當過訛灑陳於六府楊曰陳起也堅按灑散也陳布也楊注非是熏於肓膜太素肓作胃堅按太素非是陽遭陰故為痹熱高曰知陰氣盛而主濕則知陽氣盛而主燥矣志曰燥者謂無汗堅按高本於馬注然上文或燥二字疑後人所添兩氣相感兩氣蓋濕與陰氣之謂不仁太素仁作知楊曰不知者不覺不仁也不痛琦曰五者具則自皮入骨前所謂病久入深明不痛之為重也逢寒則蟲逢熱則縱太素蟲作急熱作濕堅按作濕非是痿論篇第四十四太素全存志曰夫五藏各有所合痹從外而合病於內外所因也痿從內而合病於外內所因也琦曰痹痿相似而不同痹為外感痿屬內傷痹雖有內傷而外感多痿雖非外感而內傷甚筋膜楊曰膜者人之皮下肉上膜肉之筋也肺熱葉焦琦曰思慮忿怒五志之火內熾銷爍肺金故喘息有音而肺葉焦枯肺所以行營衛治陰陽飲食之精必自肺家傳布變化津液灌輸藏府肺藏一傷五藏無所稟受故因之以成痿躄也痿躄按痿分為五而首段敘其證次段敘其因然其文互相發且痿躄脈痿骨痿三證則前後義同筋痿則前段云筋急而變後段云宗筋弛縱此筋痿有二證也肉痿則前段云脾氣熱則胃干而渴後段云有漸於濕以水為事此肉痿有內外二因也又按此病痿軟其正證而拘急蓋是變證末節曰故陽明虛則宗筋縱帶脈不引故足痿不用其義可見矣白淫奇效良方有說宜參有漸於濕楊曰漸漬也肉痿琦曰肉痿即屬痹症謂之痿者必兼病筋骨也生氣通天論云濕熱不攘大筋緛短小筋弛長緛短為拘弛長為痿又曰秋傷於濕發為痿厥陰陽應象論曰地之濕氣感則害皮肉筋骨蓋脾既受濕必流於關節內熱應之則為痿躄非止於肌肉不仁也陽氣內伐內伐則熱舍於腎太素內伐不復伐作代舍作合楊曰陽明主谷其氣熱盛復有外熱來加陽明之脈內即代絶內外熱盛下合水堅按太素非是絡脈溢楊曰胳脈心之所主也胳脈張見為溢也宗筋主束骨太素作宗筋者束肉骨楊曰宗筋者足太陰少陰厥陰三陰筋及足陽明筋皆聚陰器故曰宗筋又曰宗筋即二核及莖也各補其榮云云太素時受月作時受日楊曰五藏熱痿皆是陰虛故補五藏陰經之榮陰榮水也陰輸是木少陽也按此句疑故熱痿通其輸也各以其時者合以其時受病之日調之皆愈也厥論篇第四十五太素全存前陰者宗筋之所聚楊曰陰器為前陰也宗總也人身大筋總聚以為前陰也奪於所用云云太素因作且楊曰入房太甚有傷故曰奪於所用因奪所用則陽氣上虛陰氣上爭不能和復精氣溢泄益虛寒耶之氣與虛上乘以居其中以寒居中陽氣衰虛堅按楊注暗得汪高意琦曰獨陰無陽故曰邪氣亦是陰氣虛則陽氣入先兄曰張云濕熱在脾則脾陰虛陽獨亢而胃不和矣脾胃俱病則精氣竭故不能營其經絡四支也高雲入者絡脈之熱復入於胃也陽氣盛於上醫學讀書記曰素問曰陰氣盛於上則下虛下虛則腹脹滿又曰陽氣盛於上則下氣重上而邪氣逆則陽氣亂陽氣亂則不知人此二段乃岐伯分答黃帝問厥或令人腹滿或令人昏不知人二語之辭所謂陰氣者下氣也下氣而盛於上則下反無氣矣無氣則不化故腹脹滿也所謂下氣者即陰氣也陽氣上盛則陰氣上奔陰從陽之義也邪氣亦即陰氣以其失正而上奔即為邪氣邪氣既逆陽氣乃亂氣治則明亂則昏故不知人也甲乙經削陽氣盛於上五字而增腹滿二字於下虛則腹脹滿之下則下氣重上之上林氏云當從甲乙謂未有陰氣盛於上而又陽氣盛於上者二公益未體認分答語辭故其言如此殆所謂習而弗察者耶堅按此說明確正與原識合不知人也琦舉仲景脈法生氣通天論薄厥調經論大厥繆刺論文曰合數條之義皆血氣相薄陽氣鬱冒不行與寒熱之厥不同厥狀病能琦曰熱厥屬陽經寒厥屬陰經然陰陽虛實互乘則陽經亦有寒厥亦有熱厥也腫首頭重太素腫作踵堅按此王氏所非癲疾欲走呼先兄曰張云陽明為多血多氣之經氣逆於胃則陽明邪實故為癲狂之疾而欲走且呼也陽邪盛則神明亂故為妄言妄見也堅按原識所舉言其證同者不言其因屈膝先兄曰張云肝主筋故足軟好臥而屈膝高雲屈膝踡臥也高說是陰縮腫先兄曰高雲陰縮腫前陰痿縮而囊腫也按巢源虛勞陰疝腫縮候疝者氣痛也衆筋會於陰器邪客於厥陰少陰之經與冷氣相搏則陰痛腫而攣縮胻內熱太素胻作脛楊曰脛內熱有本脛外熱足厥陰脈不行脈外按疑脛外外為誤耳琦曰以上並熱厥之候太陰厥逆太素陰下有脈字下並同楊曰問曰前章已言六經之厥今復言之有何別異也答曰二章說之先後經脈厥而主病左右不同故也琦曰按厥有寒熱兩候前列六經症皆熱厥自此至末所言皆寒厥堅按此下諸證不必屬寒者琦說難從下泄清太素清作青楊曰下利出青色者少腹間冷也三陰俱逆不得前後楊曰逆即氣之失逆名曰厥逆足三陰之脈同時失逆必大小便不通手足冷期至三日死矣僵仆楊曰後倒曰僵前倒曰僕發腸癰不可治琦曰腸癰五字衍喘咳身熱楊曰足陽明逆氣乘肺故喘咳也足陽明主身熱嘔血太素此下有不可治驚者死六字蓋剩痓太素作痙楊曰痓身項強直也
